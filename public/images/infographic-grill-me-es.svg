<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1a1030"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#818cf8"/></marker>
    <marker id="arrowTeal" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#018786"/></marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#FF9800"/></marker>
  </defs>

  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse"><path d="M 60 0 L 0 0 0 60" fill="none" stroke="#1e293b" stroke-width="0.5" opacity="0.4"/></pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <text x="600" y="52" text-anchor="middle" font-family="monospace" font-size="28" font-weight="bold" fill="#f8fafc" filter="url(#glow)">/grill-me — Ciclo de Interrogación Adversarial</text>
  <text x="600" y="76" text-anchor="middle" font-family="monospace" font-size="13" fill="#64748b">mattpocock/skills · El Guardián Pre-Spec</text>
  <line x1="350" y1="88" x2="850" y2="88" stroke="#1e293b" stroke-width="1"/>

  <!-- Step 1: Idea -->
  <rect x="80" y="120" width="180" height="70" rx="12" fill="#0F172A" stroke="#FF9800" stroke-width="2"/>
  <text x="170" y="150" text-anchor="middle" font-family="monospace" font-size="14" font-weight="bold" fill="#FF9800">💡 Idea / Propuesta</text>
  <text x="170" y="170" text-anchor="middle" font-family="monospace" font-size="10" fill="#94a3b8">Visión inicial del dev</text>

  <line x1="260" y1="155" x2="340" y2="155" stroke="#818cf8" stroke-width="2" marker-end="url(#arrowPurple)"/>

  <!-- Step 2: /grill-me -->
  <rect x="350" y="110" width="220" height="90" rx="12" fill="#1e1145" stroke="#6366f1" stroke-width="2.5"/>
  <text x="460" y="140" text-anchor="middle" font-family="monospace" font-size="16" font-weight="bold" fill="#818cf8">⚡ /grill-me</text>
  <text x="460" y="160" text-anchor="middle" font-family="monospace" font-size="11" fill="#a5b4fc">Interrogación adversarial</text>
  <text x="460" y="178" text-anchor="middle" font-family="monospace" font-size="11" fill="#a5b4fc">sistemática</text>

  <circle cx="330" cy="100" r="18" fill="#6366f1" opacity="0.12"/><text x="330" y="106" text-anchor="middle" font-family="monospace" font-size="16" fill="#818cf8">?</text>
  <circle cx="590" cy="100" r="18" fill="#6366f1" opacity="0.12"/><text x="590" y="106" text-anchor="middle" font-family="monospace" font-size="16" fill="#818cf8">?</text>
  <circle cx="590" cy="195" r="14" fill="#6366f1" opacity="0.10"/><text x="590" y="200" text-anchor="middle" font-family="monospace" font-size="12" fill="#818cf8">?</text>

  <line x1="570" y1="155" x2="650" y2="155" stroke="#818cf8" stroke-width="2" marker-end="url(#arrowPurple)"/>

  <!-- Step 3: Edge Cases -->
  <rect x="660" y="120" width="190" height="70" rx="12" fill="#0F172A" stroke="#f59e0b" stroke-width="2"/>
  <text x="755" y="148" text-anchor="middle" font-family="monospace" font-size="13" font-weight="bold" fill="#fbbf24">🔍 Casos Límite</text>
  <text x="755" y="168" text-anchor="middle" font-family="monospace" font-size="10" fill="#94a3b8">Conflictos, dependencias...</text>

  <line x1="755" y1="190" x2="755" y2="255" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrowOrange)"/>

  <!-- Step 4: Shared Understanding -->
  <rect x="650" y="260" width="210" height="90" rx="12" fill="#0F172A" stroke="#018786" stroke-width="2.5"/>
  <text x="755" y="290" text-anchor="middle" font-family="monospace" font-size="14" font-weight="bold" fill="#00b3a6">🤝 Entendimiento Compartido</text>
  <text x="755" y="312" text-anchor="middle" font-family="monospace" font-size="11" fill="#5eead4">Lenguaje Ubicuo</text>
  <text x="755" y="332" text-anchor="middle" font-family="monospace" font-size="11" fill="#5eead4">Suposiciones resueltas</text>

  <line x1="650" y1="305" x2="510" y2="305" stroke="#018786" stroke-width="2" marker-end="url(#arrowTeal)"/>

  <!-- Step 5: GLOSSARY.md -->
  <rect x="350" y="265" width="150" height="80" rx="12" fill="#0d332e" stroke="#018786" stroke-width="2"/>
  <text x="425" y="295" text-anchor="middle" font-family="monospace" font-size="14" font-weight="bold" fill="#34d399">📄 GLOSARIO.md</text>
  <text x="425" y="316" text-anchor="middle" font-family="monospace" font-size="10" fill="#6ee7b7">Definiciones vivas</text>

  <line x1="425" y1="345" x2="425" y2="415" stroke="#FF9800" stroke-width="2" marker-end="url(#arrowOrange)"/>

  <!-- Step 6: SPEC.md -->
  <rect x="310" y="420" width="230" height="90" rx="14" fill="#1a1a0a" stroke="#FF9800" stroke-width="3"/>
  <text x="425" y="455" text-anchor="middle" font-family="monospace" font-size="17" font-weight="bold" fill="#FFB74D">📋 SPEC.md</text>
  <text x="425" y="478" text-anchor="middle" font-family="monospace" font-size="11" fill="#fbbf24">Especificación robusta</text>
  <text x="425" y="496" text-anchor="middle" font-family="monospace" font-size="11" fill="#fbbf24">lista para fase SDD</text>

  <line x1="540" y1="465" x2="640" y2="465" stroke="#018786" stroke-width="2.5" marker-end="url(#arrowTeal)"/>

  <!-- Step 7: Build -->
  <rect x="650" y="420" width="190" height="90" rx="12" fill="#0d332e" stroke="#34d399" stroke-width="2"/>
  <text x="745" y="450" text-anchor="middle" font-family="monospace" font-size="14" font-weight="bold" fill="#34d399">🔨 Fase Build</text>
  <text x="745" y="472" text-anchor="middle" font-family="monospace" font-size="11" fill="#6ee7b7">SDD / TDD</text>
  <text x="745" y="492" text-anchor="middle" font-family="monospace" font-size="11" fill="#6ee7b7">El spec es sagrado</text>

  <!-- Left sidebar -->
  <rect x="60" y="260" width="220" height="250" rx="10" fill="#0F172A" stroke="#1e293b" stroke-width="1" opacity="0.9"/>
  <text x="170" y="290" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="#f8fafc">🔑 Clave</text>
  <line x1="80" y1="298" x2="260" y2="298" stroke="#1e293b" stroke-width="0.5"/>
  <circle cx="90" cy="325" r="5" fill="#818cf8"/><text x="106" y="329" font-family="monospace" font-size="10" fill="#cbd5e1">Pre-Spec = dominio Grill-Me</text>
  <circle cx="90" cy="355" r="5" fill="#34d399"/><text x="106" y="359" font-family="monospace" font-size="10" fill="#cbd5e1">Build = dominio SDD</text>
  <circle cx="90" cy="385" r="5" fill="#fbbf24"/><text x="106" y="389" font-family="monospace" font-size="10" fill="#cbd5e1">Docs emergen de la fricción</text>
  <circle cx="90" cy="415" r="5" fill="#FF9800"/><text x="106" y="419" font-family="monospace" font-size="10" fill="#cbd5e1">Adversarial → Spec robusto</text>
  <text x="170" y="460" text-anchor="middle" font-family="monospace" font-size="10" fill="#64748b" font-style="italic">"Entendimiento compartido</text>
  <text x="170" y="476" text-anchor="middle" font-family="monospace" font-size="10" fill="#64748b" font-style="italic">antes que código"</text>

  <rect x="0" y="590" width="1200" height="40" fill="#018786" opacity="0.15"/>
  <text x="600" y="615" text-anchor="middle" font-family="monospace" font-size="11" fill="#64748b">mattpocock/skills · Grill Me — El eslabón perdido entre ideación socrática y ejecución Spec-Driven</text>
</svg>