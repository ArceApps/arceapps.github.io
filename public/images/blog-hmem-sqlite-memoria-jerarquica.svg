<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <!-- Background -->
  <rect width="800" height="450" fill="#0f172a"/>

  <!-- Grid lines subtle -->
  <line x1="0" y1="150" x2="800" y2="150" stroke="#1e293b" stroke-width="1"/>
  <line x1="0" y1="300" x2="800" y2="300" stroke="#1e293b" stroke-width="1"/>
  <line x1="200" y1="0" x2="200" y2="450" stroke="#1e293b" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="450" stroke="#1e293b" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="450" stroke="#1e293b" stroke-width="1"/>

  <!-- Central SQLite cylinder icon -->
  <ellipse cx="400" cy="185" rx="70" ry="20" fill="#018786" opacity="0.9"/>
  <rect x="330" y="185" width="140" height="80" fill="#015f5e"/>
  <ellipse cx="400" cy="265" rx="70" ry="20" fill="#014f4e"/>

  <!-- Cylinder stripes (levels) -->
  <line x1="330" y1="205" x2="470" y2="205" stroke="#018786" stroke-width="1.5" opacity="0.5"/>
  <line x1="330" y1="225" x2="470" y2="225" stroke="#018786" stroke-width="1.5" opacity="0.5"/>
  <line x1="330" y1="245" x2="470" y2="245" stroke="#018786" stroke-width="1.5" opacity="0.5"/>

  <!-- Level indicator labels on the right -->
  <rect x="510" y="88" width="180" height="24" rx="4" fill="#018786" opacity="0.15"/>
  <text x="520" y="105" font-family="monospace" font-size="12" fill="#018786">L1 · Gross summary</text>

  <rect x="510" y="118" width="180" height="24" rx="4" fill="#018786" opacity="0.12"/>
  <text x="520" y="135" font-family="monospace" font-size="12" fill="#4db6ac">L2 · More detail</text>

  <rect x="510" y="148" width="180" height="24" rx="4" fill="#018786" opacity="0.09"/>
  <text x="520" y="165" font-family="monospace" font-size="12" fill="#4db6ac">L3 · Deep context</text>

  <rect x="510" y="178" width="180" height="24" rx="4" fill="#FF9800" opacity="0.09"/>
  <text x="520" y="195" font-family="monospace" font-size="12" fill="#FF9800">L4 · Granular</text>

  <rect x="510" y="208" width="180" height="24" rx="4" fill="#FF9800" opacity="0.12"/>
  <text x="520" y="225" font-family="monospace" font-size="12" fill="#FF9800">L5 · Full verbatim</text>

  <!-- Connecting lines from levels to cylinder -->
  <line x1="510" y1="100" x2="470" y2="190" stroke="#018786" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
  <line x1="510" y1="220" x2="470" y2="250" stroke="#FF9800" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>

  <!-- Left panel: FTS5 search box -->
  <rect x="90" y="155" width="160" height="75" rx="8" fill="#1e293b" stroke="#018786" stroke-width="1.5"/>
  <text x="170" y="178" font-family="monospace" font-size="10" fill="#018786" text-anchor="middle">FTS5 SEARCH</text>
  <rect x="105" y="185" width="130" height="16" rx="3" fill="#0f172a" stroke="#018786" stroke-width="1" opacity="0.7"/>
  <text x="170" y="197" font-family="monospace" font-size="9" fill="#4db6ac" text-anchor="middle">► fuzzy · ranking</text>
  <text x="170" y="218" font-family="monospace" font-size="9" fill="#64748b" text-anchor="middle">Fibonacci decay</text>

  <!-- Arrow from search box to cylinder -->
  <line x1="250" y1="192" x2="330" y2="215" stroke="#018786" stroke-width="2" stroke-dasharray="5,3"/>
  <polygon points="327,209 335,220 323,220" fill="#018786"/>

  <!-- Bottom: MCP server badge -->
  <rect x="300" y="310" width="200" height="32" rx="6" fill="#018786" opacity="0.2" stroke="#018786" stroke-width="1"/>
  <text x="400" y="331" font-family="monospace" font-size="13" fill="#018786" text-anchor="middle" font-weight="bold">MCP Server · SQLite</text>

  <!-- Tagline -->
  <text x="400" y="380" font-family="sans-serif" font-size="14" fill="#64748b" text-anchor="middle">npx hmem-mcp init</text>

  <!-- Title -->
  <text x="400" y="60" font-family="sans-serif" font-size="28" font-weight="bold" fill="#ffffff" text-anchor="middle">hmem</text>
  <text x="400" y="85" font-family="sans-serif" font-size="14" fill="#4db6ac" text-anchor="middle">Hierarchical Humanlike Memory for AI Agents</text>

  <!-- Orange accent dots -->
  <circle cx="130" cy="100" r="5" fill="#FF9800" opacity="0.7"/>
  <circle cx="670" cy="320" r="4" fill="#FF9800" opacity="0.5"/>
  <circle cx="720" cy="80" r="3" fill="#018786" opacity="0.6"/>
  <circle cx="80" cy="360" r="3" fill="#018786" opacity="0.6"/>
</svg>
