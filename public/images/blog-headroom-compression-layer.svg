<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Headroom context compression layer for AI agents">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="tealFlow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#018786" stop-opacity="0.2"/>
      <stop offset="50%" stop-color="#018786" stop-opacity="1"/>
      <stop offset="100%" stop-color="#018786" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="orangeFlow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF9800" stop-opacity="0.2"/>
      <stop offset="50%" stop-color="#FF9800" stop-opacity="1"/>
      <stop offset="100%" stop-color="#FF9800" stop-opacity="0.2"/>
    </linearGradient>
    <radialGradient id="bubble" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#018786" stop-opacity="0.18"/>
      <stop offset="70%" stop-color="#018786" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#018786" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bubbleOrange" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#FF9800" stop-opacity="0.22"/>
      <stop offset="70%" stop-color="#FF9800" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#FF9800" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative grid -->
  <g stroke="#1E293B" stroke-width="1" opacity="0.5">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Background bubbles -->
  <circle cx="180" cy="160" r="160" fill="url(#bubble)"/>
  <circle cx="1050" cy="480" r="180" fill="url(#bubbleOrange)"/>

  <!-- LEFT: Large uncompressed payload (chaotic) -->
  <g transform="translate(70 110)">
    <rect x="0" y="0" width="280" height="380" rx="14" fill="#0B1220" stroke="#334155" stroke-width="1.5"/>
    <text x="20" y="32" font-family="ui-monospace, SFMono-Regular, monospace" font-size="14" fill="#94A3B8" font-weight="700">UNCOMPRESSED</text>
    <text x="20" y="52" font-family="ui-monospace, SFMono-Regular, monospace" font-size="11" fill="#64748B">17,765 tokens</text>

    <!-- chaotic lines representing log output -->
    <g stroke="#475569" stroke-width="2" stroke-linecap="round">
      <line x1="20" y1="80" x2="260" y2="80"/>
      <line x1="20" y1="95" x2="240" y2="95"/>
      <line x1="20" y1="110" x2="255" y2="110"/>
      <line x1="20" y1="125" x2="200" y2="125"/>
      <line x1="20" y1="140" x2="248" y2="140"/>
      <line x1="20" y1="155" x2="220" y2="155"/>
      <line x1="20" y1="170" x2="258" y2="170"/>
      <line x1="20" y1="185" x2="190" y2="185"/>
      <line x1="20" y1="200" x2="245" y2="200"/>
      <line x1="20" y1="215" x2="210" y2="215"/>
      <line x1="20" y1="230" x2="252" y2="230"/>
      <line x1="20" y1="245" x2="180" y2="245"/>
      <line x1="20" y1="260" x2="244" y2="260"/>
      <line x1="20" y1="275" x2="220" y2="275"/>
      <line x1="20" y1="290" x2="256" y2="290"/>
      <line x1="20" y1="305" x2="200" y2="305"/>
      <line x1="20" y1="320" x2="248" y2="320"/>
      <line x1="20" y1="335" x2="234" y2="335"/>
      <line x1="20" y1="350" x2="252" y2="350"/>
    </g>
    <!-- error line highlighted -->
    <rect x="14" y="248" width="252" height="20" rx="4" fill="#FF9800" fill-opacity="0.15" stroke="#FF9800" stroke-width="1"/>
    <text x="22" y="262" font-family="ui-monospace, SFMono-Regular, monospace" font-size="10" fill="#FF9800" font-weight="700">FATAL: NullPointerException</text>
  </g>

  <!-- MIDDLE: HEADROOM pipeline (the hero) -->
  <g transform="translate(420 130)">
    <!-- Pipeline container -->
    <rect x="0" y="0" width="360" height="340" rx="20" fill="#0B1220" stroke="#018786" stroke-width="2.5"/>
    <text x="180" y="40" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="800" fill="#018786" letter-spacing="2">HEADROOM</text>
    <text x="180" y="62" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94A3B8" font-weight="500" letter-spacing="1">CONTEXT COMPRESSION LAYER</text>

    <!-- Stage 1: CacheAligner -->
    <g transform="translate(28 90)">
      <rect x="0" y="0" width="304" height="44" rx="8" fill="#020617" stroke="#018786" stroke-width="1" stroke-opacity="0.4"/>
      <circle cx="22" cy="22" r="10" fill="#018786"/>
      <text x="22" y="27" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="800" fill="#0F172A">1</text>
      <text x="44" y="20" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#E2E8F0">CacheAligner</text>
      <text x="44" y="36" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#64748B">stabilize prefixes · up to 90% cache hit</text>
    </g>

    <!-- Stage 2: ContentRouter + SmartCrusher/CodeCompressor -->
    <g transform="translate(28 144)">
      <rect x="0" y="0" width="304" height="44" rx="8" fill="#020617" stroke="#018786" stroke-width="1" stroke-opacity="0.4"/>
      <circle cx="22" cy="22" r="10" fill="#018786"/>
      <text x="22" y="27" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="800" fill="#0F172A">2</text>
      <text x="44" y="20" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#E2E8F0">SmartCrusher · CodeCompressor</text>
      <text x="44" y="36" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#64748B">JSON arrays + AST code · 92% reduction</text>
    </g>

    <!-- Stage 3: Kompress -->
    <g transform="translate(28 198)">
      <rect x="0" y="0" width="304" height="44" rx="8" fill="#020617" stroke="#018786" stroke-width="1" stroke-opacity="0.4"/>
      <circle cx="22" cy="22" r="10" fill="#018786"/>
      <text x="22" y="27" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="800" fill="#0F172A">3</text>
      <text x="44" y="20" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#E2E8F0">Kompress-base</text>
      <text x="44" y="36" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#64748B">HF model · trained on agentic traces</text>
    </g>

    <!-- Stage 4: CCR (reversible) -->
    <g transform="translate(28 252)">
      <rect x="0" y="0" width="304" height="44" rx="8" fill="#020617" stroke="#FF9800" stroke-width="1.5" stroke-opacity="0.8"/>
      <circle cx="22" cy="22" r="10" fill="#FF9800"/>
      <text x="22" y="27" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="800" fill="#0F172A">4</text>
      <text x="44" y="20" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#E2E8F0">CCR · Compress-Cache-Retrieve</text>
      <text x="44" y="36" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#FF9800">reversible · LLM can ask for originals</text>
    </g>

    <!-- arrow input -->
    <g stroke="#018786" stroke-width="2.5" fill="none" stroke-linecap="round">
      <line x1="-30" y1="170" x2="22" y2="170"/>
      <polygon points="22,170 14,165 14,175" fill="#018786"/>
    </g>
    <!-- arrow output -->
    <g stroke="#FF9800" stroke-width="2.5" fill="none" stroke-linecap="round">
      <line x1="338" y1="170" x2="390" y2="170"/>
      <polygon points="390,170 382,165 382,175" fill="#FF9800"/>
    </g>
  </g>

  <!-- RIGHT: Compressed payload + LLM -->
  <g transform="translate(850 110)">
    <rect x="0" y="0" width="280" height="240" rx="14" fill="#0B1220" stroke="#FF9800" stroke-width="1.5"/>
    <text x="20" y="32" font-family="ui-monospace, SFMono-Regular, monospace" font-size="14" fill="#FF9800" font-weight="700">COMPRESSED</text>
    <text x="20" y="52" font-family="ui-monospace, SFMono-Regular, monospace" font-size="11" fill="#64748B">1,408 tokens</text>
    <text x="260" y="32" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="800" fill="#FF9800">−92%</text>

    <!-- few compressed lines -->
    <g stroke="#FF9800" stroke-width="2.5" stroke-linecap="round">
      <line x1="20" y1="85" x2="240" y2="85"/>
      <line x1="20" y1="105" x2="180" y2="105"/>
      <line x1="20" y1="125" x2="220" y2="125"/>
    </g>
    <!-- error kept -->
    <rect x="14" y="145" width="252" height="20" rx="4" fill="#FF9800" fill-opacity="0.2" stroke="#FF9800" stroke-width="1"/>
    <text x="22" y="159" font-family="ui-monospace, SFMono-Regular, monospace" font-size="10" fill="#FF9800" font-weight="700">FATAL: NullPointerException</text>

    <g stroke="#475569" stroke-width="2" stroke-linecap="round">
      <line x1="20" y1="180" x2="200" y2="180"/>
      <line x1="20" y1="200" x2="160" y2="200"/>
    </g>

    <!-- CCR retrieve button -->
    <g transform="translate(20 220)">
      <rect x="0" y="0" width="180" height="14" rx="4" fill="#FF9800" fill-opacity="0.15"/>
      <text x="90" y="11" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, monospace" font-size="9" fill="#FF9800">↻ headroom_retrieve(hash)</text>
    </g>
  </g>

  <!-- LLM endpoint -->
  <g transform="translate(940 410)">
    <rect x="0" y="0" width="180" height="80" rx="14" fill="#020617" stroke="#018786" stroke-width="1.5" stroke-dasharray="4 4"/>
    <text x="90" y="30" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#94A3B8">LLM PROVIDER</text>
    <text x="90" y="50" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#64748B">Anthropic · OpenAI</text>
    <text x="90" y="66" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#64748B">Bedrock · Gemini</text>
  </g>

  <!-- arrow from compressed to LLM -->
  <g stroke="#FF9800" stroke-width="2" fill="none" stroke-linecap="round" stroke-dasharray="3 3">
    <line x1="990" y1="350" x2="1030" y2="408"/>
  </g>

  <!-- arrow back from LLM to CCR (retrieval) -->
  <g stroke="#FF9800" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-dasharray="2 3" opacity="0.6">
    <path d="M 940 460 Q 720 540 600 500" />
  </g>

  <!-- Title and meta at top -->
  <g transform="translate(60 50)">
    <text x="0" y="0" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#018786" letter-spacing="3">AI TOOLING · DEEP DIVE</text>
  </g>

  <!-- bottom: tags -->
  <g transform="translate(60 575)">
    <rect x="0" y="0" width="86" height="28" rx="14" fill="#018786" fill-opacity="0.15" stroke="#018786" stroke-width="1"/>
    <text x="43" y="18" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#018786">LLM</text>

    <rect x="96" y="0" width="110" height="28" rx="14" fill="#018786" fill-opacity="0.15" stroke="#018786" stroke-width="1"/>
    <text x="151" y="18" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#018786">AI Agents</text>

    <rect x="216" y="0" width="118" height="28" rx="14" fill="#FF9800" fill-opacity="0.15" stroke="#FF9800" stroke-width="1"/>
    <text x="275" y="18" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#FF9800">Reversible</text>

    <rect x="344" y="0" width="68" height="28" rx="14" fill="#FF9800" fill-opacity="0.15" stroke="#FF9800" stroke-width="1"/>
    <text x="378" y="18" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#FF9800">MCP</text>

    <text x="900" y="18" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#475569">github.com/chopratejas/headroom</text>
  </g>

  <!-- top right: 33.4k stars -->
  <g transform="translate(1080 50)">
    <text x="0" y="0" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#FF9800" letter-spacing="2">33.4k ★ · v0.26.0</text>
  </g>
</svg>
