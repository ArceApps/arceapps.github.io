<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#F8FAFC"/>

  <!-- Patrón de puntos -->
  <defs>
    <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle fill="#018786" fill-opacity="0.1" cx="2" cy="2" r="2"></circle>
    </pattern>
  </defs>
  <rect x="0" y="0" width="1200" height="630" fill="url(#dots)"></rect>

  <!-- Representación de Módulos (Skills) -->
  <g transform="translate(300, 150)">
    <!-- Main Node -->
    <rect x="200" y="100" width="200" height="100" rx="10" fill="#018786" fill-opacity="0.1" stroke="#018786" stroke-width="3"/>
    <text x="300" y="155" font-family="sans-serif" font-size="28" fill="#018786" font-weight="bold" text-anchor="middle">Agent</text>

    <!-- Skill Nodes -->
    <rect x="-50" y="0" width="150" height="60" rx="8" fill="#FF9800" fill-opacity="0.1" stroke="#FF9800" stroke-width="2"/>
    <text x="25" y="38" font-family="monospace" font-size="20" fill="#FF9800" font-weight="bold" text-anchor="middle">navigation-3</text>

    <rect x="-50" y="240" width="150" height="60" rx="8" fill="#FF9800" fill-opacity="0.1" stroke="#FF9800" stroke-width="2"/>
    <text x="25" y="278" font-family="monospace" font-size="20" fill="#FF9800" font-weight="bold" text-anchor="middle">edge-to-edge</text>

    <rect x="500" y="0" width="150" height="60" rx="8" fill="#FF9800" fill-opacity="0.1" stroke="#FF9800" stroke-width="2"/>
    <text x="575" y="38" font-family="monospace" font-size="20" fill="#FF9800" font-weight="bold" text-anchor="middle">compose</text>

    <!-- Conexiones -->
    <path d="M 100 30 Q 150 30 200 120" fill="none" stroke="#018786" stroke-width="2" stroke-dasharray="5,5"/>
    <path d="M 100 270 Q 150 270 200 180" fill="none" stroke="#018786" stroke-width="2" stroke-dasharray="5,5"/>
    <path d="M 500 30 Q 450 30 400 120" fill="none" stroke="#018786" stroke-width="2" stroke-dasharray="5,5"/>
  </g>

  <!-- Círculos de fondo asimétricos -->
  <circle cx="150" cy="500" r="80" fill="none" stroke="#FF9800" stroke-width="8" stroke-opacity="0.2"/>
  <circle cx="1050" cy="150" r="100" fill="#018786" fill-opacity="0.05"/>
</svg>