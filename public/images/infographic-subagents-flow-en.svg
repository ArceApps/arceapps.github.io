<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1a1030"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <marker id="arrowTeal" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#018786"/></marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#FF9800"/></marker>
    <marker id="arrowGray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/></marker>
  </defs>

  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse"><path d="M 60 0 L 0 0 0 60" fill="none" stroke="#1e293b" stroke-width="0.5" opacity="0.4"/></pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <text x="600" y="48" text-anchor="middle" font-family="monospace" font-size="26" font-weight="bold" fill="#f8fafc" filter="url(#glow)">How a Subagent Invocation Works</text>
  <text x="600" y="72" text-anchor="middle" font-family="monospace" font-size="13" fill="#64748b">From prompt to result · Parent ↔ child sessions</text>
  <line x1="350" y1="84" x2="850" y2="84" stroke="#1e293b" stroke-width="1"/>

  <!-- Pipeline track background -->
  <rect x="50" y="160" width="1100" height="120" rx="60" fill="#1e293b" opacity="0.25"/>

  <!-- Step 1: User prompt -->
  <rect x="60" y="170" width="160" height="100" rx="12" fill="#0F172A" stroke="#94a3b8" stroke-width="2"/>
  <text x="140" y="195" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#94a3b8">STEP 1</text>
  <text x="140" y="215" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="#f8fafc">User</text>
  <text x="140" y="232" text-anchor="middle" font-family="monospace" font-size="11" fill="#cbd5e1">prompt</text>
  <text x="140" y="252" text-anchor="middle" font-family="monospace" font-size="10" fill="#94a3b8">"@explore tell me</text>
  <text x="140" y="264" text-anchor="middle" font-family="monospace" font-size="10" fill="#94a3b8">the structure"</text>

  <line x1="220" y1="220" x2="270" y2="220" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowGray)"/>

  <!-- Step 2: Primary agent evaluates -->
  <rect x="280" y="170" width="180" height="100" rx="12" fill="#0F172A" stroke="#FF9800" stroke-width="2.5"/>
  <text x="370" y="195" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#FF9800">STEP 2</text>
  <text x="370" y="215" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="#f8fafc">Primary agent</text>
  <text x="370" y="232" text-anchor="middle" font-family="monospace" font-size="11" fill="#fbbf24">decides: subagent?</text>
  <text x="370" y="252" text-anchor="middle" font-family="monospace" font-size="10" fill="#cbd5e1">Build / Plan · Tab</text>
  <text x="370" y="264" text-anchor="middle" font-family="monospace" font-size="10" fill="#cbd5e1">to switch</text>

  <line x1="460" y1="220" x2="510" y2="220" stroke="#FF9800" stroke-width="2.5" marker-end="url(#arrowOrange)"/>

  <!-- Step 3: Spawn child session -->
  <rect x="520" y="170" width="200" height="100" rx="12" fill="#1e1145" stroke="#6366f1" stroke-width="2.5"/>
  <text x="620" y="195" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#818cf8">STEP 3</text>
  <text x="620" y="215" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="#f8fafc">Spawn child</text>
  <text x="620" y="232" text-anchor="middle" font-family="monospace" font-size="11" fill="#a5b4fc">session</text>
  <text x="620" y="252" text-anchor="middle" font-family="monospace" font-size="10" fill="#cbd5e1">prompt + context</text>
  <text x="620" y="264" text-anchor="middle" font-family="monospace" font-size="10" fill="#cbd5e1">→ new turn</text>

  <line x1="720" y1="220" x2="770" y2="220" stroke="#6366f1" stroke-width="2.5" marker-end="url(#arrowOrange)"/>

  <!-- Step 4: Subagent works -->
  <rect x="780" y="170" width="170" height="100" rx="12" fill="#0F172A" stroke="#018786" stroke-width="2.5"/>
  <text x="865" y="195" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#018786">STEP 4</text>
  <text x="865" y="215" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="#f8fafc">Subagent</text>
  <text x="865" y="232" text-anchor="middle" font-family="monospace" font-size="11" fill="#5eead4">works in isolation</text>
  <text x="865" y="252" text-anchor="middle" font-family="monospace" font-size="10" fill="#cbd5e1">tools restricted by</text>
  <text x="865" y="264" text-anchor="middle" font-family="monospace" font-size="10" fill="#cbd5e1">permission</text>

  <line x1="950" y1="220" x2="1000" y2="220" stroke="#018786" stroke-width="2.5" marker-end="url(#arrowTeal)"/>

  <!-- Step 5: Result returns -->
  <rect x="1010" y="170" width="140" height="100" rx="12" fill="#0F172A" stroke="#34d399" stroke-width="2.5"/>
  <text x="1080" y="195" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#34d399">STEP 5</text>
  <text x="1080" y="215" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="#f8fafc">Result</text>
  <text x="1080" y="232" text-anchor="middle" font-family="monospace" font-size="11" fill="#6ee7b7">returns to parent</text>

  <!-- Return loop -->
  <path d="M 1080 270 L 1080 350 L 370 350 L 370 270" fill="none" stroke="#34d399" stroke-width="2" stroke-dasharray="5,4" marker-end="url(#arrowOrange)"/>
  <text x="725" y="345" text-anchor="middle" font-family="monospace" font-size="11" font-style="italic" fill="#34d399">summarized result → parent context</text>

  <!-- Invocation modes -->
  <rect x="50" y="395" width="540" height="180" rx="12" fill="#0F172A" stroke="#1e293b" stroke-width="1.5"/>
  <text x="80" y="425" font-family="monospace" font-size="14" font-weight="bold" fill="#f8fafc">Two invocation modes</text>

  <rect x="80" y="445" width="160" height="40" rx="8" fill="#FF9800" opacity="0.18"/>
  <text x="160" y="470" text-anchor="middle" font-family="monospace" font-size="13" font-weight="bold" fill="#FF9800">@ — MANUAL</text>
  <text x="80" y="505" font-family="monospace" font-size="10" fill="#cbd5e1">▸ You name the subagent in</text>
  <text x="92" y="520" font-family="monospace" font-size="10" fill="#cbd5e1">the prompt with @</text>
  <text x="80" y="540" font-family="monospace" font-size="10" fill="#cbd5e1">▸ Explicit decision, zero</text>
  <text x="92" y="555" font-family="monospace" font-size="10" fill="#cbd5e1">ambiguity</text>
  <text x="80" y="568" font-family="monospace" font-size="10" fill="#cbd5e1">▸ Use it when you know</text>
  <text x="92" y="582" font-family="monospace" font-size="10" fill="#cbd5e1">what you want</text>

  <rect x="320" y="445" width="220" height="40" rx="8" fill="#6366f1" opacity="0.18"/>
  <text x="430" y="470" text-anchor="middle" font-family="monospace" font-size="13" font-weight="bold" fill="#818cf8">AUTOMATIC — MODEL DECIDES</text>
  <text x="320" y="505" font-family="monospace" font-size="10" fill="#cbd5e1">▸ Primary agent reads each</text>
  <text x="332" y="520" font-family="monospace" font-size="10" fill="#cbd5e1">subagent's description</text>
  <text x="320" y="540" font-family="monospace" font-size="10" fill="#cbd5e1">▸ Decides on its own if it's</text>
  <text x="320" y="568" font-family="monospace" font-size="10" fill="#cbd5e1">▸ Model-dependent</text>

  <!-- Session navigation -->
  <rect x="620" y="395" width="530" height="180" rx="12" fill="#0F172A" stroke="#1e293b" stroke-width="1.5"/>
  <text x="650" y="425" font-family="monospace" font-size="14" font-weight="bold" fill="#f8fafc">Session navigation</text>

  <text x="650" y="455" font-family="monospace" font-size="11" fill="#cbd5e1">▸ Parent → first child:</text>
  <text x="660" y="472" font-family="monospace" font-size="10" fill="#FF9800">&lt;Leader&gt;+Down</text>

  <text x="650" y="500" font-family="monospace" font-size="11" fill="#cbd5e1">▸ Cycle between children:</text>
  <text x="660" y="517" font-family="monospace" font-size="10" fill="#FF9800">Right / Left</text>

  <text x="650" y="545" font-family="monospace" font-size="11" fill="#cbd5e1">▸ Return to parent:</text>
  <text x="660" y="562" font-family="monospace" font-size="10" fill="#FF9800">Up</text>
  <text x="650" y="585" font-family="monospace" font-size="10" font-style="italic" fill="#64748b">This turns isolated agents into a collaborative system</text>

  <!-- Footer -->
  <text x="600" y="610" text-anchor="middle" font-family="monospace" font-size="10" fill="#475569">ARCEAPPS · opencode-subagents · 2026</text>
</svg>
