<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d2240;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#018786;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#01bfbd;stop-opacity:0.6" />
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF9800;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#FFb74d;stop-opacity:0.6" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="500" fill="url(#bgGrad)"/>

  <!-- Subtle grid lines -->
  <g opacity="0.06" stroke="#018786" stroke-width="1">
    <line x1="0" y1="100" x2="900" y2="100"/>
    <line x1="0" y1="200" x2="900" y2="200"/>
    <line x1="0" y1="300" x2="900" y2="300"/>
    <line x1="0" y1="400" x2="900" y2="400"/>
    <line x1="150" y1="0" x2="150" y2="500"/>
    <line x1="300" y1="0" x2="300" y2="500"/>
    <line x1="450" y1="0" x2="450" y2="500"/>
    <line x1="600" y1="0" x2="600" y2="500"/>
    <line x1="750" y1="0" x2="750" y2="500"/>
  </g>

  <!-- Central node - large hexagon representing convergence -->
  <polygon points="450,170 510,205 510,275 450,310 390,275 390,205"
           fill="none" stroke="#018786" stroke-width="2.5" opacity="0.8" filter="url(#glow)"/>
  <polygon points="450,185 495,210 495,260 450,285 405,260 405,210"
           fill="#018786" opacity="0.15"/>

  <!-- IDD Node - top left -->
  <circle cx="180" cy="140" r="42" fill="none" stroke="#018786" stroke-width="2" opacity="0.7" filter="url(#glow)"/>
  <circle cx="180" cy="140" r="30" fill="#018786" opacity="0.2"/>
  <text x="180" y="135" text-anchor="middle" fill="#01bfbd" font-family="monospace" font-size="11" font-weight="bold">IDD</text>
  <text x="180" y="150" text-anchor="middle" fill="#80cbc4" font-family="monospace" font-size="8">INTENT</text>
  <text x="180" y="163" text-anchor="middle" fill="#80cbc4" font-family="monospace" font-size="8">DRIVEN</text>

  <!-- Lean SDD Node - top right -->
  <circle cx="720" cy="140" r="42" fill="none" stroke="#FF9800" stroke-width="2" opacity="0.7" filter="url(#glow)"/>
  <circle cx="720" cy="140" r="30" fill="#FF9800" opacity="0.15"/>
  <text x="720" y="133" text-anchor="middle" fill="#FFb74d" font-family="monospace" font-size="10" font-weight="bold">LEAN</text>
  <text x="720" y="148" text-anchor="middle" fill="#FFb74d" font-family="monospace" font-size="10" font-weight="bold">SDD</text>

  <!-- BEADS Node - left -->
  <circle cx="110" cy="300" r="42" fill="none" stroke="#FF9800" stroke-width="2" opacity="0.7" filter="url(#glow)"/>
  <circle cx="110" cy="300" r="30" fill="#FF9800" opacity="0.15"/>
  <text x="110" y="295" text-anchor="middle" fill="#FFb74d" font-family="monospace" font-size="11" font-weight="bold">BEADS</text>
  <text x="110" y="310" text-anchor="middle" fill="#ffe0b2" font-family="monospace" font-size="7">WORKFLOW</text>

  <!-- Dark Factory Node - right -->
  <circle cx="790" cy="300" r="42" fill="none" stroke="#018786" stroke-width="2" opacity="0.7" filter="url(#glow)"/>
  <circle cx="790" cy="300" r="30" fill="#018786" opacity="0.2"/>
  <text x="790" y="293" text-anchor="middle" fill="#01bfbd" font-family="monospace" font-size="9" font-weight="bold">DARK</text>
  <text x="790" y="307" text-anchor="middle" fill="#01bfbd" font-family="monospace" font-size="9" font-weight="bold">FACTORY</text>

  <!-- Task Master Node - bottom center -->
  <circle cx="450" cy="430" r="42" fill="none" stroke="#FF9800" stroke-width="2" opacity="0.7" filter="url(#glow)"/>
  <circle cx="450" cy="430" r="30" fill="#FF9800" opacity="0.15"/>
  <text x="450" y="425" text-anchor="middle" fill="#FFb74d" font-family="monospace" font-size="8" font-weight="bold">TASK</text>
  <text x="450" y="439" text-anchor="middle" fill="#FFb74d" font-family="monospace" font-size="8" font-weight="bold">MASTER</text>

  <!-- Connection lines from nodes to center -->
  <!-- IDD to center -->
  <line x1="218" y1="163" x2="392" y2="208" stroke="#018786" stroke-width="1.5" opacity="0.5" stroke-dasharray="5,3"/>

  <!-- Lean SDD to center -->
  <line x1="682" y1="163" x2="508" y2="208" stroke="#FF9800" stroke-width="1.5" opacity="0.5" stroke-dasharray="5,3"/>

  <!-- BEADS to center -->
  <line x1="148" y1="278" x2="393" y2="250" stroke="#FF9800" stroke-width="1.5" opacity="0.5" stroke-dasharray="5,3"/>

  <!-- Dark Factory to center -->
  <line x1="752" y1="278" x2="507" y2="250" stroke="#018786" stroke-width="1.5" opacity="0.5" stroke-dasharray="5,3"/>

  <!-- Task Master to center -->
  <line x1="450" y1="388" x2="450" y2="311" stroke="#FF9800" stroke-width="1.5" opacity="0.5" stroke-dasharray="5,3"/>

  <!-- FORGE tag near IDD -->
  <rect x="210" y="105" width="60" height="18" rx="4" fill="#018786" opacity="0.4"/>
  <text x="240" y="118" text-anchor="middle" fill="#e0f2f1" font-family="monospace" font-size="8">FORGE</text>

  <!-- Agent OS tag near Dark Factory -->
  <rect x="755" y="248" width="70" height="18" rx="4" fill="#018786" opacity="0.4"/>
  <text x="790" y="261" text-anchor="middle" fill="#e0f2f1" font-family="monospace" font-size="8">AGENT-OS</text>

  <!-- Decorative small dots/nodes -->
  <circle cx="320" cy="100" r="5" fill="#018786" opacity="0.5"/>
  <circle cx="580" cy="100" r="5" fill="#FF9800" opacity="0.5"/>
  <circle cx="240" cy="380" r="5" fill="#FF9800" opacity="0.4"/>
  <circle cx="660" cy="380" r="5" fill="#018786" opacity="0.4"/>

  <!-- Title text at bottom -->
  <text x="450" y="490" text-anchor="middle" fill="#546e7a" font-family="monospace" font-size="11" letter-spacing="3">ALTERNATIVE PARADIGMS · AI-ASSISTED ENGINEERING</text>

  <!-- Subtle outer glow ring -->
  <circle cx="450" cy="240" r="200" fill="none" stroke="#018786" stroke-width="0.5" opacity="0.15"/>
  <circle cx="450" cy="240" r="240" fill="none" stroke="#FF9800" stroke-width="0.5" opacity="0.1"/>
</svg>
