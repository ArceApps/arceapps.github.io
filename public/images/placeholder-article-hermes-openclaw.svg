<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1a1a"/>
      <stop offset="100%" style="stop-color:#1a2f2f"/>
    </linearGradient>
    <linearGradient id="hermesGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#018786"/>
      <stop offset="100%" style="stop-color:#00b3a8"/>
    </linearGradient>
    <linearGradient id="openclawGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF9800"/>
      <stop offset="100%" style="stop-color:#ffb74d"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <g stroke="#018786" stroke-width="0.5" opacity="0.15">
    <line x1="0" y1="0" x2="800" y2="400"/>
    <line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="0" y1="240" x2="800" y2="240"/>
    <line x1="0" y1="320" x2="800" y2="320"/>
    <line x1="100" y1="0" x2="100" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="300" y1="0" x2="300" y2="400"/>
    <line x1="400" y1="0" x2="400" y2="400"/>
    <line x1="500" y1="0" x2="500" y2="400"/>
    <line x1="600" y1="0" x2="600" y2="400"/>
    <line x1="700" y1="0" x2="700" y2="400"/>
  </g>

  <!-- Hermes side (left) - teal -->
  <g transform="translate(80, 200)">
    <!-- Hermes wing symbol -->
    <path d="M0,-80 Q60,-60 100,0 Q60,60 0,80 Q-40,40 -60,0 Q-40,-40 0,-80Z" fill="url(#hermesGrad)" opacity="0.9"/>
    <path d="M-5,-60 Q40,-40 70,0 Q40,40 -5,60 Q-30,30 -45,0 Q-30,-30 -5,-60Z" fill="#0a1a1a" opacity="0.4"/>
    <path d="M-10,-40 Q25,-25 45,0 Q25,25 -10,40 Q-20,20 -30,0 Q-20,-20 -10,-40Z" fill="url(#hermesGrad)" opacity="0.6"/>
    <circle cx="-25" cy="0" r="8" fill="#018786"/>
    <circle cx="-25" cy="0" r="4" fill="#00b3a8"/>
  </g>

  <!-- VS symbol -->
  <g transform="translate(400, 200)">
    <circle cx="0" cy="0" r="40" fill="none" stroke="#FF9800" stroke-width="2" opacity="0.8"/>
    <text x="0" y="8" text-anchor="middle" fill="#FF9800" font-family="Arial" font-size="20" font-weight="bold">VS</text>
  </g>

  <!-- OpenClaw side (right) - orange -->
  <g transform="translate(720, 200)">
    <!-- Claw symbol -->
    <path d="M0,-70 L-15,-50 L-40,-20 L-25,0 L-50,30 L-20,10 L-10,40 L0,10Z" fill="url(#openclawGrad)" opacity="0.9"/>
    <path d="M0,-70 L20,-50 L45,-20 L25,0 L50,30 L20,10 L10,40 L0,10Z" fill="url(#openclawGrad)" opacity="0.9"/>
    <path d="M-5,-50 L5,-30 L0,-10Z" fill="#0a1a1a" opacity="0.3"/>
    <circle cx="25" cy="-60" r="6" fill="#FF9800"/>
  </g>

  <!-- Connecting line -->
  <line x1="220" y1="200" x2="340" y2="200" stroke="#018786" stroke-width="1" stroke-dasharray="5,5" opacity="0.4"/>
  <line x1="460" y1="200" x2="580" y2="200" stroke="#FF9800" stroke-width="1" stroke-dasharray="5,5" opacity="0.4"/>

  <!-- Bottom labels -->
  <text x="200" y="360" text-anchor="middle" fill="#018786" font-family="Arial" font-size="16" font-weight="bold">HERMES AI</text>
  <text x="400" y="380" text-anchor="middle" fill="#666" font-family="Arial" font-size="11">Autonomous Agent Framework</text>
  <text x="600" y="360" text-anchor="middle" fill="#FF9800" font-family="Arial" font-size="16" font-weight="bold">OPENCLAW</text>

  <!-- Top decorative element -->
  <rect x="350" y="50" width="100" height="4" rx="2" fill="url(#hermesGrad)" opacity="0.6"/>
  <rect x="350" y="56" width="100" height="4" rx="2" fill="url(#openclawGrad)" opacity="0.6"/>
</svg>