<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#011f1f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#012a2a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#018786;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#01cfcc;stop-opacity:0.7" />
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF9800;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFc947;stop-opacity:0.7" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g opacity="0.06" stroke="#018786" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="150" y1="0" x2="150" y2="630"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="450" y1="0" x2="450" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="750" y1="0" x2="750" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="1050" y1="0" x2="1050" y2="630"/>
  </g>

  <!-- DAG Edge lines - connecting the nodes -->
  <!-- Layer 0 -> Layer 1 -->
  <line x1="200" y1="315" x2="380" y2="210" stroke="#018786" stroke-width="2" opacity="0.6"/>
  <line x1="200" y1="315" x2="380" y2="420" stroke="#018786" stroke-width="2" opacity="0.6"/>

  <!-- Layer 1 -> Layer 2 -->
  <line x1="420" y1="210" x2="600" y2="160" stroke="#018786" stroke-width="2" opacity="0.6"/>
  <line x1="420" y1="210" x2="600" y2="315" stroke="#018786" stroke-width="2" opacity="0.6"/>
  <line x1="420" y1="420" x2="600" y2="315" stroke="#018786" stroke-width="2" opacity="0.6"/>
  <line x1="420" y1="420" x2="600" y2="470" stroke="#018786" stroke-width="2" opacity="0.6"/>

  <!-- Layer 2 -> Layer 3 -->
  <line x1="640" y1="160" x2="820" y2="210" stroke="#FF9800" stroke-width="2" opacity="0.5"/>
  <line x1="640" y1="315" x2="820" y2="210" stroke="#FF9800" stroke-width="2" opacity="0.5"/>
  <line x1="640" y1="315" x2="820" y2="420" stroke="#FF9800" stroke-width="2" opacity="0.5"/>
  <line x1="640" y1="470" x2="820" y2="420" stroke="#FF9800" stroke-width="2" opacity="0.5"/>

  <!-- Layer 3 -> Layer 4 -->
  <line x1="860" y1="210" x2="1000" y2="315" stroke="#018786" stroke-width="2" opacity="0.6"/>
  <line x1="860" y1="420" x2="1000" y2="315" stroke="#018786" stroke-width="2" opacity="0.6"/>

  <!-- Arrow markers at ends -->
  <circle cx="380" cy="210" r="4" fill="#018786" opacity="0.8"/>
  <circle cx="380" cy="420" r="4" fill="#018786" opacity="0.8"/>
  <circle cx="600" cy="160" r="4" fill="#018786" opacity="0.8"/>
  <circle cx="600" cy="315" r="4" fill="#018786" opacity="0.8"/>
  <circle cx="600" cy="470" r="4" fill="#018786" opacity="0.8"/>
  <circle cx="820" cy="210" r="4" fill="#FF9800" opacity="0.8"/>
  <circle cx="820" cy="420" r="4" fill="#FF9800" opacity="0.8"/>
  <circle cx="1000" cy="315" r="4" fill="#018786" opacity="0.8"/>

  <!-- DAG Nodes - Layer 0 (Start) -->
  <circle cx="200" cy="315" r="28" fill="none" stroke="url(#tealGrad)" stroke-width="3" filter="url(#glow)"/>
  <circle cx="200" cy="315" r="16" fill="#018786" opacity="0.8"/>

  <!-- DAG Nodes - Layer 1 -->
  <rect x="355" y="185" width="50" height="50" rx="8" fill="none" stroke="url(#tealGrad)" stroke-width="2.5" filter="url(#glow)"/>
  <rect x="363" y="193" width="34" height="34" rx="5" fill="#018786" opacity="0.6"/>
  <rect x="355" y="395" width="50" height="50" rx="8" fill="none" stroke="url(#tealGrad)" stroke-width="2.5" filter="url(#glow)"/>
  <rect x="363" y="403" width="34" height="34" rx="5" fill="#018786" opacity="0.6"/>

  <!-- DAG Nodes - Layer 2 (orange accent) -->
  <polygon points="600,130 625,175 575,175" fill="none" stroke="url(#orangeGrad)" stroke-width="2.5" filter="url(#glow)"/>
  <polygon points="600,140 618,170 582,170" fill="#FF9800" opacity="0.5"/>

  <circle cx="620" cy="315" r="26" fill="none" stroke="url(#orangeGrad)" stroke-width="2.5" filter="url(#glow)"/>
  <circle cx="620" cy="315" r="15" fill="#FF9800" opacity="0.5"/>

  <polygon points="600,445 625,490 575,490" fill="none" stroke="url(#orangeGrad)" stroke-width="2.5" filter="url(#glow)"/>
  <polygon points="600,455 618,485 582,485" fill="#FF9800" opacity="0.5"/>

  <!-- DAG Nodes - Layer 3 -->
  <rect x="797" y="185" width="50" height="50" rx="25" fill="none" stroke="url(#tealGrad)" stroke-width="2.5" filter="url(#glow)"/>
  <rect x="807" y="195" width="30" height="30" rx="15" fill="#018786" opacity="0.7"/>
  <rect x="797" y="395" width="50" height="50" rx="25" fill="none" stroke="url(#tealGrad)" stroke-width="2.5" filter="url(#glow)"/>
  <rect x="807" y="405" width="30" height="30" rx="15" fill="#018786" opacity="0.7"/>

  <!-- DAG Nodes - Layer 4 (End) -->
  <circle cx="1000" cy="315" r="32" fill="none" stroke="url(#orangeGrad)" stroke-width="3" filter="url(#softglow)"/>
  <circle cx="1000" cy="315" r="20" fill="#FF9800" opacity="0.7"/>
  <circle cx="1000" cy="315" r="10" fill="#FF9800" opacity="0.9"/>

  <!-- Floating accent dots -->
  <circle cx="100" cy="100" r="3" fill="#018786" opacity="0.4"/>
  <circle cx="130" cy="150" r="2" fill="#FF9800" opacity="0.3"/>
  <circle cx="80" cy="500" r="3" fill="#018786" opacity="0.4"/>
  <circle cx="1100" cy="120" r="3" fill="#FF9800" opacity="0.4"/>
  <circle cx="1150" cy="500" r="2" fill="#018786" opacity="0.3"/>
  <circle cx="1080" cy="180" r="2" fill="#FF9800" opacity="0.35"/>

  <!-- Label: Beads -->
  <text x="380" y="270" font-family="'Courier New', monospace" font-size="13" fill="#018786" opacity="0.9" text-anchor="middle" filter="url(#glow)">Beads</text>

  <!-- Label: LeanSpec -->
  <text x="620" y="540" font-family="'Courier New', monospace" font-size="13" fill="#FF9800" opacity="0.9" text-anchor="middle" filter="url(#glow)">LeanSpec</text>

  <!-- Label: Taskmaster -->
  <text x="822" y="480" font-family="'Courier New', monospace" font-size="13" fill="#018786" opacity="0.9" text-anchor="middle" filter="url(#glow)">Taskmaster</text>

  <!-- Main title area - bottom left decorative bar -->
  <rect x="60" y="560" width="160" height="4" rx="2" fill="url(#tealGrad)" opacity="0.8"/>
  <rect x="60" y="570" width="80" height="2" rx="1" fill="url(#orangeGrad)" opacity="0.6"/>

  <!-- Top right decorative corner -->
  <rect x="1100" y="40" width="60" height="3" rx="1.5" fill="url(#tealGrad)" opacity="0.5"/>
  <rect x="1140" y="46" width="20" height="2" rx="1" fill="url(#orangeGrad)" opacity="0.4"/>

  <!-- Subtle pulse rings on center node -->
  <circle cx="1000" cy="315" r="44" fill="none" stroke="#FF9800" stroke-width="1" opacity="0.2"/>
  <circle cx="1000" cy="315" r="58" fill="none" stroke="#FF9800" stroke-width="1" opacity="0.1"/>

  <!-- Small hexagonal detail - top center -->
  <polygon points="600,42 618,52 618,72 600,82 582,72 582,52" fill="none" stroke="#018786" stroke-width="1.5" opacity="0.35"/>
  <polygon points="600,52 612,59 612,73 600,80 588,73 588,59" fill="#018786" opacity="0.1"/>

  <!-- Bottom-right hexagon accent -->
  <polygon points="1140,540 1158,550 1158,570 1140,580 1122,570 1122,550" fill="none" stroke="#FF9800" stroke-width="1.5" opacity="0.3"/>
</svg>
