<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0F172A"/><stop offset="100%" stop-color="#0a1a1a"/></linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/></marker>
  </defs>

  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse"><path d="M 60 0 L 0 0 0 60" fill="none" stroke="#1e293b" stroke-width="0.5" opacity="0.4"/></pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <text x="600" y="52" text-anchor="middle" font-family="monospace" font-size="28" font-weight="bold" fill="#f8fafc" filter="url(#glow)">Spec Kit — Pipeline SDD Determinista</text>
  <text x="600" y="76" text-anchor="middle" font-family="monospace" font-size="13" fill="#64748b">El paradigma "el spec es sagrado" · Lineal, auditable, repetible</text>
  <line x1="300" y1="88" x2="900" y2="88" stroke="#1e293b" stroke-width="1"/>

  <rect x="60" y="250" width="1080" height="130" rx="10" fill="#0d332e" opacity="0.3" stroke="#018786" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Phase 1 -->
  <rect x="85" y="200" width="175" height="100" rx="12" fill="#0F172A" stroke="#f59e0b" stroke-width="2"/>
  <text x="172" y="235" text-anchor="middle" font-family="monospace" font-size="14" font-weight="bold" fill="#fbbf24">📝 Requisitos</text>
  <text x="172" y="258" text-anchor="middle" font-family="monospace" font-size="10" fill="#94a3b8">Historias de usuario</text>
  <text x="172" y="275" text-anchor="middle" font-family="monospace" font-size="10" fill="#94a3b8">Criterios de aceptación</text>
  <line x1="260" y1="250" x2="320" y2="250" stroke="#34d399" stroke-width="2.5" marker-end="url(#arrowGreen)"/>

  <!-- Phase 2 -->
  <rect x="330" y="195" width="195" height="110" rx="14" fill="#0a3320" stroke="#34d399" stroke-width="3"/>
  <text x="427" y="230" text-anchor="middle" font-family="monospace" font-size="16" font-weight="bold" fill="#6ee7b7">📋 SPEC.md</text>
  <text x="427" y="255" text-anchor="middle" font-family="monospace" font-size="10" fill="#34d399">Especificación formal</text>
  <text x="427" y="275" text-anchor="middle" font-family="monospace" font-size="10" fill="#34d399">Contrato inmutable</text>
  <line x1="525" y1="250" x2="590" y2="250" stroke="#34d399" stroke-width="2.5" marker-end="url(#arrowGreen)"/>

  <!-- Phase 3 -->
  <rect x="600" y="195" width="175" height="110" rx="12" fill="#0F172A" stroke="#06b6d4" stroke-width="2"/>
  <text x="687" y="230" text-anchor="middle" font-family="monospace" font-size="14" font-weight="bold" fill="#22d3ee">⚙️ Gen Código</text>
  <text x="687" y="255" text-anchor="middle" font-family="monospace" font-size="10" fill="#94a3b8">El agente IA genera</text>
  <text x="687" y="275" text-anchor="middle" font-family="monospace" font-size="10" fill="#94a3b8">Conformidad estricta</text>
  <line x1="775" y1="250" x2="840" y2="250" stroke="#34d399" stroke-width="2.5" marker-end="url(#arrowGreen)"/>

  <!-- Phase 4 -->
  <rect x="850" y="195" width="175" height="110" rx="12" fill="#0F172A" stroke="#a78bfa" stroke-width="2"/>
  <text x="937" y="230" text-anchor="middle" font-family="monospace" font-size="14" font-weight="bold" fill="#a78bfa">✅ Validar</text>
  <text x="937" y="255" text-anchor="middle" font-family="monospace" font-size="10" fill="#94a3b8">Tests + linting</text>
  <text x="937" y="275" text-anchor="middle" font-family="monospace" font-size="10" fill="#94a3b8">Cumplimiento spec</text>
  <line x1="1025" y1="250" x2="1060" y2="250" stroke="#34d399" stroke-width="2.5" marker-end="url(#arrowGreen)"/>

  <!-- Phase 5 -->
  <rect x="1065" y="205" width="90" height="90" rx="12" fill="#0F172A" stroke="#FF9800" stroke-width="2"/>
  <text x="1110" y="248" text-anchor="middle" font-family="monospace" font-size="13" font-weight="bold" fill="#FFB74D">🚀</text>
  <text x="1110" y="270" text-anchor="middle" font-family="monospace" font-size="10" fill="#FF9800">Publicar</text>

  <!-- Strengths -->
  <rect x="60" y="400" width="340" height="185" rx="10" fill="#0d332e" stroke="#34d399" stroke-width="1.5"/>
  <text x="230" y="435" text-anchor="middle" font-family="monospace" font-size="15" font-weight="bold" fill="#34d399">💪 Fortalezas</text>
  <line x1="85" y1="448" x2="375" y2="448" stroke="#018786" stroke-width="0.5"/>
  <circle cx="85" cy="472" r="4" fill="#34d399"/><text x="100" y="476" font-family="monospace" font-size="11" fill="#cbd5e1">Previene el "spec drift"</text>
  <circle cx="85" cy="498" r="4" fill="#34d399"/><text x="100" y="502" font-family="monospace" font-size="11" fill="#cbd5e1">Salida auditable y determinista</text>
  <circle cx="85" cy="524" r="4" fill="#34d399"/><text x="100" y="528" font-family="monospace" font-size="11" fill="#cbd5e1">CI/CD friendly — builds consistentes</text>
  <circle cx="85" cy="550" r="4" fill="#34d399"/><text x="100" y="554" font-family="monospace" font-size="11" fill="#cbd5e1">Ideal para entornos regulados</text>
  <circle cx="85" cy="572" r="4" fill="#34d399"/><text x="100" y="576" font-family="monospace" font-size="11" fill="#cbd5e1">Trazabilidad nivel empresarial</text>

  <!-- Weaknesses -->
  <rect x="430" y="400" width="340" height="185" rx="10" fill="#1a1010" stroke="#ef4444" stroke-width="1.5"/>
  <text x="600" y="435" text-anchor="middle" font-family="monospace" font-size="15" font-weight="bold" fill="#ef4444">⚠️ Debilidades</text>
  <line x1="455" y1="448" x2="745" y2="448" stroke="#ef4444" stroke-width="0.5"/>
  <circle cx="455" cy="472" r="4" fill="#ef4444"/><text x="470" y="476" font-family="monospace" font-size="11" fill="#cbd5e1">Basura entra → Basura sale</text>
  <circle cx="455" cy="498" r="4" fill="#ef4444"/><text x="470" y="502" font-family="monospace" font-size="11" fill="#cbd5e1">Asume que el humano sabe todo</text>
  <circle cx="455" cy="524" r="4" fill="#ef4444"/><text x="470" y="528" font-family="monospace" font-size="11" fill="#cbd5e1">Sin verificación adversarial previa</text>
  <circle cx="455" cy="550" r="4" fill="#ef4444"/><text x="470" y="554" font-family="monospace" font-size="11" fill="#cbd5e1">Fallos arquitectónicos silenciosos</text>
  <circle cx="455" cy="572" r="4" fill="#ef4444"/><text x="470" y="576" font-family="monospace" font-size="11" fill="#cbd5e1">Correcciones tardías costosas</text>

  <!-- Best For -->
  <rect x="800" y="400" width="340" height="185" rx="10" fill="#0F172A" stroke="#FF9800" stroke-width="1.5"/>
  <text x="970" y="435" text-anchor="middle" font-family="monospace" font-size="15" font-weight="bold" fill="#FFB74D">🎯 Ideal Para</text>
  <line x1="825" y1="448" x2="1115" y2="448" stroke="#FF9800" stroke-width="0.5"/>
  <circle cx="825" cy="472" r="4" fill="#FF9800"/><text x="840" y="476" font-family="monospace" font-size="11" fill="#cbd5e1">Requisitos bien definidos y estables</text>
  <circle cx="825" cy="498" r="4" fill="#FF9800"/><text x="840" y="502" font-family="monospace" font-size="11" fill="#cbd5e1">Finanzas / Salud / Gobierno</text>
  <circle cx="825" cy="524" r="4" fill="#FF9800"/><text x="840" y="528" font-family="monospace" font-size="11" fill="#cbd5e1">Equipos con necesidad de auditoría</text>
  <circle cx="825" cy="550" r="4" fill="#FF9800"/><text x="840" y="554" font-family="monospace" font-size="11" fill="#cbd5e1">Equipos grandes con reviews formales</text>
  <circle cx="825" cy="572" r="4" fill="#FF9800"/><text x="840" y="576" font-family="monospace" font-size="11" fill="#cbd5e1">Proyectos de alcance fijo</text>

  <rect x="0" y="600" width="1200" height="30" fill="#018786" opacity="0.12"/>
  <text x="600" y="620" text-anchor="middle" font-family="monospace" font-size="10" fill="#64748b">Spec Kit — github.com/anthropics/spec-kit · Pipeline SDD determinista, lineal y auditable</text>
</svg>