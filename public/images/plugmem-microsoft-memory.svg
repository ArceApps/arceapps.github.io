<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0d1117"/>

  <!-- Subtle grid -->
  <g stroke="#1a2233" stroke-width="1" opacity="0.5">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Central memory graph - nodes connected in a graph pattern -->
  <!-- Core node (center) -->
  <circle cx="600" cy="315" r="52" fill="#018786" opacity="0.18"/>
  <circle cx="600" cy="315" r="34" fill="none" stroke="#018786" stroke-width="2.5"/>
  <circle cx="600" cy="315" r="8" fill="#018786"/>

  <!-- Satellite nodes -->
  <!-- Top -->
  <circle cx="600" cy="175" r="22" fill="none" stroke="#FF9800" stroke-width="2"/>
  <circle cx="600" cy="175" r="6" fill="#FF9800"/>
  <line x1="600" y1="281" x2="600" y2="197" stroke="#018786" stroke-width="1.5" opacity="0.7"/>

  <!-- Bottom -->
  <circle cx="600" cy="455" r="22" fill="none" stroke="#FF9800" stroke-width="2"/>
  <circle cx="600" cy="455" r="6" fill="#FF9800"/>
  <line x1="600" y1="349" x2="600" y2="433" stroke="#018786" stroke-width="1.5" opacity="0.7"/>

  <!-- Left -->
  <circle cx="430" cy="315" r="22" fill="none" stroke="#FF9800" stroke-width="2"/>
  <circle cx="430" cy="315" r="6" fill="#FF9800"/>
  <line x1="466" y1="315" x2="408" y2="315" stroke="#018786" stroke-width="1.5" opacity="0.7"/>

  <!-- Right -->
  <circle cx="770" cy="315" r="22" fill="none" stroke="#FF9800" stroke-width="2"/>
  <circle cx="770" cy="315" r="6" fill="#FF9800"/>
  <line x1="634" y1="315" x2="748" y2="315" stroke="#018786" stroke-width="1.5" opacity="0.7"/>

  <!-- Diagonal nodes -->
  <!-- Top-left -->
  <circle cx="460" cy="205" r="18" fill="none" stroke="#018786" stroke-width="1.8" opacity="0.8"/>
  <circle cx="460" cy="205" r="5" fill="#018786" opacity="0.8"/>
  <line x1="481" y1="220" x2="579" y2="299" stroke="#018786" stroke-width="1" opacity="0.4"/>
  <line x1="460" y1="223" x2="460" y2="293" stroke="#FF9800" stroke-width="1" opacity="0.3"/>

  <!-- Top-right -->
  <circle cx="740" cy="205" r="18" fill="none" stroke="#018786" stroke-width="1.8" opacity="0.8"/>
  <circle cx="740" cy="205" r="5" fill="#018786" opacity="0.8"/>
  <line x1="719" y1="220" x2="621" y2="299" stroke="#018786" stroke-width="1" opacity="0.4"/>

  <!-- Bottom-left -->
  <circle cx="460" cy="425" r="18" fill="none" stroke="#018786" stroke-width="1.8" opacity="0.8"/>
  <circle cx="460" cy="425" r="5" fill="#018786" opacity="0.8"/>
  <line x1="481" y1="410" x2="579" y2="331" stroke="#018786" stroke-width="1" opacity="0.4"/>

  <!-- Bottom-right -->
  <circle cx="740" cy="425" r="18" fill="none" stroke="#018786" stroke-width="1.8" opacity="0.8"/>
  <circle cx="740" cy="425" r="5" fill="#018786" opacity="0.8"/>
  <line x1="719" y1="410" x2="621" y2="331" stroke="#018786" stroke-width="1" opacity="0.4"/>

  <!-- Three-component labels on the right side -->
  <!-- Structure box -->
  <rect x="860" y="200" width="160" height="52" rx="8" fill="none" stroke="#018786" stroke-width="1.5" opacity="0.7"/>
  <text x="940" y="220" text-anchor="middle" font-family="monospace" font-size="11" fill="#018786" opacity="0.9">STRUCTURE</text>
  <text x="940" y="238" text-anchor="middle" font-family="monospace" font-size="9" fill="#6b7280">Proposicional + Prescriptivo</text>

  <!-- Retrieval box -->
  <rect x="860" y="290" width="160" height="52" rx="8" fill="none" stroke="#FF9800" stroke-width="1.5" opacity="0.7"/>
  <text x="940" y="310" text-anchor="middle" font-family="monospace" font-size="11" fill="#FF9800" opacity="0.9">RETRIEVAL</text>
  <text x="940" y="328" text-anchor="middle" font-family="monospace" font-size="9" fill="#6b7280">Alineado con la tarea</text>

  <!-- Reasoning box -->
  <rect x="860" y="380" width="160" height="52" rx="8" fill="none" stroke="#018786" stroke-width="1.5" opacity="0.7"/>
  <text x="940" y="400" text-anchor="middle" font-family="monospace" font-size="11" fill="#018786" opacity="0.9">REASONING</text>
  <text x="940" y="418" text-anchor="middle" font-family="monospace" font-size="9" fill="#6b7280">Guía concisa al agente</text>

  <!-- Connecting lines from graph to boxes -->
  <line x1="792" y1="280" x2="860" y2="260" stroke="#018786" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
  <line x1="792" y1="315" x2="860" y2="316" stroke="#FF9800" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
  <line x1="792" y1="350" x2="860" y2="390" stroke="#018786" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>

  <!-- Left side: LLM Agent box -->
  <rect x="180" y="275" width="150" height="80" rx="10" fill="none" stroke="#FF9800" stroke-width="2" opacity="0.8"/>
  <text x="255" y="308" text-anchor="middle" font-family="monospace" font-size="13" fill="#FF9800">LLM</text>
  <text x="255" y="330" text-anchor="middle" font-family="monospace" font-size="11" fill="#FF9800" opacity="0.8">Agent</text>
  <!-- Arrow from agent to graph -->
  <line x1="330" y1="315" x2="408" y2="315" stroke="#FF9800" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.6"/>
  <polygon points="408,310 420,315 408,320" fill="#FF9800" opacity="0.6"/>

  <!-- Plugin tag on the graph -->
  <rect x="548" y="358" width="104" height="24" rx="12" fill="#018786" opacity="0.2"/>
  <rect x="548" y="358" width="104" height="24" rx="12" fill="none" stroke="#018786" stroke-width="1" opacity="0.6"/>
  <text x="600" y="374" text-anchor="middle" font-family="monospace" font-size="10" fill="#018786">PLUG-IN MODULE</text>

  <!-- Title area -->
  <text x="600" y="96" text-anchor="middle" font-family="monospace" font-size="32" font-weight="bold" fill="#ffffff" opacity="0.95" letter-spacing="2">PlugMem</text>
  <text x="600" y="128" text-anchor="middle" font-family="monospace" font-size="13" fill="#6b7280">Task-Agnostic Plugin Memory · Microsoft Research</text>

  <!-- Bottom tag line -->
  <text x="600" y="575" text-anchor="middle" font-family="monospace" font-size="11" fill="#6b7280">Memory Graph · Knowledge Units · LLM Agents</text>

  <!-- Subtle glow on center -->
  <circle cx="600" cy="315" r="80" fill="#018786" opacity="0.04"/>
</svg>
