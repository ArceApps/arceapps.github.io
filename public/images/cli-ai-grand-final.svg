<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#0F172A" />

  <!-- Background Grid -->
  <defs>
    <pattern id="smallGrid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1E293B" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#smallGrid)" />

  <!-- Trophy Icon in Background -->
  <path d="M500 200 L700 200 L650 350 C650 400 550 400 550 350 Z" fill="#FF9800" opacity="0.1" />
  <rect x="580" y="380" width="40" height="80" fill="#FF9800" opacity="0.1" />
  <rect x="540" y="460" width="120" height="30" fill="#FF9800" opacity="0.1" />

  <!-- Terminal Window -->
  <rect x="200" y="150" width="800" height="400" rx="15" fill="#1E293B" stroke="#FF9800" stroke-width="4" />

  <!-- Window Header -->
  <rect x="200" y="150" width="800" height="40" rx="15" fill="#FF9800" />
  <circle cx="230" cy="170" r="8" fill="#FF5F56" />
  <circle cx="260" cy="170" r="8" fill="#FFBD2E" />
  <circle cx="290" cy="170" r="8" fill="#27C93F" />

  <text x="600" y="177" font-family="monospace" font-size="20" text-anchor="middle" fill="#0F172A" font-weight="bold">AI Agents CLI - GRAND FINAL</text>

  <!-- Content -->
  <text x="240" y="240" font-family="monospace" font-size="24" fill="#018786" font-weight="bold">> match start --grand-final</text>
  <text x="240" y="290" font-family="monospace" font-size="22" fill="#94A3B8">Analyzing finalists...</text>

  <text x="350" y="380" font-family="monospace" font-size="36" fill="#FF9800" font-weight="bold" text-anchor="middle">THE FINAL 4</text>

  <rect x="250" y="420" width="700" height="80" fill="#0F172A" rx="10" stroke="#018786" stroke-width="2" />
  <text x="600" y="470" font-family="monospace" font-size="28" fill="#FFFFFF" font-weight="bold" text-anchor="middle">Who will win?</text>

  <!-- Blinking Cursor -->
  <rect x="440" y="520" width="15" height="30" fill="#018786">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite" />
  </rect>

</svg>