<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="AI CLI Grand Final cover">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B1220"/>
      <stop offset="50%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#0B1220"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFD27A"/>
      <stop offset="50%" stop-color="#FF9800"/>
      <stop offset="100%" stop-color="#C26200"/>
    </linearGradient>
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5DDDD3"/>
      <stop offset="100%" stop-color="#018786"/>
    </linearGradient>
    <radialGradient id="haloGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF9800" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#018786" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#018786" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1E293B" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.55"/>

  <!-- Decorative concentric halos around the trophy -->
  <circle cx="600" cy="290" r="260" fill="url(#haloGrad)"/>
  <circle cx="600" cy="290" r="200" fill="none" stroke="#018786" stroke-width="1" stroke-opacity="0.35"/>
  <circle cx="600" cy="290" r="160" fill="none" stroke="#FF9800" stroke-width="1" stroke-opacity="0.25"/>
  <circle cx="600" cy="290" r="120" fill="none" stroke="#018786" stroke-width="1" stroke-opacity="0.20"/>

  <!-- Diagonal connecting lines: 4 finalists to center -->
  <g stroke-linecap="round" opacity="0.85">
    <line x1="170" y1="120" x2="540" y2="270" stroke="#FF9800" stroke-width="2" stroke-dasharray="4 6"/>
    <line x1="1030" y1="120" x2="660" y2="270" stroke="#5DDDD3" stroke-width="2" stroke-dasharray="4 6"/>
    <line x1="170" y1="480" x2="540" y2="320" stroke="#5DDDD3" stroke-width="2" stroke-dasharray="4 6"/>
    <line x1="1030" y1="480" x2="660" y2="320" stroke="#FF9800" stroke-width="2" stroke-dasharray="4 6"/>
  </g>

  <!-- Top-left finalist: Aider (orange hexagon) -->
  <g transform="translate(110,80)">
    <polygon points="60,0 110,30 110,90 60,120 10,90 10,30" fill="none" stroke="#FF9800" stroke-width="2.5"/>
    <polygon points="60,18 92,38 92,82 60,102 28,82 28,38" fill="#FF9800" fill-opacity="0.18"/>
    <text x="60" y="68" text-anchor="middle" fill="#FF9800" font-family="ui-monospace, SFMono-Regular, monospace" font-size="16" font-weight="700">AIDER</text>
    <text x="60" y="86" text-anchor="middle" fill="#9CA3AF" font-family="ui-sans-serif, system-ui" font-size="10">agnostic · git-first</text>
  </g>

  <!-- Top-right finalist: Copilot CLI (teal square) -->
  <g transform="translate(970,80)">
    <rect x="10" y="0" width="120" height="120" rx="10" fill="none" stroke="#5DDDD3" stroke-width="2.5"/>
    <rect x="22" y="14" width="96" height="92" rx="6" fill="#018786" fill-opacity="0.18"/>
    <text x="70" y="60" text-anchor="middle" fill="#5DDDD3" font-family="ui-monospace, SFMono-Regular, monospace" font-size="13" font-weight="700">COPILOT</text>
    <text x="70" y="76" text-anchor="middle" fill="#5DDDD3" font-family="ui-monospace, SFMono-Regular, monospace" font-size="13" font-weight="700">CLI</text>
    <text x="70" y="96" text-anchor="middle" fill="#9CA3AF" font-family="ui-sans-serif, system-ui" font-size="10">native · GPT-5.2</text>
  </g>

  <!-- Bottom-left finalist: Cline (teal diamond) -->
  <g transform="translate(110,430)">
    <polygon points="70,0 130,60 70,120 10,60" fill="none" stroke="#5DDDD3" stroke-width="2.5"/>
    <polygon points="70,18 118,60 70,102 22,60" fill="#018786" fill-opacity="0.18"/>
    <text x="70" y="58" text-anchor="middle" fill="#5DDDD3" font-family="ui-monospace, SFMono-Regular, monospace" font-size="16" font-weight="700">CLINE</text>
    <text x="70" y="78" text-anchor="middle" fill="#9CA3AF" font-family="ui-sans-serif, system-ui" font-size="10">agnostic · agent</text>
  </g>

  <!-- Bottom-right finalist: Qwen Code (orange triangle) -->
  <g transform="translate(970,430)">
    <polygon points="60,0 120,110 0,110" fill="none" stroke="#FF9800" stroke-width="2.5"/>
    <polygon points="60,22 100,100 20,100" fill="#FF9800" fill-opacity="0.18"/>
    <text x="60" y="78" text-anchor="middle" fill="#FF9800" font-family="ui-monospace, SFMono-Regular, monospace" font-size="14" font-weight="700">QWEN CODE</text>
    <text x="60" y="96" text-anchor="middle" fill="#9CA3AF" font-family="ui-sans-serif, system-ui" font-size="10">native · Qwen 3.6</text>
  </g>

  <!-- Central Trophy -->
  <g transform="translate(600,290)" filter="url(#softGlow)">
    <!-- Crown rays -->
    <g stroke="#FF9800" stroke-width="1.5" stroke-opacity="0.6">
      <line x1="0" y1="-180" x2="0" y2="-130"/>
      <line x1="-127" y1="-127" x2="-92" y2="-92"/>
      <line x1="127" y1="-127" x2="92" y2="-92"/>
      <line x1="-160" y1="0" x2="-120" y2="0"/>
      <line x1="160" y1="0" x2="120" y2="0"/>
    </g>

    <!-- Trophy cup -->
    <path d="M -55 -60 L -55 10 Q -55 50 0 50 Q 55 50 55 10 L 55 -60 Z"
          fill="url(#goldGrad)" stroke="#FF9800" stroke-width="2"/>
    <!-- Trophy handles -->
    <path d="M -55 -40 Q -90 -40 -90 -10 Q -90 20 -55 20"
          fill="none" stroke="#FF9800" stroke-width="3"/>
    <path d="M 55 -40 Q 90 -40 90 -10 Q 90 20 55 20"
          fill="none" stroke="#FF9800" stroke-width="3"/>
    <!-- Trophy stem and base -->
    <rect x="-10" y="50" width="20" height="22" fill="url(#goldGrad)"/>
    <rect x="-38" y="72" width="76" height="14" rx="2" fill="url(#goldGrad)" stroke="#C26200" stroke-width="1"/>
    <rect x="-50" y="86" width="100" height="6" rx="2" fill="#018786"/>

    <!-- Crown inside the cup -->
    <g transform="translate(0,-30)" fill="#018786">
      <polygon points="-40,18 -28,0 -16,18 -4,0 4,18 16,0 28,18 40,0 40,22 -40,22"/>
      <circle cx="-28" cy="0" r="2.5"/>
      <circle cx="0" cy="-2" r="2.5"/>
      <circle cx="28" cy="0" r="2.5"/>
    </g>

    <!-- Sparkle around trophy -->
    <g fill="#FF9800">
      <circle cx="-110" cy="-70" r="3"/>
      <circle cx="105" cy="-80" r="2"/>
      <circle cx="-90" cy="50" r="2"/>
      <circle cx="100" cy="40" r="3"/>
    </g>
  </g>

  <!-- Title block at bottom -->
  <g transform="translate(600,540)" text-anchor="middle">
    <rect x="-260" y="-44" width="520" height="88" rx="6" fill="#0B1220" stroke="#018786" stroke-width="1.5"/>
    <text x="0" y="-8" fill="#5DDDD3" font-family="ui-sans-serif, system-ui" font-size="28" font-weight="800" letter-spacing="6">AI CLI GRAND FINAL</text>
    <line x1="-160" y1="2" x2="160" y2="2" stroke="#FF9800" stroke-width="1"/>
    <text x="0" y="22" fill="#9CA3AF" font-family="ui-monospace, SFMono-Regular, monospace" font-size="12" letter-spacing="3">FOUR FINALISTS · ONE CHAMPION · 2026</text>
  </g>

  <!-- Small brand mark top-left -->
  <g transform="translate(40,40)">
    <rect x="0" y="0" width="14" height="14" fill="#018786"/>
    <rect x="18" y="0" width="14" height="14" fill="#FF9800"/>
    <text x="0" y="34" fill="#9CA3AF" font-family="ui-monospace, SFMono-Regular, monospace" font-size="12" letter-spacing="2">arceapps</text>
  </g>

  <!-- Small badge top-right -->
  <g transform="translate(1040,40)">
    <rect x="0" y="0" width="120" height="28" rx="14" fill="none" stroke="#018786" stroke-width="1"/>
    <text x="60" y="18" text-anchor="middle" fill="#5DDDD3" font-family="ui-monospace, SFMono-Regular, monospace" font-size="11" letter-spacing="2">CHAMPIONSHIP · 2026</text>
  </g>
</svg>
