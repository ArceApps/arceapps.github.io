<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1a1030"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <marker id="arrowTeal" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#018786"/></marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#FF9800"/></marker>
    <marker id="arrowGray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/></marker>
  </defs>

  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse"><path d="M 60 0 L 0 0 0 60" fill="none" stroke="#1e293b" stroke-width="0.5" opacity="0.4"/></pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <text x="600" y="48" text-anchor="middle" font-family="monospace" font-size="26" font-weight="bold" fill="#f8fafc" filter="url(#glow)">Cómo funciona una invocación de subagente</text>
  <text x="600" y="72" text-anchor="middle" font-family="monospace" font-size="13" fill="#64748b">Del prompt al resultado · Sesiones padre ↔ hijo</text>
  <line x1="350" y1="84" x2="850" y2="84" stroke="#1e293b" stroke-width="1"/>

  <!-- Pipeline track background -->
  <rect x="50" y="160" width="1100" height="120" rx="60" fill="#1e293b" opacity="0.25"/>

  <!-- Step 1: Prompt del usuario -->
  <rect x="60" y="170" width="160" height="100" rx="12" fill="#0F172A" stroke="#94a3b8" stroke-width="2"/>
  <text x="140" y="195" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#94a3b8">PASO 1</text>
  <text x="140" y="215" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="#f8fafc">Prompt</text>
  <text x="140" y="232" text-anchor="middle" font-family="monospace" font-size="11" fill="#cbd5e1">del usuario</text>
  <text x="140" y="252" text-anchor="middle" font-family="monospace" font-size="10" fill="#94a3b8">«@explore dime</text>
  <text x="140" y="264" text-anchor="middle" font-family="monospace" font-size="10" fill="#94a3b8">la estructura»</text>

  <line x1="220" y1="220" x2="270" y2="220" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowGray)"/>

  <!-- Step 2: Agente primario evalúa -->
  <rect x="280" y="170" width="180" height="100" rx="12" fill="#0F172A" stroke="#FF9800" stroke-width="2.5"/>
  <text x="370" y="195" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#FF9800">PASO 2</text>
  <text x="370" y="215" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="#f8fafc">Agente primario</text>
  <text x="370" y="232" text-anchor="middle" font-family="monospace" font-size="11" fill="#fbbf24">decide: ¿subagente?</text>
  <text x="370" y="252" text-anchor="middle" font-family="monospace" font-size="10" fill="#cbd5e1">Build / Plan · Tab</text>
  <text x="370" y="264" text-anchor="middle" font-family="monospace" font-size="10" fill="#cbd5e1">para cambiar</text>

  <line x1="460" y1="220" x2="510" y2="220" stroke="#FF9800" stroke-width="2.5" marker-end="url(#arrowOrange)"/>

  <!-- Step 3: Spawn sesión hijo -->
  <rect x="520" y="170" width="200" height="100" rx="12" fill="#1e1145" stroke="#6366f1" stroke-width="2.5"/>
  <text x="620" y="195" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#818cf8">PASO 3</text>
  <text x="620" y="215" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="#f8fafc">Spawn sesión</text>
  <text x="620" y="232" text-anchor="middle" font-family="monospace" font-size="11" fill="#a5b4fc">hijo (child session)</text>
  <text x="620" y="252" text-anchor="middle" font-family="monospace" font-size="10" fill="#cbd5e1">prompt + contexto</text>
  <text x="620" y="264" text-anchor="middle" font-family="monospace" font-size="10" fill="#cbd5e1">→ nuevo turno</text>

  <line x1="720" y1="220" x2="770" y2="220" stroke="#6366f1" stroke-width="2.5" marker-end="url(#arrowOrange)"/>

  <!-- Step 4: Subagente trabaja -->
  <rect x="780" y="170" width="170" height="100" rx="12" fill="#0F172A" stroke="#018786" stroke-width="2.5"/>
  <text x="865" y="195" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#018786">PASO 4</text>
  <text x="865" y="215" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="#f8fafc">Subagente</text>
  <text x="865" y="232" text-anchor="middle" font-family="monospace" font-size="11" fill="#5eead4">trabaja aislado</text>
  <text x="865" y="252" text-anchor="middle" font-family="monospace" font-size="10" fill="#cbd5e1">tools limitadas por</text>
  <text x="865" y="264" text-anchor="middle" font-family="monospace" font-size="10" fill="#cbd5e1">permission</text>

  <line x1="950" y1="220" x2="1000" y2="220" stroke="#018786" stroke-width="2.5" marker-end="url(#arrowTeal)"/>

  <!-- Step 5: Resultado vuelve -->
  <rect x="1010" y="170" width="140" height="100" rx="12" fill="#0F172A" stroke="#34d399" stroke-width="2.5"/>
  <text x="1080" y="195" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#34d399">PASO 5</text>
  <text x="1080" y="215" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="#f8fafc">Resultado</text>
  <text x="1080" y="232" text-anchor="middle" font-family="monospace" font-size="11" fill="#6ee7b7">vuelve al padre</text>

  <!-- Bucle de retorno: desde Step 5 baja y vuelve a Step 2 -->
  <path d="M 1080 270 L 1080 350 L 370 350 L 370 270" fill="none" stroke="#34d399" stroke-width="2" stroke-dasharray="5,4" marker-end="url(#arrowOrange)"/>
  <text x="725" y="345" text-anchor="middle" font-family="monospace" font-size="11" font-style="italic" fill="#34d399">resultado resumido → contexto del padre</text>

  <!-- Modos de invocación -->
  <rect x="50" y="395" width="540" height="180" rx="12" fill="#0F172A" stroke="#1e293b" stroke-width="1.5"/>
  <text x="80" y="425" font-family="monospace" font-size="14" font-weight="bold" fill="#f8fafc">Dos modos de invocación</text>

  <rect x="80" y="445" width="160" height="40" rx="8" fill="#FF9800" opacity="0.18"/>
  <text x="160" y="470" text-anchor="middle" font-family="monospace" font-size="13" font-weight="bold" fill="#FF9800">@ — MANUAL</text>
  <text x="80" y="505" font-family="monospace" font-size="10" fill="#cbd5e1">▸ Tú nombras al subagente en el</text>
  <text x="92" y="520" font-family="monospace" font-size="10" fill="#cbd5e1">prompt con @</text>
  <text x="80" y="540" font-family="monospace" font-size="10" fill="#cbd5e1">▸ Decisión explícita, cero</text>
  <text x="92" y="555" font-family="monospace" font-size="10" fill="#cbd5e1">ambigüedad</text>
  <text x="80" y="568" font-family="monospace" font-size="10" fill="#cbd5e1">▸ Úsalo cuando sabes qué</text>
  <text x="92" y="582" font-family="monospace" font-size="10" fill="#cbd5e1">quieres</text>

  <rect x="320" y="445" width="220" height="40" rx="8" fill="#6366f1" opacity="0.18"/>
  <text x="430" y="470" text-anchor="middle" font-family="monospace" font-size="13" font-weight="bold" fill="#818cf8">AUTOMÁTICO — MODELO DECIDE</text>
  <text x="320" y="505" font-family="monospace" font-size="10" fill="#cbd5e1">▸ El agente primario lee la</text>
  <text x="332" y="520" font-family="monospace" font-size="10" fill="#cbd5e1">description de cada subagente</text>
  <text x="320" y="540" font-family="monospace" font-size="10" fill="#cbd5e1">▸ Decide solo si conviene</text>
  <text x="320" y="568" font-family="monospace" font-size="10" fill="#cbd5e1">▸ Depende del modelo</text>

  <!-- Navegación entre sesiones -->
  <rect x="620" y="395" width="530" height="180" rx="12" fill="#0F172A" stroke="#1e293b" stroke-width="1.5"/>
  <text x="650" y="425" font-family="monospace" font-size="14" font-weight="bold" fill="#f8fafc">Navegación entre sesiones</text>

  <text x="650" y="455" font-family="monospace" font-size="11" fill="#cbd5e1">▸ Padre → primer hijo:</text>
  <text x="660" y="472" font-family="monospace" font-size="10" fill="#FF9800">&lt;Leader&gt;+Down</text>

  <text x="650" y="500" font-family="monospace" font-size="11" fill="#cbd5e1">▸ Ciclar entre hijos:</text>
  <text x="660" y="517" font-family="monospace" font-size="10" fill="#FF9800">Right / Left</text>

  <text x="650" y="545" font-family="monospace" font-size="11" fill="#cbd5e1">▸ Volver al padre:</text>
  <text x="660" y="562" font-family="monospace" font-size="10" fill="#FF9800">Up</text>
  <text x="650" y="585" font-family="monospace" font-size="10" font-style="italic" fill="#64748b">Esto convierte agentes aislados en un sistema colaborativo</text>

  <!-- Footer -->
  <text x="600" y="610" text-anchor="middle" font-family="monospace" font-size="10" fill="#475569">ARCEAPPS · opencode-subagents · 2026</text>
</svg>
