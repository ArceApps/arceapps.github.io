<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#01302f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#014f4e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#018786;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#015f5e;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bgGrad)"/>

  <!-- Subtle grid lines -->
  <g opacity="0.07" stroke="#018786" stroke-width="1">
    <line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="0" y1="240" x2="800" y2="240"/>
    <line x1="0" y1="320" x2="800" y2="320"/>
    <line x1="160" y1="0" x2="160" y2="400"/>
    <line x1="320" y1="0" x2="320" y2="400"/>
    <line x1="480" y1="0" x2="480" y2="400"/>
    <line x1="640" y1="0" x2="640" y2="400"/>
  </g>

  <!-- Title -->
  <text x="400" y="42" font-family="Roboto, Arial, sans-serif" font-size="18" font-weight="700" fill="#FF9800" text-anchor="middle" letter-spacing="2">CI/CD MULTI-AGENT PIPELINE</text>

  <!-- Pipeline track -->
  <rect x="60" y="165" width="680" height="8" rx="4" fill="#018786" opacity="0.3"/>

  <!-- Connector arrows -->
  <!-- PR → Sentinel -->
  <line x1="170" y1="200" x2="240" y2="200" stroke="#FF9800" stroke-width="2.5" stroke-dasharray="6,3" opacity="0.9"/>
  <polygon points="240,196 248,200 240,204" fill="#FF9800" opacity="0.9"/>
  <!-- Sentinel → Scribe -->
  <line x1="330" y1="200" x2="400" y2="200" stroke="#FF9800" stroke-width="2.5" stroke-dasharray="6,3" opacity="0.9"/>
  <polygon points="400,196 408,200 400,204" fill="#FF9800" opacity="0.9"/>
  <!-- Scribe → Bolt -->
  <line x1="490" y1="200" x2="560" y2="200" stroke="#FF9800" stroke-width="2.5" stroke-dasharray="6,3" opacity="0.9"/>
  <polygon points="560,196 568,200 560,204" fill="#FF9800" opacity="0.9"/>
  <!-- Bolt → Deploy -->
  <line x1="650" y1="200" x2="680" y2="200" stroke="#FF9800" stroke-width="2.5" stroke-dasharray="6,3" opacity="0.9"/>
  <polygon points="680,196 688,200 680,204" fill="#FF9800" opacity="0.9"/>

  <!-- Node 1: PR Trigger -->
  <rect x="60" y="168" width="110" height="64" rx="10" fill="url(#nodeGrad)" stroke="#018786" stroke-width="1.5" opacity="0.95"/>
  <text x="115" y="188" font-family="Roboto, Arial, sans-serif" font-size="9" fill="#80cbc4" text-anchor="middle" letter-spacing="1">TRIGGER</text>
  <!-- Git branch icon -->
  <circle cx="115" cy="206" r="5" fill="none" stroke="white" stroke-width="1.8"/>
  <circle cx="104" cy="218" r="3" fill="none" stroke="white" stroke-width="1.8"/>
  <circle cx="126" cy="218" r="3" fill="none" stroke="white" stroke-width="1.8"/>
  <line x1="115" y1="211" x2="104" y2="215" stroke="white" stroke-width="1.8"/>
  <line x1="115" y1="211" x2="126" y2="215" stroke="white" stroke-width="1.8"/>
  <text x="115" y="238" font-family="Roboto, Arial, sans-serif" font-size="10" font-weight="700" fill="white" text-anchor="middle">Pull Request</text>

  <!-- Node 2: Sentinel (Code Review) -->
  <rect x="248" y="168" width="110" height="64" rx="10" fill="url(#nodeGrad)" stroke="#FF9800" stroke-width="1.5" opacity="0.95"/>
  <text x="303" y="188" font-family="Roboto, Arial, sans-serif" font-size="9" fill="#80cbc4" text-anchor="middle" letter-spacing="1">AGENT #1</text>
  <!-- Shield icon -->
  <path d="M303 199 L296 203 L296 211 Q296 216 303 219 Q310 216 310 211 L310 203 Z" fill="none" stroke="white" stroke-width="1.8"/>
  <line x1="303" y1="204" x2="303" y2="215" stroke="white" stroke-width="1.4" opacity="0.7"/>
  <text x="303" y="238" font-family="Roboto, Arial, sans-serif" font-size="10" font-weight="700" fill="white" text-anchor="middle">Sentinel</text>

  <!-- Node 3: Scribe (Docs) -->
  <rect x="408" y="168" width="110" height="64" rx="10" fill="url(#nodeGrad)" stroke="#018786" stroke-width="1.5" opacity="0.95"/>
  <text x="463" y="188" font-family="Roboto, Arial, sans-serif" font-size="9" fill="#80cbc4" text-anchor="middle" letter-spacing="1">AGENT #2</text>
  <!-- Document/pen icon -->
  <rect x="455" y="197" width="16" height="20" rx="2" fill="none" stroke="white" stroke-width="1.8"/>
  <line x1="459" y1="204" x2="467" y2="204" stroke="white" stroke-width="1.4"/>
  <line x1="459" y1="208" x2="467" y2="208" stroke="white" stroke-width="1.4"/>
  <line x1="459" y1="212" x2="464" y2="212" stroke="white" stroke-width="1.4"/>
  <text x="463" y="238" font-family="Roboto, Arial, sans-serif" font-size="10" font-weight="700" fill="white" text-anchor="middle">Scribe</text>

  <!-- Node 4: Bolt (Performance) -->
  <rect x="568" y="168" width="110" height="64" rx="10" fill="url(#nodeGrad)" stroke="#FF9800" stroke-width="1.5" opacity="0.95"/>
  <text x="623" y="188" font-family="Roboto, Arial, sans-serif" font-size="9" fill="#80cbc4" text-anchor="middle" letter-spacing="1">AGENT #3</text>
  <!-- Lightning bolt icon -->
  <polygon points="627,197 619,211 624,211 620,223 631,207 626,207" fill="white"/>
  <text x="623" y="238" font-family="Roboto, Arial, sans-serif" font-size="10" font-weight="700" fill="white" text-anchor="middle">Bolt</text>

  <!-- Node 5: Deploy -->
  <rect x="690" y="168" width="60" height="64" rx="10" fill="#FF9800" opacity="0.15" stroke="#FF9800" stroke-width="1.5"/>
  <text x="720" y="188" font-family="Roboto, Arial, sans-serif" font-size="8" fill="#FF9800" text-anchor="middle" letter-spacing="1">OUTPUT</text>
  <!-- Rocket icon -->
  <path d="M720 197 C720 197 715 205 715 212 L717 214 L723 214 L725 212 C725 205 720 197 720 197Z" fill="none" stroke="#FF9800" stroke-width="1.8"/>
  <circle cx="720" cy="209" r="2" fill="#FF9800" opacity="0.8"/>
  <text x="720" y="238" font-family="Roboto, Arial, sans-serif" font-size="9" font-weight="700" fill="#FF9800" text-anchor="middle">Deploy</text>

  <!-- Labels below nodes -->
  <text x="115" y="258" font-family="Roboto, Arial, sans-serif" font-size="8" fill="#80cbc4" text-anchor="middle">on: pull_request</text>
  <text x="303" y="258" font-family="Roboto, Arial, sans-serif" font-size="8" fill="#80cbc4" text-anchor="middle">Code Review</text>
  <text x="463" y="258" font-family="Roboto, Arial, sans-serif" font-size="8" fill="#80cbc4" text-anchor="middle">KDoc + Changelog</text>
  <text x="623" y="258" font-family="Roboto, Arial, sans-serif" font-size="8" fill="#80cbc4" text-anchor="middle">Benchmarks</text>
  <text x="720" y="258" font-family="Roboto, Arial, sans-serif" font-size="8" fill="#80cbc4" text-anchor="middle">Merge + Tag</text>

  <!-- GitHub Actions badge -->
  <rect x="290" y="300" width="220" height="32" rx="16" fill="#018786" opacity="0.2" stroke="#018786" stroke-width="1"/>
  <text x="400" y="321" font-family="Roboto, Arial, sans-serif" font-size="12" font-weight="700" fill="#018786" text-anchor="middle" letter-spacing="1">⚙ GitHub Actions + AGENTS.md</text>

  <!-- Corner decoration -->
  <circle cx="30" cy="30" r="18" fill="#FF9800" opacity="0.12"/>
  <circle cx="770" cy="370" r="18" fill="#018786" opacity="0.15"/>
  <circle cx="770" cy="30" r="10" fill="#FF9800" opacity="0.10"/>
  <circle cx="30" cy="370" r="10" fill="#018786" opacity="0.12"/>
</svg>
