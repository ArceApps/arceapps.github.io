<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 630" width="1100" height="630">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#020617" />
    </linearGradient>

    <!-- Glowing Filters -->
    <filter id="glowTeal" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Card Backgrounds -->
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1100" height="630" fill="url(#bgGrad)" />

  <!-- Outer Border -->
  <rect x="20" y="20" width="1060" height="590" rx="16" fill="none" stroke="#1e293b" stroke-width="3" />

  <!-- Title -->
  <text x="550" y="70" text-anchor="middle" font-family="sans-serif" font-size="30" font-weight="bold" fill="#38bdf8" filter="url(#glowTeal)">
    When to Use Each Prompting Technique?
  </text>

  <!-- === CARD 1: FEW-SHOT === -->
  <g transform="translate(45, 140)">
    <rect width="210" height="340" rx="16" fill="url(#cardGrad)" stroke="#3b82f6" stroke-width="2" />
    <!-- Header -->
    <rect width="210" height="70" rx="16" fill="#3b82f6" opacity="0.15" />
    <text x="15" y="32" font-family="sans-serif" font-size="14" font-weight="extrabold" fill="#60a5fa">FEW-SHOT PROMPTING</text>
    <text x="15" y="50" font-family="sans-serif" font-size="11" font-weight="bold" fill="#93c5fd">(format/examples)</text>
    
    <!-- Body list -->
    <circle cx="20" cy="110" r="3" fill="#60a5fa" />
    <text x="32" y="114" font-family="sans-serif" font-size="12" fill="#cbd5e1" font-weight="bold">Defines desired</text>
    <text x="32" y="130" font-family="sans-serif" font-size="12" fill="#cbd5e1" font-weight="bold">output format</text>

    <circle cx="20" cy="170" r="3" fill="#60a5fa" />
    <text x="32" y="174" font-family="sans-serif" font-size="12" fill="#cbd5e1" font-weight="bold">Provides specific</text>
    <text x="32" y="190" font-family="sans-serif" font-size="12" fill="#cbd5e1" font-weight="bold">examples to guide</text>
    <text x="32" y="206" font-family="sans-serif" font-size="12" fill="#cbd5e1" font-weight="bold">model generation</text>
  </g>

  <!-- Connective Arrow 1 -> 2 -->
  <g stroke="#3b82f6" stroke-width="2" fill="none">
    <path d="M 255,270 L 305,270 L 305,310 L 310,310" />
    <polygon points="308,306 316,310 308,314" fill="#3b82f6" />
    <text x="285" y="248" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#60a5fa">If not enough,</text>
    <text x="285" y="262" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#60a5fa">scale to:</text>
  </g>

  <!-- === CARD 2: CoT === -->
  <g transform="translate(315, 140)">
    <rect width="210" height="340" rx="16" fill="url(#cardGrad)" stroke="#10b981" stroke-width="2" />
    <!-- Header -->
    <rect width="210" height="70" rx="16" fill="#10b981" opacity="0.15" />
    <text x="15" y="32" font-family="sans-serif" font-size="14" font-weight="extrabold" fill="#34d399">CHAIN-OF-THOUGHT</text>
    <text x="15" y="50" font-family="sans-serif" font-size="11" font-weight="bold" fill="#6ee7b7">(step-by-step reasoning)</text>

    <!-- Body list -->
    <circle cx="20" cy="110" r="3" fill="#34d399" />
    <text x="32" y="114" font-family="sans-serif" font-size="12" fill="#cbd5e1" font-weight="bold">Breaks down complex</text>
    <text x="32" y="130" font-family="sans-serif" font-size="12" fill="#cbd5e1" font-weight="bold">problems into</text>
    <text x="32" y="146" font-family="sans-serif" font-size="12" fill="#cbd5e1" font-weight="bold">logical steps</text>

    <circle cx="20" cy="200" r="3" fill="#34d399" />
    <text x="32" y="204" font-family="sans-serif" font-size="12" fill="#cbd5e1" font-weight="bold">Promotes an explicit</text>
    <text x="32" y="220" font-family="sans-serif" font-size="12" fill="#cbd5e1" font-weight="bold">thinking process</text>
    <text x="32" y="236" font-family="sans-serif" font-size="12" fill="#cbd5e1" font-weight="bold">to avoid errors</text>
  </g>

  <!-- Connective Arrow 2 -> 3 -->
  <g stroke="#10b981" stroke-width="2" fill="none">
    <path d="M 525,270 L 575,270 L 575,310 L 580,310" />
    <polygon points="578,306 586,310 578,314" fill="#10b981" />
    <text x="550" y="248" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#34d399">If more clarity,</text>
    <text x="550" y="262" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#34d399">scale to:</text>
  </g>

  <!-- === CARD 3: SOCRATIC === -->
  <g transform="translate(585, 140)">
    <rect width="210" height="340" rx="16" fill="url(#cardGrad)" stroke="#f97316" stroke-width="2" />
    <!-- Header -->
    <rect width="210" height="70" rx="16" fill="#f97316" opacity="0.15" />
    <text x="15" y="32" font-family="sans-serif" font-size="14" font-weight="extrabold" fill="#fb923c">SOCRATIC PROMPTING</text>
    <text x="15" y="50" font-family="sans-serif" font-size="11" font-weight="bold" fill="#fdba74">(ambiguity/decisions)</text>

    <!-- Body list -->
    <circle cx="20" cy="110" r="3" fill="#fb923c" />
    <text x="32" y="114" font-family="sans-serif" font-size="12" fill="#cbd5e1" font-weight="bold">Helps clarify</text>
    <text x="32" y="130" font-family="sans-serif" font-size="12" fill="#cbd5e1" font-weight="bold">ambiguous concepts</text>
    
    <circle cx="20" cy="170" r="3" fill="#fb923c" />
    <text x="32" y="174" font-family="sans-serif" font-size="12" fill="#cbd5e1" font-weight="bold">Stimulates exploration</text>
    <text x="32" y="190" font-family="sans-serif" font-size="12" fill="#cbd5e1" font-weight="bold">of critical decisions</text>

    <circle cx="20" cy="230" r="3" fill="#fb923c" />
    <text x="32" y="234" font-family="sans-serif" font-size="12" fill="#cbd5e1" font-weight="bold">Challenges underlying</text>
    <text x="32" y="250" font-family="sans-serif" font-size="12" fill="#cbd5e1" font-weight="bold">assumptions</text>
  </g>

  <!-- Connective Arrow 3 -> 4 -->
  <g stroke="#f97316" stroke-width="2" fill="none">
    <path d="M 795,270 L 845,270 L 845,310 L 850,310" />
    <polygon points="842,306 850,310 842,314" fill="#f97316" />
    <text x="820" y="248" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#fb923c">If seeking depth,</text>
    <text x="820" y="262" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#fb923c">scale to:</text>
  </g>

  <!-- === CARD 4: MAIEUTIC === -->
  <g transform="translate(855, 140)">
    <rect width="210" height="340" rx="16" fill="url(#cardGrad)" stroke="#a855f7" stroke-width="2" />
    <!-- Header -->
    <rect width="210" height="70" rx="16" fill="#a855f7" opacity="0.15" />
    <text x="15" y="32" font-family="sans-serif" font-size="14" font-weight="extrabold" fill="#c084fc">MAIEUTIC PROMPTING</text>
    <text x="15" y="50" font-family="sans-serif" font-size="11" font-weight="bold" fill="#d8b4fe">(conflict resolution)</text>

    <!-- Body list -->
    <circle cx="20" cy="110" r="3" fill="#c084fc" />
    <text x="32" y="114" font-family="sans-serif" font-size="12" fill="#cbd5e1" font-weight="bold">Reveals hidden</text>
    <text x="32" y="130" font-family="sans-serif" font-size="12" fill="#cbd5e1" font-weight="bold">contradictions</text>

    <circle cx="20" cy="170" r="3" fill="#c084fc" />
    <text x="32" y="174" font-family="sans-serif" font-size="12" fill="#cbd5e1" font-weight="bold">Facilitates discovery</text>
    <text x="32" y="190" font-family="sans-serif" font-size="12" fill="#cbd5e1" font-weight="bold">in deep topics</text>

    <circle cx="20" cy="230" r="3" fill="#c084fc" />
    <text x="32" y="234" font-family="sans-serif" font-size="12" fill="#cbd5e1" font-weight="bold">Promotes synthesis of</text>
    <text x="32" y="250" font-family="sans-serif" font-size="12" fill="#cbd5e1" font-weight="bold">complex ideas</text>
  </g>

</svg>
