<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#121826"/>
    </linearGradient>
    <linearGradient id="tealGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#018786"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF9800"/>
      <stop offset="100%" stop-color="#FFB74D"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#1e293b" stroke-width="0.5" opacity="0.4"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Title -->
  <text x="600" y="48" text-anchor="middle" font-family="monospace" font-size="26" font-weight="bold" fill="#f8fafc" filter="url(#glow)">'Grill Me' vs Socratic Method vs Spec-Driven Dev</text>
  <text x="600" y="71" text-anchor="middle" font-family="monospace" font-size="12" fill="#64748b">The phase-aware resolution — adversarial questioning meets deterministic execution</text>
  <line x1="200" y1="83" x2="1000" y2="83" stroke="#1e293b" stroke-width="1"/>

  <!-- === THREE COLUMNS === -->

  <!-- Column 1: Socratic / Grill-Me -->
  <rect x="30" y="100" width="360" height="510" rx="14" fill="#1a1430" stroke="#6366f1" stroke-width="2.5"/>
  <rect x="30" y="100" width="360" height="44" rx="14" fill="#6366f1" opacity="0.3"/>
  <text x="210" y="129" text-anchor="middle" font-family="monospace" font-size="17" font-weight="bold" fill="#a5b4fc">⚡ Socratic / Grill-Me</text>

  <!-- Core concept -->
  <rect x="55" y="160" width="310" height="40" rx="8" fill="#6366f1" opacity="0.1" stroke="#6366f1" stroke-width="1"/>
  <text x="210" y="186" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#818cf8">Philosophy: "Challenge everything"</text>

  <circle cx="70" cy="225" r="5" fill="#818cf8"/>
  <text x="86" y="229" font-family="monospace" font-size="10" fill="#cbd5e1">Adversarial questioning loop</text>

  <circle cx="70" cy="250" r="5" fill="#818cf8"/>
  <text x="86" y="254" font-family="monospace" font-size="10" fill="#cbd5e1">Breaks AI sycophancy</text>

  <circle cx="70" cy="275" r="5" fill="#818cf8"/>
  <text x="86" y="279" font-family="monospace" font-size="10" fill="#cbd5e1">Exposes hidden assumptions</text>

  <circle cx="70" cy="300" r="5" fill="#818cf8"/>
  <text x="86" y="304" font-family="monospace" font-size="10" fill="#cbd5e1">Pre-spec interrogation</text>

  <circle cx="70" cy="325" r="5" fill="#818cf8"/>
  <text x="86" y="329" font-family="monospace" font-size="10" fill="#cbd5e1">/grill-me + /grill-with-docs</text>

  <!-- Domain -->
  <rect x="55" y="355" width="310" height="35" rx="6" fill="#7c3aed" opacity="0.1" stroke="#7c3aed" stroke-width="1"/>
  <text x="210" y="378" text-anchor="middle" font-family="monospace" font-size="10" fill="#a78bfa">🎯 Domain: Phase 1 — Pre-Spec</text>

  <!-- Workflow mini -->
  <text x="210" y="410" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#94a3b8">Workflow</text>
  <text x="210" y="430" text-anchor="middle" font-family="monospace" font-size="9" fill="#64748b">Idea → /grill-me → Questions →</text>
  <text x="210" y="446" text-anchor="middle" font-family="monospace" font-size="9" fill="#64748b">Answers → Shared Understanding →</text>
  <text x="210" y="462" text-anchor="middle" font-family="monospace" font-size="9" fill="#64748b">GLOSSARY.md → SPEC.md</text>

  <!-- Key insight -->
  <rect x="55" y="485" width="310" height="45" rx="8" fill="#0F172A" stroke="#1e293b" stroke-width="1"/>
  <text x="210" y="507" text-anchor="middle" font-family="monospace" font-size="9" fill="#818cf8" font-style="italic">"Documentation emerges naturally</text>
  <text x="210" y="521" text-anchor="middle" font-family="monospace" font-size="9" fill="#818cf8" font-style="italic">from the friction of interrogation"</text>

  <!-- Weakness -->
  <text x="210" y="556" text-anchor="middle" font-family="monospace" font-size="9" fill="#ef4444">⚠️ Risk: debate fatigue, no built-in governance</text>
  <text x="210" y="575" text-anchor="middle" font-family="monospace" font-size="9" fill="#ef4444">⚠️ Requires developer discipline</text>

  <!-- === CENTER ARROW / VS === -->
  <text x="410" y="355" text-anchor="middle" font-family="monospace" font-size="22" font-weight="bold" fill="#475569">↔</text>
  <text x="410" y="375" text-anchor="middle" font-family="monospace" font-size="9" fill="#64748b">symbiotic</text>
  <text x="410" y="390" text-anchor="middle" font-family="monospace" font-size="9" fill="#64748b">not</text>
  <text x="410" y="405" text-anchor="middle" font-family="monospace" font-size="9" fill="#64748b">adversarial</text>

  <!-- Column 2: SDD -->
  <rect x="430" y="100" width="360" height="510" rx="14" fill="#0a1a16" stroke="#34d399" stroke-width="2.5"/>
  <rect x="430" y="100" width="360" height="44" rx="14" fill="#34d399" opacity="0.15"/>
  <text x="610" y="129" text-anchor="middle" font-family="monospace" font-size="17" font-weight="bold" fill="#6ee7b7">📋 Spec-Driven Development</text>

  <!-- Core concept -->
  <rect x="455" y="160" width="310" height="40" rx="8" fill="#34d399" opacity="0.08" stroke="#34d399" stroke-width="1"/>
  <text x="610" y="186" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#34d399">Philosophy: "The spec is sacred"</text>

  <circle cx="470" cy="225" r="5" fill="#34d399"/>
  <text x="486" y="229" font-family="monospace" font-size="10" fill="#cbd5e1">Deterministic, linear pipeline</text>

  <circle cx="470" cy="250" r="5" fill="#34d399"/>
  <text x="486" y="254" font-family="monospace" font-size="10" fill="#cbd5e1">SPEC.md as immutable contract</text>

  <circle cx="470" cy="275" r="5" fill="#34d399"/>
  <text x="486" y="279" font-family="monospace" font-size="10" fill="#cbd5e1">Prevents spec drift</text>

  <circle cx="470" cy="300" r="5" fill="#34d399"/>
  <text x="486" y="304" font-family="monospace" font-size="10" fill="#cbd5e1">Auditable, reproducible</text>

  <circle cx="470" cy="325" r="5" fill="#34d399"/>
  <text x="486" y="329" font-family="monospace" font-size="10" fill="#cbd5e1">Spec Kit · OpenSpec · BMAD</text>

  <!-- Domain -->
  <rect x="455" y="355" width="310" height="35" rx="6" fill="#018786" opacity="0.15" stroke="#018786" stroke-width="1"/>
  <text x="610" y="378" text-anchor="middle" font-family="monospace" font-size="10" fill="#34d399">🎯 Domain: Phase 2 — Build</text>

  <!-- Workflow mini -->
  <text x="610" y="410" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#94a3b8">Workflow</text>
  <text x="610" y="430" text-anchor="middle" font-family="monospace" font-size="9" fill="#64748b">SPEC.md → Code Gen → Validate →</text>
  <text x="610" y="446" text-anchor="middle" font-family="monospace" font-size="9" fill="#64748b">Test → Lint → Review → Ship</text>
  <text x="610" y="462" text-anchor="middle" font-family="monospace" font-size="9" fill="#64748b">(No deviating from spec)</text>

  <!-- Key insight -->
  <rect x="455" y="485" width="310" height="45" rx="8" fill="#0F172A" stroke="#1e293b" stroke-width="1"/>
  <text x="610" y="507" text-anchor="middle" font-family="monospace" font-size="9" fill="#34d399" font-style="italic">"Perfect execution of a flawed spec</text>
  <text x="610" y="521" text-anchor="middle" font-family="monospace" font-size="9" fill="#34d399" font-style="italic">= perfectly wrong software"</text>

  <!-- Weakness -->
  <text x="610" y="556" text-anchor="middle" font-family="monospace" font-size="9" fill="#ef4444">⚠️ Risk: Garbage In → Garbage Out</text>
  <text x="610" y="575" text-anchor="middle" font-family="monospace" font-size="9" fill="#ef4444">⚠️ Assumes human spec is flawless</text>

  <!-- Column 3: Hybrid (The Resolution) -->
  <rect x="830" y="100" width="340" height="510" rx="14" fill="#1a1200" stroke="#FF9800" stroke-width="3"/>
  <rect x="830" y="100" width="340" height="44" rx="14" fill="#FF9800" opacity="0.2"/>
  <text x="1000" y="129" text-anchor="middle" font-family="monospace" font-size="17" font-weight="bold" fill="#FFB74D">🔗 Hybrid Phase-Aware</text>

  <!-- Core concept -->
  <rect x="855" y="160" width="290" height="40" rx="8" fill="#FF9800" opacity="0.08" stroke="#FF9800" stroke-width="1"/>
  <text x="1000" y="186" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#FFB74D">Resolución: "Phase over dogma"</text>

  <!-- Phase indicators -->
  <rect x="855" y="215" width="290" height="30" rx="6" fill="#6366f1" opacity="0.12"/>
  <text x="870" y="235" font-family="monospace" font-size="9" fill="#818cf8">Phase 1: Pre-Spec → /grill-me domain</text>

  <rect x="855" y="252" width="290" height="30" rx="6" fill="#34d399" opacity="0.12"/>
  <text x="870" y="272" font-family="monospace" font-size="9" fill="#34d399">Phase 2: Build → SDD domain</text>

  <rect x="855" y="289" width="290" height="30" rx="6" fill="#ef4444" opacity="0.1"/>
  <text x="870" y="309" font-family="monospace" font-size="9" fill="#ef4444">Phase 3: Post-Fail → /diagnose</text>

  <!-- Flow diagram mini -->
  <text x="1000" y="345" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#94a3b8">Resolved Flow</text>
  <rect x="865" y="358" width="270" height="130" rx="10" fill="#0F172A" stroke="#1e293b" stroke-width="1"/>

  <rect x="880" y="370" width="110" height="30" rx="6" fill="#6366f1" opacity="0.15"/>
  <text x="935" y="390" text-anchor="middle" font-family="monospace" font-size="8" fill="#818cf8">/grill-me</text>

  <text x="995" y="390" font-family="monospace" font-size="12" fill="#475569">→</text>

  <rect x="1015" y="370" width="100" height="30" rx="6" fill="#34d399" opacity="0.15"/>
  <text x="1065" y="390" text-anchor="middle" font-family="monospace" font-size="8" fill="#34d399">SPEC.md</text>

  <text x="935" y="420" font-family="monospace" font-size="12" fill="#475569">↓</text>

  <rect x="900" y="430" width="200" height="30" rx="6" fill="#FF9800" opacity="0.15"/>
  <text x="1000" y="450" text-anchor="middle" font-family="monospace" font-size="9" fill="#FFB74D">Build + TDD + Verify</text>

  <!-- Hegelian Dialectic -->
  <text x="1000" y="510" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#94a3b8">Hegelian Dialectic</text>
  <text x="1000" y="530" text-anchor="middle" font-family="monospace" font-size="8" fill="#64748b">Thesis (Idea) → Antithesis (Grill)</text>
  <text x="1000" y="546" text-anchor="middle" font-family="monospace" font-size="8" fill="#64748b">→ Synthesis (SPEC.md)</text>

  <text x="1000" y="575" text-anchor="middle" font-family="monospace" font-size="9" font-weight="bold" fill="#34d399">✅ Best of both worlds</text>

  <!-- === BOTTOM BAR === -->
  <rect x="0" y="600" width="1200" height="30" fill="#018786" opacity="0.12"/>
  <text x="600" y="619" text-anchor="middle" font-family="monospace" font-size="10" fill="#64748b">The phase-aware resolution — adversarial Pre-Spec meets deterministic Build. The era of the "Yes Man" is over.</text>
</svg>