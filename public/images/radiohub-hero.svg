<svg width="800" height="450" viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Degradado de fondo premium oscuro -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#020617" />
    </linearGradient>
    
    <!-- Degradados para las formas geométricas -->
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#018786" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#00a3a2" stop-opacity="0.2" />
    </linearGradient>
    
    <linearGradient id="orangeGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF9800" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#ffb74d" stop-opacity="0.3" />
    </linearGradient>
    
    <!-- Efecto de brillo -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <blur stdDeviation="15" />
    </filter>
  </defs>

  <!-- Fondo -->
  <rect width="800" height="450" fill="url(#bgGrad)" />

  <!-- Elemento geométrico decorativo sutil (cuadrícula) -->
  <g opacity="0.05">
    <path d="M 0,50 L 800,50 M 0,100 L 800,100 M 0,150 L 800,150 M 0,200 L 800,200 M 0,250 L 800,250 M 0,300 L 800,300 M 0,350 L 800,350 M 0,400 L 800,400" stroke="#ffffff" stroke-width="1" />
    <path d="M 100,0 L 100,450 M 200,0 L 200,450 M 300,0 L 300,450 M 400,0 L 400,450 M 500,0 L 500,450 M 600,0 L 600,450 M 700,0 L 700,450" stroke="#ffffff" stroke-width="1" />
  </g>

  <!-- Ondas concéntricas (Radio) en el centro -->
  <g transform="translate(400, 225)">
    <!-- Brillo de fondo del dial de radio -->
    <circle r="60" fill="#FF9800" opacity="0.15" filter="url(#glow)" />
    
    <!-- Ondas concéntricas -->
    <circle r="180" fill="none" stroke="#018786" stroke-width="2" stroke-dasharray="10 15" opacity="0.2" />
    <circle r="140" fill="none" stroke="#FF9800" stroke-width="1.5" stroke-dasharray="5 10" opacity="0.3" />
    <circle r="100" fill="none" stroke="#018786" stroke-width="3" opacity="0.4" />
    <circle r="70" fill="none" stroke="#FF9800" stroke-width="2" opacity="0.6" />
    
    <!-- Círculo Central (Emisor) -->
    <circle r="30" fill="url(#tealGrad)" />
    <circle r="10" fill="#FF9800" />
  </g>

  <!-- Formas geométricas superpuestas para abstracción modernista -->
  <!-- Barra de señal Teal -->
  <rect x="80" y="320" width="80" height="24" rx="12" fill="url(#tealGrad)" transform="rotate(-30 80 320)" />
  <rect x="180" y="350" width="120" height="16" rx="8" fill="url(#tealGrad)" opacity="0.5" transform="rotate(-30 180 350)" />
  
  <!-- Dial de sintonización Orange -->
  <circle cx="680" cy="120" r="80" fill="none" stroke="url(#orangeGrad)" stroke-width="8" stroke-linecap="round" stroke-dasharray="240 100" />
  <circle cx="680" cy="120" r="60" fill="none" stroke="#018786" stroke-width="1" opacity="0.3" />
  <line x1="680" y1="120" x2="735" y2="65" stroke="#FF9800" stroke-width="4" stroke-linecap="round" />

  <!-- Nombre del canal o frecuencias estilizadas -->
  <text x="50" y="80" font-family="'Outfit', 'Inter', sans-serif" font-size="28" font-weight="800" fill="#018786" letter-spacing="4">RADIO<tspan fill="#FF9800">HUB</tspan></text>
  <text x="50" y="105" font-family="'Courier New', monospace" font-size="12" font-weight="bold" fill="#ffffff" opacity="0.4" letter-spacing="2">FM 87.5 - 108.0 MHZ</text>
</svg>
