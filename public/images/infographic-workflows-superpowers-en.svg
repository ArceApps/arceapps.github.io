<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1a1030"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <marker id="arrowTeal" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#018786"/></marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#6366f1"/></marker>
  </defs>

  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse"><path d="M 60 0 L 0 0 0 60" fill="none" stroke="#1e293b" stroke-width="0.5" opacity="0.4"/></pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <text x="600" y="48" text-anchor="middle" font-family="monospace" font-size="26" font-weight="bold" fill="#f8fafc" filter="url(#glow)">Superpowers Pipeline: Strict TDD with 3 Subagents</text>
  <text x="600" y="72" text-anchor="middle" font-family="monospace" font-size="13" fill="#64748b">Plan → Test → Code · Each agent isolated by permissions</text>
  <line x1="300" y1="84" x2="900" y2="84" stroke="#1e293b" stroke-width="1"/>

  <!-- Pipeline track background -->
  <rect x="50" y="160" width="1100" height="140" rx="70" fill="#1e293b" opacity="0.25"/>

  <!-- PHASE 1 -->
  <rect x="70" y="170" width="280" height="120" rx="12" fill="#0F172A" stroke="#018786" stroke-width="2.5"/>
  <rect x="70" y="170" width="280" height="34" rx="12" fill="#018786" opacity="0.16"/>
  <text x="210" y="192" text-anchor="middle" font-family="monospace" font-size="13" font-weight="bold" fill="#018786">PHASE 1 · @super-plan</text>
  <text x="210" y="220" text-anchor="middle" font-family="monospace" font-size="18" font-weight="bold" fill="#f8fafc">📐 Analysis</text>
  <text x="210" y="244" text-anchor="middle" font-family="monospace" font-size="11" fill="#5eead4">Designs tech plan +</text>
  <text x="210" y="258" text-anchor="middle" font-family="monospace" font-size="11" fill="#5eead4">test cases</text>
  <text x="210" y="278" text-anchor="middle" font-family="monospace" font-size="10" fill="#94a3b8">Permissions: edit: deny · bash: deny</text>

  <!-- GATE 1 -->
  <rect x="365" y="195" width="50" height="70" rx="8" fill="#fbbf24" opacity="0.18"/>
  <text x="390" y="225" text-anchor="middle" font-family="monospace" font-size="22" fill="#fbbf24">🔒</text>
  <text x="390" y="248" text-anchor="middle" font-family="monospace" font-size="9" font-weight="bold" fill="#fbbf24">GATE</text>
  <text x="390" y="261" text-anchor="middle" font-family="monospace" font-size="9" fill="#94a3b8">approve</text>

  <line x1="350" y1="230" x2="365" y2="230" stroke="#018786" stroke-width="2.5" marker-end="url(#arrowTeal)"/>

  <!-- PHASE 2 -->
  <rect x="430" y="170" width="280" height="120" rx="12" fill="#0F172A" stroke="#FF9800" stroke-width="2.5"/>
  <rect x="430" y="170" width="280" height="34" rx="12" fill="#FF9800" opacity="0.16"/>
  <text x="570" y="192" text-anchor="middle" font-family="monospace" font-size="13" font-weight="bold" fill="#FF9800">PHASE 2 · @super-test</text>
  <text x="570" y="220" text-anchor="middle" font-family="monospace" font-size="18" font-weight="bold" fill="#f8fafc">🧪 Red tests</text>
  <text x="570" y="244" text-anchor="middle" font-family="monospace" font-size="11" fill="#fbbf24">Writes tests that</text>
  <text x="570" y="258" text-anchor="middle" font-family="monospace" font-size="11" fill="#fbbf24">fail on purpose</text>
  <text x="570" y="278" text-anchor="middle" font-family="monospace" font-size="10" fill="#94a3b8">Permissions: edit: allow · bash: allow</text>

  <!-- GATE 2 -->
  <rect x="725" y="195" width="50" height="70" rx="8" fill="#fbbf24" opacity="0.18"/>
  <text x="750" y="225" text-anchor="middle" font-family="monospace" font-size="22" fill="#fbbf24">🔒</text>
  <text x="750" y="248" text-anchor="middle" font-family="monospace" font-size="9" font-weight="bold" fill="#fbbf24">GATE</text>
  <text x="750" y="261" text-anchor="middle" font-family="monospace" font-size="9" fill="#94a3b8">test fail</text>

  <line x1="710" y1="230" x2="725" y2="230" stroke="#FF9800" stroke-width="2.5" marker-end="url(#arrowTeal)"/>

  <!-- PHASE 3 -->
  <rect x="790" y="170" width="280" height="120" rx="12" fill="#0F172A" stroke="#6366f1" stroke-width="2.5"/>
  <rect x="790" y="170" width="280" height="34" rx="12" fill="#6366f1" opacity="0.16"/>
  <text x="930" y="192" text-anchor="middle" font-family="monospace" font-size="13" font-weight="bold" fill="#818cf8">PHASE 3 · @super-code</text>
  <text x="930" y="220" text-anchor="middle" font-family="monospace" font-size="18" font-weight="bold" fill="#f8fafc">⚙️ Implement</text>
  <text x="930" y="244" text-anchor="middle" font-family="monospace" font-size="11" fill="#a5b4fc">Minimum code to</text>
  <text x="930" y="258" text-anchor="middle" font-family="monospace" font-size="11" fill="#a5b4fc">make tests pass</text>
  <text x="930" y="278" text-anchor="middle" font-family="monospace" font-size="10" fill="#94a3b8">Permissions: edit: allow · bash: allow</text>

  <!-- Result -->
  <text x="1110" y="195" text-anchor="middle" font-family="monospace" font-size="22" fill="#34d399">→</text>
  <text x="1110" y="220" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#34d399">✅ green</text>
  <text x="1110" y="236" text-anchor="middle" font-family="monospace" font-size="9" fill="#94a3b8">tests pass</text>

  <line x1="1070" y1="230" x2="1085" y2="230" stroke="#6366f1" stroke-width="2.5" marker-end="url(#arrowPurple)"/>

  <!-- KEY INSIGHT BANNER -->
  <rect x="50" y="335" width="1100" height="80" rx="14" fill="#1e1145" stroke="#6366f1" stroke-width="2"/>
  <text x="600" y="365" text-anchor="middle" font-family="monospace" font-size="14" font-weight="bold" fill="#a5b4fc">The trick: no agent does two things at once</text>
  <text x="600" y="390" text-anchor="middle" font-family="monospace" font-size="11" fill="#cbd5e1">Plan, test, and implement with **isolated subagents** avoids the classic anti-pattern:</text>
  <text x="600" y="406" text-anchor="middle" font-family="monospace" font-size="11" fill="#cbd5e1">the agent that writes happy-path tests that always pass but verify nothing real.</text>

  <!-- Config + Loop -->
  <rect x="50" y="440" width="540" height="160" rx="14" fill="#0F172A" stroke="#1e293b" stroke-width="1.5"/>
  <text x="80" y="470" font-family="monospace" font-size="13" font-weight="bold" fill="#f8fafc">Key configuration</text>
  <text x="80" y="495" font-family="monospace" font-size="11" fill="#cbd5e1">▸ @super-plan</text>
  <text x="92" y="510" font-family="monospace" font-size="10" fill="#94a3b8">model: sonnet · temp: 0.1</text>
  <text x="92" y="524" font-family="monospace" font-size="10" fill="#94a3b8">edit: deny · bash: deny</text>
  <text x="80" y="548" font-family="monospace" font-size="11" fill="#cbd5e1">▸ @super-test</text>
  <text x="92" y="563" font-family="monospace" font-size="10" fill="#94a3b8">model: sonnet · temp: 0.2</text>
  <text x="92" y="577" font-family="monospace" font-size="10" fill="#94a3b8">edit: allow tests · bash: allow</text>

  <rect x="610" y="440" width="540" height="160" rx="14" fill="#0F172A" stroke="#1e293b" stroke-width="1.5"/>
  <text x="640" y="470" font-family="monospace" font-size="13" font-weight="bold" fill="#f8fafc">The loop that forms</text>
  <text x="640" y="495" font-family="monospace" font-size="11" fill="#94a3b8">▸ Super-test writes red tests</text>
  <text x="640" y="513" font-family="monospace" font-size="11" fill="#94a3b8">▸ Super-code implements the minimum</text>
  <text x="640" y="531" font-family="monospace" font-size="11" fill="#94a3b8">▸ If pass → commit. If not → retry</text>
  <text x="640" y="558" font-family="monospace" font-size="11" font-weight="bold" fill="#34d399">Result: real tests, not fake ones</text>
  <text x="640" y="578" font-family="monospace" font-size="10" font-style="italic" fill="#64748b">Slower than "all at once", but verifiable.</text>

  <!-- Footer -->
  <text x="600" y="615" text-anchor="middle" font-family="monospace" font-size="10" fill="#475569">ARCEAPPS · opencode-subagents-workflows · 2026</text>
</svg>
