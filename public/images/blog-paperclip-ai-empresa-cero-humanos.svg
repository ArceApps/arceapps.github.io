<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <!-- Background -->
  <rect width="800" height="450" fill="#0d1117"/>

  <!-- Grid lines subtle -->
  <g stroke="#018786" stroke-opacity="0.08" stroke-width="1">
    <line x1="0" y1="75" x2="800" y2="75"/>
    <line x1="0" y1="150" x2="800" y2="150"/>
    <line x1="0" y1="225" x2="800" y2="225"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="375" x2="800" y2="375"/>
    <line x1="100" y1="0" x2="100" y2="450"/>
    <line x1="200" y1="0" x2="200" y2="450"/>
    <line x1="300" y1="0" x2="300" y2="450"/>
    <line x1="400" y1="0" x2="400" y2="450"/>
    <line x1="500" y1="0" x2="500" y2="450"/>
    <line x1="600" y1="0" x2="600" y2="450"/>
    <line x1="700" y1="0" x2="700" y2="450"/>
  </g>

  <!-- Connection lines between nodes -->
  <g stroke="#018786" stroke-opacity="0.5" stroke-width="1.5" stroke-dasharray="4,3">
    <!-- CEO to CTO -->
    <line x1="400" y1="120" x2="230" y2="240"/>
    <!-- CEO to CMO -->
    <line x1="400" y1="120" x2="570" y2="240"/>
    <!-- CTO to Dev1 -->
    <line x1="230" y1="240" x2="140" y2="360"/>
    <!-- CTO to Dev2 -->
    <line x1="230" y1="240" x2="310" y2="360"/>
    <!-- CMO to Mkt1 -->
    <line x1="570" y1="240" x2="490" y2="360"/>
    <!-- CMO to Mkt2 -->
    <line x1="570" y1="240" x2="660" y2="360"/>
  </g>

  <!-- CEO Node (top center) -->
  <circle cx="400" cy="100" r="42" fill="#018786" fill-opacity="0.15" stroke="#018786" stroke-width="2"/>
  <circle cx="400" cy="100" r="28" fill="#018786"/>
  <!-- Brain/CPU icon simplified -->
  <rect x="390" y="90" width="20" height="20" rx="3" fill="#0d1117"/>
  <line x1="395" y1="90" x2="395" y2="110" stroke="#FF9800" stroke-width="1.5"/>
  <line x1="405" y1="90" x2="405" y2="110" stroke="#FF9800" stroke-width="1.5"/>
  <line x1="390" y1="97" x2="410" y2="97" stroke="#FF9800" stroke-width="1.5"/>
  <line x1="390" y1="103" x2="410" y2="103" stroke="#FF9800" stroke-width="1.5"/>
  <!-- Label -->
  <text x="400" y="152" text-anchor="middle" fill="#018786" font-family="monospace" font-size="12" font-weight="bold">CEO</text>
  <text x="400" y="167" text-anchor="middle" fill="#666" font-family="monospace" font-size="9">Agente IA</text>

  <!-- CTO Node -->
  <circle cx="230" cy="225" r="36" fill="#018786" fill-opacity="0.12" stroke="#018786" stroke-width="1.5"/>
  <circle cx="230" cy="225" r="23" fill="#018786" fill-opacity="0.8"/>
  <rect x="221" y="216" width="18" height="18" rx="2" fill="#0d1117"/>
  <line x1="225" y1="216" x2="225" y2="234" stroke="#FF9800" stroke-width="1.5"/>
  <line x1="235" y1="216" x2="235" y2="234" stroke="#FF9800" stroke-width="1.5"/>
  <line x1="221" y1="222" x2="239" y2="222" stroke="#FF9800" stroke-width="1.5"/>
  <line x1="221" y1="228" x2="239" y2="228" stroke="#FF9800" stroke-width="1.5"/>
  <text x="230" y="270" text-anchor="middle" fill="#018786" font-family="monospace" font-size="11" font-weight="bold">CTO</text>
  <text x="230" y="283" text-anchor="middle" fill="#666" font-family="monospace" font-size="9">Agente IA</text>

  <!-- CMO Node -->
  <circle cx="570" cy="225" r="36" fill="#FF9800" fill-opacity="0.12" stroke="#FF9800" stroke-width="1.5"/>
  <circle cx="570" cy="225" r="23" fill="#FF9800" fill-opacity="0.7"/>
  <rect x="561" y="216" width="18" height="18" rx="2" fill="#0d1117"/>
  <line x1="565" y1="216" x2="565" y2="234" stroke="#018786" stroke-width="1.5"/>
  <line x1="575" y1="216" x2="575" y2="234" stroke="#018786" stroke-width="1.5"/>
  <line x1="561" y1="222" x2="579" y2="222" stroke="#018786" stroke-width="1.5"/>
  <line x1="561" y1="228" x2="579" y2="228" stroke="#018786" stroke-width="1.5"/>
  <text x="570" y="270" text-anchor="middle" fill="#FF9800" font-family="monospace" font-size="11" font-weight="bold">CMO</text>
  <text x="570" y="283" text-anchor="middle" fill="#666" font-family="monospace" font-size="9">Agente IA</text>

  <!-- Dev1 Node -->
  <circle cx="140" cy="355" r="28" fill="#018786" fill-opacity="0.1" stroke="#018786" stroke-width="1.2"/>
  <circle cx="140" cy="355" r="18" fill="#018786" fill-opacity="0.6"/>
  <text x="140" y="355" text-anchor="middle" dominant-baseline="middle" fill="#fff" font-family="monospace" font-size="9" font-weight="bold">{}</text>
  <text x="140" y="391" text-anchor="middle" fill="#018786" font-family="monospace" font-size="9">Dev</text>

  <!-- Dev2 Node -->
  <circle cx="310" cy="355" r="28" fill="#018786" fill-opacity="0.1" stroke="#018786" stroke-width="1.2"/>
  <circle cx="310" cy="355" r="18" fill="#018786" fill-opacity="0.6"/>
  <text x="310" y="355" text-anchor="middle" dominant-baseline="middle" fill="#fff" font-family="monospace" font-size="9" font-weight="bold">{}</text>
  <text x="310" y="391" text-anchor="middle" fill="#018786" font-family="monospace" font-size="9">Dev</text>

  <!-- Mkt1 Node -->
  <circle cx="490" cy="355" r="28" fill="#FF9800" fill-opacity="0.1" stroke="#FF9800" stroke-width="1.2"/>
  <circle cx="490" cy="355" r="18" fill="#FF9800" fill-opacity="0.5"/>
  <text x="490" y="355" text-anchor="middle" dominant-baseline="middle" fill="#fff" font-family="monospace" font-size="9" font-weight="bold">Mkt</text>
  <text x="490" y="391" text-anchor="middle" fill="#FF9800" font-family="monospace" font-size="9">Agente</text>

  <!-- Mkt2 Node -->
  <circle cx="660" cy="355" r="28" fill="#FF9800" fill-opacity="0.1" stroke="#FF9800" stroke-width="1.2"/>
  <circle cx="660" cy="355" r="18" fill="#FF9800" fill-opacity="0.5"/>
  <text x="660" y="355" text-anchor="middle" dominant-baseline="middle" fill="#fff" font-family="monospace" font-size="9" font-weight="bold">Mkt</text>
  <text x="660" y="391" text-anchor="middle" fill="#FF9800" font-family="monospace" font-size="9">Agente</text>

  <!-- Title area -->
  <text x="400" y="430" text-anchor="middle" fill="#018786" font-family="monospace" font-size="11" font-weight="bold" letter-spacing="2">PAPERCLIP AI · EMPRESA SIN HUMANOS</text>

  <!-- Decorative corner accent top-left -->
  <rect x="20" y="20" width="60" height="3" fill="#FF9800" rx="1"/>
  <rect x="20" y="20" width="3" height="60" fill="#FF9800" rx="1"/>
  <!-- Decorative corner accent bottom-right -->
  <rect x="720" y="427" width="60" height="3" fill="#FF9800" rx="1"/>
  <rect x="777" y="370" width="3" height="60" fill="#FF9800" rx="1"/>
</svg>
