      <text x="180" y="-6" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto" font-size="13" font-weight="700" fill="#0F172A">DISCUSS</text>
      <text x="180" y="12" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto" font-size="10" fill="#0F172A" opacity="0.85">socratic Q&amp;A</text>
