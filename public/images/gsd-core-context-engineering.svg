    <text x="0" y="20" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="14" fill="#94A3B8">16+ runtimes</text>
    <text x="0" y="40" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="14" fill="#94A3B8">MIT · open source</text>
  </g>

  <g transform="translate(80, 80)">
