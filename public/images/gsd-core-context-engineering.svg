    </g>

    <path d="M 180 0 A 180 180 0 0 1 171.47 56.13 L 118.06 38.66 A 118 118 0 0 0 118 0 Z" fill="#0FB5B0" opacity="0.7"/>
    <path d="M -30.7 177.36 A 180 180 0 0 1 -56.13 171.47 L -38.66 118.06 A 118 118 0 0 0 -20.09 116.65 Z" fill="#FFB74D" opacity="0.7"/>
    <path d="M -177.36 30.7 A 180 180 0 0 1 -171.47 -56.13 L -118.06 -38.66 A 118 118 0 0 0 -116.65 -20.09 Z" fill="#0FB5B0" opacity="0.7"/>
    <path d="M -56.13 -171.47 A 180 180 0 0 1 56.13 -171.47 L 38.66 -118.06 A 118 118 0 0 0 20.09 -116.65 Z" fill="#FFB74D" opacity="0.7"/>
    <path d="M 171.47 -56.13 A 180 180 0 0 1 177.36 30.7 L 116.65 20.09 A 118 118 0 0 0 118 0 Z" fill="#0FB5B0" opacity="0.7"/>
