<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0f172a"/>

  <!-- Decorative grid lines -->
  <g stroke="#1e293b" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- SDD Flow: 4 phases connected by arrows -->
  <!-- Phase 1: SPECIFY -->
  <rect x="60" y="220" width="180" height="80" rx="12" fill="#018786" fill-opacity="0.9"/>
  <text x="150" y="255" font-family="monospace" font-size="13" font-weight="bold" fill="white" text-anchor="middle">01</text>
  <text x="150" y="275" font-family="monospace" font-size="14" font-weight="bold" fill="white" text-anchor="middle">SPECIFY</text>
  <text x="150" y="292" font-family="monospace" font-size="10" fill="#b2dfdb" text-anchor="middle">spec.md</text>

  <!-- Arrow 1->2 -->
  <line x1="240" y1="260" x2="285" y2="260" stroke="#FF9800" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- Phase 2: PLAN -->
  <rect x="285" y="220" width="180" height="80" rx="12" fill="#018786" fill-opacity="0.9"/>
  <text x="375" y="255" font-family="monospace" font-size="13" font-weight="bold" fill="white" text-anchor="middle">02</text>
  <text x="375" y="275" font-family="monospace" font-size="14" font-weight="bold" fill="white" text-anchor="middle">PLAN</text>
  <text x="375" y="292" font-family="monospace" font-size="10" fill="#b2dfdb" text-anchor="middle">plan.md</text>

  <!-- Arrow 2->3 -->
  <line x1="465" y1="260" x2="510" y2="260" stroke="#FF9800" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- Phase 3: TASKS -->
  <rect x="510" y="220" width="180" height="80" rx="12" fill="#018786" fill-opacity="0.9"/>
  <text x="600" y="255" font-family="monospace" font-size="13" font-weight="bold" fill="white" text-anchor="middle">03</text>
  <text x="600" y="275" font-family="monospace" font-size="14" font-weight="bold" fill="white" text-anchor="middle">TASKS</text>
  <text x="600" y="292" font-family="monospace" font-size="10" fill="#b2dfdb" text-anchor="middle">tasks.md</text>

  <!-- Arrow 3->4 -->
  <line x1="690" y1="260" x2="735" y2="260" stroke="#FF9800" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- Phase 4: IMPLEMENT -->
  <rect x="735" y="220" width="180" height="80" rx="12" fill="#FF9800" fill-opacity="0.9"/>
  <text x="825" y="255" font-family="monospace" font-size="13" font-weight="bold" fill="white" text-anchor="middle">04</text>
  <text x="825" y="275" font-family="monospace" font-size="14" font-weight="bold" fill="white" text-anchor="middle">IMPLEMENT</text>
  <text x="825" y="292" font-family="monospace" font-size="10" fill="#fff3e0" text-anchor="middle">code/</text>

  <!-- Feedback loop arrow (bottom) -->
  <path d="M 825 300 Q 825 380 600 380 Q 375 380 150 300" fill="none" stroke="#FF9800" stroke-width="1.5" stroke-dasharray="6,4"/>
  <polygon points="148,300 156,294 156,306" fill="#FF9800"/>
  <text x="600" y="398" font-family="monospace" font-size="10" fill="#FF9800" text-anchor="middle">feedback loop / spec refinement</text>

  <!-- AI Agents box on right -->
  <rect x="960" y="180" width="200" height="160" rx="12" fill="#1e293b" stroke="#018786" stroke-width="2"/>
  <text x="1060" y="210" font-family="monospace" font-size="12" font-weight="bold" fill="#018786" text-anchor="middle">AI AGENTS</text>
  <text x="1060" y="232" font-family="monospace" font-size="10" fill="#94a3b8" text-anchor="middle">● Analyst</text>
  <text x="1060" y="250" font-family="monospace" font-size="10" fill="#94a3b8" text-anchor="middle">● Architect</text>
  <text x="1060" y="268" font-family="monospace" font-size="10" fill="#94a3b8" text-anchor="middle">● Developer</text>
  <text x="1060" y="286" font-family="monospace" font-size="10" fill="#94a3b8" text-anchor="middle">● QA Engineer</text>
  <text x="1060" y="304" font-family="monospace" font-size="10" fill="#94a3b8" text-anchor="middle">● Reviewer</text>
  <text x="1060" y="330" font-family="monospace" font-size="9" fill="#FF9800" text-anchor="middle">powered by spec.md</text>

  <!-- Connecting line to agent box -->
  <line x1="915" y1="260" x2="960" y2="260" stroke="#64748b" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Title block -->
  <rect x="0" y="0" width="1200" height="100" fill="#018786" fill-opacity="0.1"/>
  <text x="60" y="50" font-family="monospace" font-size="28" font-weight="bold" fill="#018786">SPEC-DRIVEN DEVELOPMENT</text>
  <text x="60" y="78" font-family="monospace" font-size="16" fill="#FF9800">Agentic AI Methodology · 2025</text>

  <!-- Bottom frameworks labels -->
  <text x="60" y="480" font-family="monospace" font-size="11" fill="#64748b">Frameworks:</text>
  <text x="165" y="480" font-family="monospace" font-size="11" fill="#94a3b8">github/spec-kit</text>
  <text x="310" y="480" font-family="monospace" font-size="11" fill="#94a3b8">BMAD-METHOD</text>
  <text x="455" y="480" font-family="monospace" font-size="11" fill="#94a3b8">Fission-AI/OpenSpec</text>
  <text x="635" y="480" font-family="monospace" font-size="11" fill="#94a3b8">ruvnet/sparc</text>
  <text x="760" y="480" font-family="monospace" font-size="11" fill="#94a3b8">gsd-build/gsd-2</text>
  <text x="905" y="480" font-family="monospace" font-size="11" fill="#94a3b8">rhuss/cc-sdd</text>

  <!-- Defs for arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#FF9800"/>
    </marker>
  </defs>

  <!-- Tagline -->
  <text x="600" y="580" font-family="monospace" font-size="13" fill="#475569" text-anchor="middle">From vibe coding to structured, reproducible, AI-driven engineering</text>
</svg>
