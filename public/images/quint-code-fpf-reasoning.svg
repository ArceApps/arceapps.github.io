<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <!-- Background -->
  <rect width="900" height="500" fill="#0f1117"/>

  <!-- Decorative grid lines -->
  <g stroke="#018786" stroke-width="0.4" opacity="0.15">
    <line x1="0" y1="100" x2="900" y2="100"/>
    <line x1="0" y1="200" x2="900" y2="200"/>
    <line x1="0" y1="300" x2="900" y2="300"/>
    <line x1="0" y1="400" x2="900" y2="400"/>
    <line x1="150" y1="0" x2="150" y2="500"/>
    <line x1="300" y1="0" x2="300" y2="500"/>
    <line x1="450" y1="0" x2="450" y2="500"/>
    <line x1="600" y1="0" x2="600" y2="500"/>
    <line x1="750" y1="0" x2="750" y2="500"/>
  </g>

  <!-- Lemniscate / infinity loop (ADI cycle) -->
  <path d="M 450 250 C 480 190, 560 170, 600 250 C 640 330, 720 310, 750 250 C 780 190, 760 130, 700 150 C 640 170, 600 250, 450 250 C 300 250, 260 170, 200 150 C 140 130, 120 190, 150 250 C 180 310, 260 330, 300 250 C 340 170, 420 190, 450 250 Z"
    fill="none" stroke="#018786" stroke-width="2.5" opacity="0.5"/>

  <!-- ADI cycle circles -->
  <!-- Abduction (left) -->
  <circle cx="220" cy="250" r="70" fill="#018786" fill-opacity="0.12" stroke="#018786" stroke-width="1.5"/>
  <text x="220" y="238" font-family="monospace" font-size="11" fill="#018786" text-anchor="middle" opacity="0.9">ABDUCTION</text>
  <text x="220" y="254" font-family="monospace" font-size="9" fill="#4db6ac" text-anchor="middle" opacity="0.8">hypothesis</text>
  <text x="220" y="267" font-family="monospace" font-size="9" fill="#4db6ac" text-anchor="middle" opacity="0.8">generation</text>

  <!-- Deduction (top-center) -->
  <circle cx="450" cy="170" r="70" fill="#FF9800" fill-opacity="0.10" stroke="#FF9800" stroke-width="1.5"/>
  <text x="450" y="158" font-family="monospace" font-size="11" fill="#FF9800" text-anchor="middle" opacity="0.9">DEDUCTION</text>
  <text x="450" y="174" font-family="monospace" font-size="9" fill="#ffb74d" text-anchor="middle" opacity="0.8">logical</text>
  <text x="450" y="187" font-family="monospace" font-size="9" fill="#ffb74d" text-anchor="middle" opacity="0.8">derivation</text>

  <!-- Induction (right) -->
  <circle cx="680" cy="250" r="70" fill="#018786" fill-opacity="0.12" stroke="#018786" stroke-width="1.5"/>
  <text x="680" y="238" font-family="monospace" font-size="11" fill="#018786" text-anchor="middle" opacity="0.9">INDUCTION</text>
  <text x="680" y="254" font-family="monospace" font-size="9" fill="#4db6ac" text-anchor="middle" opacity="0.8">pattern</text>
  <text x="680" y="267" font-family="monospace" font-size="9" fill="#4db6ac" text-anchor="middle" opacity="0.8">recognition</text>

  <!-- Arrows on the cycle -->
  <!-- A → D -->
  <path d="M 280 205 Q 360 155 380 165" fill="none" stroke="#FF9800" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
  <!-- D → I -->
  <path d="M 520 165 Q 570 155 620 205" fill="none" stroke="#FF9800" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
  <!-- I → A (bottom arc) -->
  <path d="M 640 305 Q 450 380 260 305" fill="none" stroke="#018786" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-teal)"/>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrow-orange" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L0,8 L8,4 Z" fill="#FF9800"/>
    </marker>
    <marker id="arrow-teal" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L0,8 L8,4 Z" fill="#018786"/>
    </marker>
  </defs>

  <!-- Title section -->
  <text x="450" y="55" font-family="monospace" font-size="22" fill="#ffffff" text-anchor="middle" font-weight="bold" letter-spacing="2">FIRST PRINCIPLES</text>
  <text x="450" y="80" font-family="monospace" font-size="14" fill="#FF9800" text-anchor="middle" letter-spacing="3">REASONING &amp; AI AUDIT</text>

  <!-- Quint Code badge -->
  <rect x="50" y="400" width="170" height="60" rx="6" fill="#018786" fill-opacity="0.15" stroke="#018786" stroke-width="1.2"/>
  <text x="135" y="425" font-family="monospace" font-size="10" fill="#018786" text-anchor="middle" opacity="0.9">QUINT CODE</text>
  <text x="135" y="442" font-family="monospace" font-size="8" fill="#4db6ac" text-anchor="middle" opacity="0.7">Engineering Decisions</text>
  <text x="135" y="455" font-family="monospace" font-size="8" fill="#4db6ac" text-anchor="middle" opacity="0.7">that know when they're stale</text>

  <!-- FPF badge -->
  <rect x="340" y="400" width="220" height="60" rx="6" fill="#FF9800" fill-opacity="0.10" stroke="#FF9800" stroke-width="1.2"/>
  <text x="450" y="425" font-family="monospace" font-size="10" fill="#FF9800" text-anchor="middle" opacity="0.9">FIRST PRINCIPLES FRAMEWORK</text>
  <text x="450" y="442" font-family="monospace" font-size="8" fill="#ffb74d" text-anchor="middle" opacity="0.7">An Operating System for Thought</text>
  <text x="450" y="455" font-family="monospace" font-size="8" fill="#ffb74d" text-anchor="middle" opacity="0.7">by Anatoly Levenchuk</text>

  <!-- FPF E.9 badge -->
  <rect x="680" y="400" width="170" height="60" rx="6" fill="#018786" fill-opacity="0.15" stroke="#018786" stroke-width="1.2"/>
  <text x="765" y="425" font-family="monospace" font-size="10" fill="#018786" text-anchor="middle" opacity="0.9">FPF E.9 FORMAT</text>
  <text x="765" y="442" font-family="monospace" font-size="8" fill="#4db6ac" text-anchor="middle" opacity="0.7">Decision Contracts</text>
  <text x="765" y="455" font-family="monospace" font-size="8" fill="#4db6ac" text-anchor="middle" opacity="0.7">Audit-Ready Rationale</text>

  <!-- Bottom separator line -->
  <line x1="50" y1="390" x2="850" y2="390" stroke="#018786" stroke-width="0.8" opacity="0.4"/>

  <!-- Small decorative dots -->
  <circle cx="450" cy="250" r="5" fill="#FF9800" opacity="0.9"/>
  <circle cx="220" cy="250" r="4" fill="#018786" opacity="0.9"/>
  <circle cx="680" cy="250" r="4" fill="#018786" opacity="0.9"/>
  <circle cx="450" cy="170" r="4" fill="#FF9800" opacity="0.9"/>
</svg>
