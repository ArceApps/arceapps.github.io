<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Definitions for gradients and shadows -->
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A" />
      <stop offset="100%" stop-color="#1E293B" />
    </linearGradient>
    
    <linearGradient id="teal-orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#018786" />
      <stop offset="100%" stop-color="#FF9800" />
    </linearGradient>

    <linearGradient id="glow-teal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#018786" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#018786" stop-opacity="0.1" />
    </linearGradient>
    
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg-grad)" />

  <!-- Subtle background grid -->
  <path d="M 0,90 L 1200,90 M 0,180 L 1200,180 M 0,270 L 1200,270 M 0,360 L 1200,360 M 0,450 L 1200,450 M 0,540 L 1200,540" stroke="#334155" stroke-opacity="0.15" stroke-width="1" />
  <path d="M 150,0 L 150,630 M 300,0 L 300,630 M 450,0 L 450,630 M 600,0 L 600,630 M 750,0 L 750,630 M 900,0 L 900,630 M 1050,0 L 1050,630" stroke="#334155" stroke-opacity="0.15" stroke-width="1" />

  <!-- Abstract Knowledge Graph / Connections -->
  <!-- Connection Lines -->
  <line x1="200" y1="150" x2="450" y2="250" stroke="#018786" stroke-width="2" stroke-opacity="0.4" />
  <line x1="450" y1="250" x2="400" y2="480" stroke="#FF9800" stroke-width="2" stroke-opacity="0.4" />
  <line x1="400" y1="480" x2="700" y2="400" stroke="#018786" stroke-width="2" stroke-opacity="0.4" />
  <line x1="450" y1="250" x2="700" y2="400" stroke="url(#teal-orange)" stroke-width="3" stroke-dasharray="8 4" stroke-opacity="0.6" />
  <line x1="700" y1="400" x2="950" y2="200" stroke="#FF9800" stroke-width="2" stroke-opacity="0.4" />
  <line x1="950" y1="200" x2="850" y2="480" stroke="#018786" stroke-width="2" stroke-opacity="0.4" />
  <line x1="700" y1="400" x2="850" y2="480" stroke="#FF9800" stroke-width="2" stroke-opacity="0.4" />
  
  <!-- Outer glowing rings -->
  <circle cx="700" cy="400" r="140" fill="none" stroke="#018786" stroke-width="1" stroke-opacity="0.1" />
  <circle cx="700" cy="400" r="220" fill="none" stroke="#FF9800" stroke-width="1" stroke-opacity="0.05" />

  <!-- Nodes (Circles) -->
  <!-- Node 1: Cart/Checkout (Teal) -->
  <circle cx="200" cy="150" r="12" fill="#018786" filter="url(#glow)" />
  <circle cx="200" cy="150" r="6" fill="#E2E8F0" />
  
  <!-- Node 2: Metric (Orange) -->
  <circle cx="450" cy="250" r="18" fill="#FF9800" filter="url(#glow)" />
  <circle cx="450" cy="250" r="8" fill="#0F172A" />

  <!-- Node 3: Concept Graph Hub (Teal-Orange) -->
  <circle cx="700" cy="400" r="30" fill="url(#teal-orange)" filter="url(#glow)" />
  <circle cx="700" cy="400" r="14" fill="#0F172A" />
  <circle cx="700" cy="400" r="6" fill="#url(#teal-orange)" />

  <!-- Node 4: Runbook (Teal) -->
  <circle cx="400" cy="480" r="15" fill="#018786" filter="url(#glow)" />
  <circle cx="400" cy="480" r="7" fill="#0F172A" />

  <!-- Node 5: Schema (Orange) -->
  <circle cx="950" cy="200" r="14" fill="#FF9800" filter="url(#glow)" />
  <circle cx="950" cy="200" r="6" fill="#E2E8F0" />

  <!-- Node 6: API Context (Teal) -->
  <circle cx="850" cy="480" r="16" fill="#018786" filter="url(#glow)" />
  <circle cx="850" cy="480" r="8" fill="#0F172A" />

  <!-- Decorative technical details (lines and angles) -->
  <path d="M 650,400 L 670,400 M 730,400 L 750,400 M 700,350 L 700,370 M 700,430 L 700,450" stroke="#E2E8F0" stroke-width="1.5" stroke-opacity="0.3" />
  
  <path d="M 120,80 L 180,80 L 200,100" fill="none" stroke="#018786" stroke-width="1" stroke-opacity="0.3" />
  <text x="110" y="70" font-family="'Outfit', 'Inter', sans-serif" font-size="12" fill="#018786" letter-spacing="1" opacity="0.6">CONCEPT</text>

  <path d="M 1030,220 L 970,220 L 950,200" fill="none" stroke="#FF9800" stroke-width="1" stroke-opacity="0.3" />
  <text x="980" y="240" font-family="'Outfit', 'Inter', sans-serif" font-size="12" fill="#FF9800" letter-spacing="1" opacity="0.6">METADATA</text>

  <!-- Title / Branding Typography -->
  <text x="600" y="100" text-anchor="middle" font-family="'Outfit', 'Roboto', 'Inter', sans-serif" font-size="44" font-weight="900" fill="#F8FAFC" letter-spacing="4">
    OPEN KNOWLEDGE FORMAT
  </text>
  <text x="600" y="145" text-anchor="middle" font-family="'Outfit', 'Roboto', 'Inter', sans-serif" font-size="18" font-weight="500" fill="#018786" letter-spacing="6">
    SPECIFICATION V0.1 • GOOGLE CLOUD
  </text>

  <!-- Minimal UI framework simulation -->
  <rect x="50" y="520" width="1100" height="60" rx="6" fill="#1E293B" fill-opacity="0.4" stroke="#334155" stroke-width="1.5" stroke-opacity="0.3" />
  <circle cx="80" cy="550" r="6" fill="#EF4444" opacity="0.6" />
  <circle cx="100" cy="550" r="6" fill="#F59E0B" opacity="0.6" />
  <circle cx="120" cy="550" r="6" fill="#10B981" opacity="0.6" />
  
  <text x="150" y="555" font-family="'Courier New', monospace" font-size="14" fill="#94A3B8">.okf/concepts/cart_abandonment_rate.md</text>
  <text x="1120" y="555" text-anchor="end" font-family="'Outfit', sans-serif" font-size="14" font-weight="bold" fill="#FF9800" letter-spacing="1">YAML + MARKDOWN</text>
</svg>
