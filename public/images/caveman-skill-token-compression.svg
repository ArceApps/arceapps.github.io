<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Caveman skill: AI agents that talk less, brain stays big, mouth small">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="tealFlow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#018786" stop-opacity="0.2"/>
      <stop offset="50%" stop-color="#018786" stop-opacity="1"/>
      <stop offset="100%" stop-color="#018786" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="orangeFlow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF9800" stop-opacity="0.2"/>
      <stop offset="50%" stop-color="#FF9800" stop-opacity="1"/>
      <stop offset="100%" stop-color="#FF9800" stop-opacity="0.2"/>
    </linearGradient>
    <radialGradient id="brain" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#018786" stop-opacity="0.25"/>
      <stop offset="70%" stop-color="#018786" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#018786" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="mouth" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#FF9800" stop-opacity="0.3"/>
      <stop offset="70%" stop-color="#FF9800" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#FF9800" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <g opacity="0.06">
    <line x1="0" y1="100" x2="1200" y2="100" stroke="#018786" stroke-width="1"/>
    <line x1="0" y1="200" x2="1200" y2="200" stroke="#018786" stroke-width="1"/>
    <line x1="0" y1="300" x2="1200" y2="300" stroke="#018786" stroke-width="1"/>
    <line x1="0" y1="400" x2="1200" y2="400" stroke="#018786" stroke-width="1"/>
    <line x1="0" y1="500" x2="1200" y2="500" stroke="#018786" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="630" stroke="#018786" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="630" stroke="#018786" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="630" stroke="#018786" stroke-width="1"/>
    <line x1="800" y1="0" x2="800" y2="630" stroke="#018786" stroke-width="1"/>
    <line x1="1000" y1="0" x2="1000" y2="630" stroke="#018786" stroke-width="1"/>
  </g>

  <circle cx="850" cy="315" r="320" fill="url(#brain)"/>

  <g transform="translate(600, 315)">
    <circle cx="0" cy="0" r="180" fill="none" stroke="#018786" stroke-width="1.5" opacity="0.4"/>
    <circle cx="0" cy="0" r="140" fill="none" stroke="#018786" stroke-width="1.2" opacity="0.6"/>
    <circle cx="0" cy="0" r="100" fill="none" stroke="#018786" stroke-width="1" opacity="0.8"/>

    <path d="M -80 -40 Q -60 -80, -20 -70 Q 20 -90, 50 -60 Q 80 -30, 60 20 Q 70 60, 30 70 Q -10 90, -50 60 Q -90 40, -80 -40 Z" fill="#018786" opacity="0.18"/>
    <path d="M -80 -40 Q -60 -80, -20 -70 Q 20 -90, 50 -60 Q 80 -30, 60 20 Q 70 60, 30 70 Q -10 90, -50 60 Q -90 40, -80 -40 Z" fill="none" stroke="#018786" stroke-width="2" opacity="0.7"/>

    <g stroke="#018786" stroke-width="1.5" fill="none" opacity="0.5">
      <path d="M -50 -20 Q -20 -40, 10 -10"/>
      <path d="M -30 10 Q 10 -10, 40 20"/>
      <path d="M -40 30 Q 0 10, 30 40"/>
      <path d="M 10 -40 Q 30 -20, 50 -10"/>
    </g>

    <circle cx="-30" cy="-30" r="3" fill="#018786"/>
    <circle cx="20" cy="-10" r="3" fill="#018786"/>
    <circle cx="-10" cy="20" r="3" fill="#018786"/>
    <circle cx="30" cy="30" r="3" fill="#018786"/>

    <text x="0" y="135" text-anchor="middle" fill="#018786" font-family="monospace" font-size="14" opacity="0.7">BRAIN BIG</text>
  </g>

  <g transform="translate(280, 470)">
    <circle cx="0" cy="0" r="90" fill="url(#mouth)"/>
    <path d="M -70 -25 L 70 -25 Q 80 -25, 80 -15 L 80 35 Q 80 45, 70 45 L 60 45 L 50 60 L 40 45 L -70 45 Q -80 45, -80 35 L -80 -15 Q -80 -25, -70 -25 Z" fill="#FF9800" opacity="0.18"/>
    <path d="M -70 -25 L 70 -25 Q 80 -25, 80 -15 L 80 35 Q 80 45, 70 45 L 60 45 L 50 60 L 40 45 L -70 45 Q -80 45, -80 35 L -80 -15 Q -80 -25, -70 -25 Z" fill="none" stroke="#FF9800" stroke-width="2" opacity="0.85"/>

    <text x="0" y="10" text-anchor="middle" fill="#FF9800" font-family="monospace" font-size="32" font-weight="700">ug. bug.</text>
    <text x="0" y="32" text-anchor="middle" fill="#FF9800" font-family="monospace" font-size="11" opacity="0.75">fix:</text>
    <text x="0" y="80" text-anchor="middle" fill="#FF9800" font-family="monospace" font-size="12" opacity="0.7">MOUTH SMALL</text>
  </g>

  <g transform="translate(120, 200)">
    <rect x="-60" y="-12" width="120" height="24" rx="4" fill="none" stroke="#018786" stroke-width="1" opacity="0.3"/>
    <line x1="-50" y1="-3" x2="40" y2="-3" stroke="#018786" stroke-width="0.8" opacity="0.4"/>
    <line x1="-50" y1="3" x2="20" y2="3" stroke="#018786" stroke-width="0.8" opacity="0.4"/>
    <text x="0" y="30" text-anchor="middle" fill="#018786" font-family="monospace" font-size="9" opacity="0.5">verbose</text>
  </g>

  <g stroke="#018786" stroke-width="1.5" fill="none" opacity="0.4">
    <path d="M 200 220 Q 300 350, 360 420" stroke-dasharray="4 4"/>
    <path d="M 200 240 Q 320 380, 380 440" stroke-dasharray="4 4" opacity="0.3"/>
    <path d="M 200 260 Q 340 410, 400 460" stroke-dasharray="4 4" opacity="0.2"/>
  </g>

  <polygon points="365,420 355,415 355,425" fill="#FF9800" opacity="0.6"/>
  <polygon points="385,440 375,435 375,445" fill="#FF9800" opacity="0.4"/>
  <polygon points="405,460 395,455 395,465" fill="#FF9800" opacity="0.25"/>

  <g transform="translate(960, 110)">
    <rect x="-50" y="-15" width="100" height="30" rx="15" fill="#018786" opacity="0.15"/>
    <text x="0" y="5" text-anchor="middle" fill="#018786" font-family="monospace" font-size="14" font-weight="600">75% LESS</text>
  </g>

  <g transform="translate(960, 540)">
    <line x1="-30" y1="0" x2="30" y2="0" stroke="#FF9800" stroke-width="2" opacity="0.7"/>
    <text x="0" y="-10" text-anchor="middle" fill="#FF9800" font-family="monospace" font-size="11" opacity="0.7">TOKEN OUTPUT</text>
  </g>

  <g transform="translate(60, 60)">
    <text x="0" y="0" fill="#018786" font-family="monospace" font-size="42" font-weight="700" opacity="0.95">CAVEMAN</text>
    <text x="0" y="22" fill="#FF9800" font-family="monospace" font-size="12" opacity="0.7">// skill that teaches agents to talk less</text>
  </g>

  <g transform="translate(60, 570)">
    <line x1="0" y1="0" x2="40" y2="0" stroke="#018786" stroke-width="2"/>
    <text x="50" y="4" fill="#018786" font-family="monospace" font-size="11" opacity="0.7">arceapps.com</text>
    <text x="200" y="4" fill="#018786" font-family="monospace" font-size="11" opacity="0.5">github.com/JuliusBrussee/caveman</text>
  </g>

  <g opacity="0.4">
    <circle cx="120" cy="380" r="2" fill="#018786"/>
    <circle cx="180" cy="420" r="1.5" fill="#FF9800"/>
    <circle cx="100" cy="320" r="1.5" fill="#018786"/>
    <circle cx="80" cy="280" r="2" fill="#FF9800"/>
    <circle cx="160" cy="500" r="1.5" fill="#018786"/>
    <circle cx="1100" cy="200" r="2" fill="#FF9800"/>
    <circle cx="1080" cy="380" r="1.5" fill="#018786"/>
    <circle cx="1140" cy="450" r="1.5" fill="#FF9800"/>
    <circle cx="1050" cy="500" r="2" fill="#018786"/>
  </g>
</svg>
