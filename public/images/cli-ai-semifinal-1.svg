<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#0F172A" />

  <!-- Background Grid -->
  <defs>
    <pattern id="smallGrid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1E293B" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#smallGrid)" />

  <!-- Terminal Window -->
  <rect x="200" y="150" width="800" height="400" rx="15" fill="#1E293B" stroke="#018786" stroke-width="4" />

  <!-- Window Header -->
  <rect x="200" y="150" width="800" height="40" rx="15" fill="#018786" />
  <circle cx="230" cy="170" r="8" fill="#FF5F56" />
  <circle cx="260" cy="170" r="8" fill="#FFBD2E" />
  <circle cx="290" cy="170" r="8" fill="#27C93F" />

  <text x="600" y="177" font-family="monospace" font-size="20" text-anchor="middle" fill="#FFFFFF" font-weight="bold">AI Agents CLI - Semifinal 1</text>

  <!-- Content -->
  <text x="240" y="240" font-family="monospace" font-size="24" fill="#FF9800" font-weight="bold">> match start --semifinal-1</text>
  <text x="240" y="290" font-family="monospace" font-size="22" fill="#94A3B8">Loading contenders...</text>

  <text x="260" y="340" font-family="monospace" font-size="26" fill="#018786" font-weight="bold">[1] OpenCode</text>
  <text x="260" y="390" font-family="monospace" font-size="26" fill="#018786" font-weight="bold">[2] Cline</text>
  <text x="260" y="440" font-family="monospace" font-size="26" fill="#018786" font-weight="bold">[3] DeepSeek CLI</text>
  <text x="260" y="490" font-family="monospace" font-size="26" fill="#018786" font-weight="bold">[4] Aider</text>

  <!-- Blinking Cursor -->
  <rect x="420" y="520" width="15" height="30" fill="#FF9800">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite" />
  </rect>

</svg>