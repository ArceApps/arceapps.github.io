<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <!-- Background -->
  <rect width="800" height="420" fill="#0d1117"/>

  <!-- Grid lines subtle -->
  <line x1="0" y1="140" x2="800" y2="140" stroke="#1a2332" stroke-width="1"/>
  <line x1="0" y1="280" x2="800" y2="280" stroke="#1a2332" stroke-width="1"/>
  <line x1="267" y1="0" x2="267" y2="420" stroke="#1a2332" stroke-width="1"/>
  <line x1="534" y1="0" x2="534" y2="420" stroke="#1a2332" stroke-width="1"/>

  <!-- === LEFT: Android Phone outline === -->
  <!-- Phone frame -->
  <rect x="50" y="70" width="140" height="280" rx="20" fill="none" stroke="#3fb950" stroke-width="3"/>
  <!-- Screen area -->
  <rect x="58" y="90" width="124" height="250" rx="5" fill="#3fb950" opacity="0.08"/>
  <!-- Status bar -->
  <rect x="58" y="90" width="124" height="20" rx="5" fill="#3fb950" opacity="0.15"/>
  <!-- App content suggestion -->
  <rect x="68" y="118" width="104" height="12" rx="6" fill="#3fb950" opacity="0.4"/>
  <rect x="68" y="138" width="80" height="8" rx="4" fill="#3fb950" opacity="0.25"/>
  <rect x="68" y="155" width="90" height="8" rx="4" fill="#3fb950" opacity="0.25"/>
  <rect x="68" y="172" width="60" height="8" rx="4" fill="#3fb950" opacity="0.25"/>
  <!-- Bottom nav bar -->
  <rect x="58" y="310" width="124" height="30" rx="0" fill="#3fb950" opacity="0.15"/>
  <circle cx="85" cy="325" r="8" fill="none" stroke="#3fb950" stroke-width="2"/>
  <rect x="100" y="320" width="20" height="10" rx="2" fill="#3fb950" opacity="0.4"/>
  <rect x="128" y="320" width="20" height="10" rx="2" fill="#3fb950" opacity="0.4"/>
  <!-- Label -->
  <text x="120" y="390" text-anchor="middle" font-family="monospace" font-size="11" fill="#3fb950">Android + Kotlin</text>

  <!-- === CENTER: OpenSpec Change Proposal === -->
  <!-- Central card stack - stacked folders -->
  <!-- Back folder -->
  <rect x="292" y="88" width="220" height="50" rx="6" fill="#1a2332" stroke="#FF9800" stroke-width="1.5"/>
  <text x="402" y="118" text-anchor="middle" font-family="monospace" font-size="10" fill="#FF9800" opacity="0.5">design.md</text>

  <!-- Middle folder -->
  <rect x="292" y="78" width="220" height="50" rx="6" fill="#1a2332" stroke="#FF9800" stroke-width="2"/>
  <text x="402" y="108" text-anchor="middle" font-family="monospace" font-size="10" fill="#FF9800" opacity="0.7">tasks.md</text>

  <!-- Front folder - proposal -->
  <rect x="292" y="68" width="220" height="50" rx="6" fill="#FF9800" opacity="0.15" stroke="#FF9800" stroke-width="2"/>
  <!-- Folder tab -->
  <path d="M310 68 L310 58 Q310 53 315 53 L370 53 Q375 53 377 58 L377 68" fill="#FF9800" opacity="0.3" stroke="#FF9800" stroke-width="1"/>
  <text x="402" y="98" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="#FF9800">proposal.md</text>

  <!-- Arrow from phone to spec -->
  <line x1="190" y1="210" x2="292" y2="210" stroke="#FF9800" stroke-width="2" stroke-dasharray="6,4"/>
  <polygon points="287,206 292,210 287,214" fill="#FF9800"/>

  <!-- Label: Change Proposal -->
  <text x="402" y="145" text-anchor="middle" font-family="monospace" font-size="10" fill="#FF9800">openspec/changes/ch-XXXX/</text>
  <text x="402" y="180" text-anchor="middle" font-family="monospace" font-size="11" fill="#64748b">Spec-Driven Mobile Dev</text>
  <text x="402" y="198" text-anchor="middle" font-family="monospace" font-size="9" fill="#64748b">Proposal → Specs → Tasks → Code</text>

  <!-- === RIGHT: Flow arrows to implementation === -->
  <!-- Flow boxes -->
  <rect x="560" y="88" width="90" height="35" rx="5" fill="#6366f1" opacity="0.15" stroke="#6366f1" stroke-width="2"/>
  <text x="605" y="111" text-anchor="middle" font-family="monospace" font-size="10" fill="#6366f1">biometric</text>

  <rect x="560" y="138" width="90" height="35" rx="5" fill="#6366f1" opacity="0.15" stroke="#6366f1" stroke-width="2"/>
  <text x="605" y="161" text-anchor="middle" font-family="monospace" font-size="10" fill="#6366f1">encrypted</text>

  <rect x="560" y="188" width="90" height="35" rx="5" fill="#6366f1" opacity="0.15" stroke="#6366f1" stroke-width="2"/>
  <text x="605" y="211" text-anchor="middle" font-family="monospace" font-size="10" fill="#6366f1">fallback</text>

  <!-- Arrow from center to right -->
  <line x1="512" y1="155" x2="560" y2="155" stroke="#6366f1" stroke-width="2" stroke-dasharray="6,4"/>
  <polygon points="555,151 560,155 555,159" fill="#6366f1"/>

  <!-- Label: Implementation -->
  <text x="605" y="260" text-anchor="middle" font-family="monospace" font-size="10" fill="#6366f1">Implementation</text>
  <text x="605" y="280" text-anchor="middle" font-family="monospace" font-size="9" fill="#64748b">Hilt + Compose + Flow</text>

  <!-- === BOTTOM: OpenSpec Validate cycle === -->
  <!-- Archive/archive circle -->
  <circle cx="400" cy="340" r="45" fill="none" stroke="#FF9800" stroke-width="2" stroke-dasharray="8,4"/>
  <!-- Checkmarks inside -->
  <path d="M375 340 L385 350 L425 310" stroke="#3fb950" stroke-width="3" fill="none"/>
  <text x="400" y="400" text-anchor="middle" font-family="monospace" font-size="10" fill="#FF9800">openspec archive</text>
  <text x="400" y="415" text-anchor="middle" font-family="monospace" font-size="9" fill="#64748b">Δ → main/specs/</text>

  <!-- Connecting lines from proposal stack to archive -->
  <line x1="400" y1="240" x2="400" y2="290" stroke="#FF9800" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="655" y1="205" x2="655" y2="290" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="655" y1="290" x2="445" y2="290" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="4,4"/>

</svg>