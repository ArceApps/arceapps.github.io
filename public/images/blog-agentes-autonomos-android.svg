<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0d1f2d"/>
      <stop offset="100%" stop-color="#071318"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-strong">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bg)"/>

  <!-- Grid lines subtle -->
  <g stroke="#018786" stroke-width="0.3" opacity="0.12">
    <line x1="0" y1="50" x2="800" y2="50"/>
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="150" x2="800" y2="150"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="250" x2="800" y2="250"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="350" x2="800" y2="350"/>
    <line x1="50" y1="0" x2="50" y2="400"/>
    <line x1="150" y1="0" x2="150" y2="400"/>
    <line x1="250" y1="0" x2="250" y2="400"/>
    <line x1="350" y1="0" x2="350" y2="400"/>
    <line x1="450" y1="0" x2="450" y2="400"/>
    <line x1="550" y1="0" x2="550" y2="400"/>
    <line x1="650" y1="0" x2="650" y2="400"/>
    <line x1="750" y1="0" x2="750" y2="400"/>
  </g>

  <!-- Connection lines between nodes -->
  <g stroke="#018786" stroke-width="1.5" opacity="0.5" filter="url(#glow)">
    <!-- Center to top-left -->
    <line x1="400" y1="200" x2="220" y2="120"/>
    <!-- Center to top-right -->
    <line x1="400" y1="200" x2="580" y2="120"/>
    <!-- Center to bottom-left -->
    <line x1="400" y1="200" x2="200" y2="295"/>
    <!-- Center to bottom-right -->
    <line x1="400" y1="200" x2="600" y2="295"/>
    <!-- Center to right -->
    <line x1="400" y1="200" x2="680" y2="200"/>
    <!-- Center to left -->
    <line x1="400" y1="200" x2="120" y2="200"/>
    <!-- Side connections -->
    <line x1="120" y1="200" x2="220" y2="120"/>
    <line x1="120" y1="200" x2="200" y2="295"/>
    <line x1="680" y1="200" x2="580" y2="120"/>
    <line x1="680" y1="200" x2="600" y2="295"/>
  </g>
  <!-- Orange accent connections -->
  <g stroke="#FF9800" stroke-width="1" opacity="0.35" stroke-dasharray="4 4">
    <line x1="220" y1="120" x2="580" y2="120"/>
    <line x1="200" y1="295" x2="600" y2="295"/>
    <line x1="220" y1="120" x2="200" y2="295"/>
    <line x1="580" y1="120" x2="600" y2="295"/>
  </g>

  <!-- Hexagonal node: center (main orchestrator) -->
  <g transform="translate(400,200)" filter="url(#glow-strong)">
    <polygon points="0,-46 40,-23 40,23 0,46 -40,23 -40,-23" fill="#018786" opacity="0.25" stroke="#018786" stroke-width="2"/>
    <polygon points="0,-36 31,-18 31,18 0,36 -31,18 -31,-18" fill="#018786" opacity="0.4" stroke="#01a898" stroke-width="1.5"/>
    <!-- Gear icon simplified -->
    <circle cx="0" cy="0" r="14" fill="none" stroke="white" stroke-width="2"/>
    <circle cx="0" cy="0" r="6" fill="white" opacity="0.9"/>
    <rect x="-3" y="-20" width="6" height="8" rx="2" fill="white" opacity="0.9"/>
    <rect x="-3" y="12" width="6" height="8" rx="2" fill="white" opacity="0.9"/>
    <rect x="-20" y="-3" width="8" height="6" rx="2" fill="white" opacity="0.9"/>
    <rect x="12" y="-3" width="8" height="6" rx="2" fill="white" opacity="0.9"/>
  </g>

  <!-- Node: top-left -->
  <g transform="translate(220,120)" filter="url(#glow)">
    <polygon points="0,-32 28,-16 28,16 0,32 -28,16 -28,-16" fill="#013d3c" stroke="#018786" stroke-width="1.5"/>
    <polygon points="0,-24 21,-12 21,12 0,24 -21,12 -21,-12" fill="#018786" opacity="0.3" stroke="#01a898" stroke-width="1"/>
    <!-- Robot face simplified -->
    <rect x="-10" y="-10" width="20" height="16" rx="3" fill="none" stroke="white" stroke-width="1.5"/>
    <circle cx="-4" cy="-3" r="2.5" fill="#FF9800"/>
    <circle cx="4" cy="-3" r="2.5" fill="#FF9800"/>
    <line x1="-6" y1="5" x2="6" y2="5" stroke="white" stroke-width="1.5"/>
    <line x1="0" y1="-10" x2="0" y2="-15" stroke="white" stroke-width="1.5"/>
  </g>

  <!-- Node: top-right -->
  <g transform="translate(580,120)" filter="url(#glow)">
    <polygon points="0,-32 28,-16 28,16 0,32 -28,16 -28,-16" fill="#013d3c" stroke="#018786" stroke-width="1.5"/>
    <polygon points="0,-24 21,-12 21,12 0,24 -21,12 -21,-12" fill="#018786" opacity="0.3" stroke="#01a898" stroke-width="1"/>
    <rect x="-10" y="-10" width="20" height="16" rx="3" fill="none" stroke="white" stroke-width="1.5"/>
    <circle cx="-4" cy="-3" r="2.5" fill="#FF9800"/>
    <circle cx="4" cy="-3" r="2.5" fill="#FF9800"/>
    <line x1="-6" y1="5" x2="6" y2="5" stroke="white" stroke-width="1.5"/>
    <line x1="0" y1="-10" x2="0" y2="-15" stroke="white" stroke-width="1.5"/>
  </g>

  <!-- Node: left -->
  <g transform="translate(120,200)" filter="url(#glow)">
    <polygon points="0,-28 24,-14 24,14 0,28 -24,14 -24,-14" fill="#013d3c" stroke="#FF9800" stroke-width="1.5"/>
    <polygon points="0,-20 17,-10 17,10 0,20 -17,10 -17,-10" fill="#FF9800" opacity="0.2" stroke="#FF9800" stroke-width="1"/>
    <!-- Code brackets -->
    <text x="-8" y="6" font-family="monospace" font-size="14" fill="#FF9800" opacity="0.9">&lt;/&gt;</text>
  </g>

  <!-- Node: right -->
  <g transform="translate(680,200)" filter="url(#glow)">
    <polygon points="0,-28 24,-14 24,14 0,28 -24,14 -24,-14" fill="#013d3c" stroke="#FF9800" stroke-width="1.5"/>
    <polygon points="0,-20 17,-10 17,10 0,20 -17,10 -17,-10" fill="#FF9800" opacity="0.2" stroke="#FF9800" stroke-width="1"/>
    <text x="-8" y="6" font-family="monospace" font-size="14" fill="#FF9800" opacity="0.9">&lt;/&gt;</text>
  </g>

  <!-- Node: bottom-left -->
  <g transform="translate(200,295)" filter="url(#glow)">
    <polygon points="0,-28 24,-14 24,14 0,28 -24,14 -24,-14" fill="#013d3c" stroke="#018786" stroke-width="1.5"/>
    <polygon points="0,-20 17,-10 17,10 0,20 -17,10 -17,-10" fill="#018786" opacity="0.25" stroke="#01a898" stroke-width="1"/>
    <!-- Check mark -->
    <polyline points="-8,0 -2,7 10,-7" fill="none" stroke="#018786" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Node: bottom-right -->
  <g transform="translate(600,295)" filter="url(#glow)">
    <polygon points="0,-28 24,-14 24,14 0,28 -24,14 -24,-14" fill="#013d3c" stroke="#018786" stroke-width="1.5"/>
    <polygon points="0,-20 17,-10 17,10 0,20 -17,10 -17,-10" fill="#018786" opacity="0.25" stroke="#01a898" stroke-width="1"/>
    <polyline points="-8,0 -2,7 10,-7" fill="none" stroke="#018786" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Animated pulse rings on center node (static representation) -->
  <circle cx="400" cy="200" r="58" fill="none" stroke="#018786" stroke-width="1" opacity="0.2"/>
  <circle cx="400" cy="200" r="72" fill="none" stroke="#018786" stroke-width="0.8" opacity="0.12"/>

  <!-- Labels -->
  <text x="400" y="262" text-anchor="middle" font-family="Roboto, sans-serif" font-size="11" fill="#018786" opacity="0.8" letter-spacing="2">ORCHESTRATOR</text>
  <text x="220" y="163" text-anchor="middle" font-family="Roboto, sans-serif" font-size="9" fill="#a0c4c4" opacity="0.7">AGENT A</text>
  <text x="580" y="163" text-anchor="middle" font-family="Roboto, sans-serif" font-size="9" fill="#a0c4c4" opacity="0.7">AGENT B</text>
  <text x="120" y="240" text-anchor="middle" font-family="Roboto, sans-serif" font-size="9" fill="#a0c4c4" opacity="0.7">TOOLS</text>
  <text x="680" y="240" text-anchor="middle" font-family="Roboto, sans-serif" font-size="9" fill="#a0c4c4" opacity="0.7">TOOLS</text>
  <text x="200" y="337" text-anchor="middle" font-family="Roboto, sans-serif" font-size="9" fill="#a0c4c4" opacity="0.7">CI/CD</text>
  <text x="600" y="337" text-anchor="middle" font-family="Roboto, sans-serif" font-size="9" fill="#a0c4c4" opacity="0.7">CI/CD</text>

  <!-- Title area -->
  <text x="400" y="38" text-anchor="middle" font-family="Roboto, sans-serif" font-size="15" font-weight="700" fill="white" opacity="0.85" letter-spacing="3">AUTONOMOUS AI AGENTS · ANDROID</text>
</svg>
