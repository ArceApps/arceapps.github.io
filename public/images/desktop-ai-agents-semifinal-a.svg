<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background -->
  <rect width="100%" height="100%" fill="#0F172A"/>
  
  <!-- Subtle Grid Pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1E293B" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="url(#grid)" />

  <!-- Abstract Geometric Elements: Teal (#018786) and Orange (#FF9800) -->
  <g opacity="0.85">
    <!-- Glowing background lights -->
    <circle cx="200" cy="150" r="120" fill="#018786" filter="blur(80px)" opacity="0.15"/>
    <circle cx="1000" cy="480" r="150" fill="#FF9800" filter="blur(100px)" opacity="0.1"/>

    <!-- Central connection node structure (Agent representation) -->
    <!-- Center Node -->
    <circle cx="600" cy="280" r="18" fill="#FF9800" stroke="#0F172A" stroke-width="4"/>
    <circle cx="600" cy="280" r="30" fill="none" stroke="#FF9800" stroke-width="2" stroke-dasharray="4,4"/>

    <!-- Left Subagents (Teal) -->
    <path d="M 600 280 L 400 180" stroke="#018786" stroke-width="3" opacity="0.6"/>
    <circle cx="400" cy="180" r="10" fill="#018786"/>
    
    <path d="M 600 280 L 400 380" stroke="#018786" stroke-width="3" opacity="0.6"/>
    <circle cx="400" cy="380" r="10" fill="#018786"/>

    <!-- Right Subagents (Orange) -->
    <path d="M 600 280 L 800 180" stroke="#FF9800" stroke-width="3" opacity="0.6"/>
    <circle cx="800" cy="180" r="10" fill="#FF9800"/>
    
    <path d="M 600 280 L 800 380" stroke="#FF9800" stroke-width="3" opacity="0.6"/>
    <circle cx="800" cy="380" r="10" fill="#FF9800"/>

    <!-- Outer tech circles -->
    <circle cx="600" cy="280" r="280" fill="none" stroke="#018786" stroke-width="1.5" stroke-dasharray="10,20" opacity="0.3"/>
    <circle cx="600" cy="280" r="350" fill="none" stroke="#FF9800" stroke-width="1" stroke-dasharray="5,15" opacity="0.2"/>

    <!-- Geometric background accent lines -->
    <line x1="0" y1="50" x2="1200" y2="50" stroke="#1E293B" stroke-width="2"/>
    <line x1="0" y1="580" x2="1200" y2="580" stroke="#1E293B" stroke-width="2"/>
    <line x1="100" y1="0" x2="100" y2="630" stroke="#1E293B" stroke-dasharray="5,5" stroke-width="1"/>
    <line x1="1100" y1="0" x2="1100" y2="630" stroke="#1E293B" stroke-dasharray="5,5" stroke-width="1"/>

    <!-- Tech brackets -->
    <path d="M 120 100 L 80 100 L 80 200" fill="none" stroke="#018786" stroke-width="3" opacity="0.7"/>
    <path d="M 1080 100 L 1120 100 L 1120 200" fill="none" stroke="#FF9800" stroke-width="3" opacity="0.7"/>
    <path d="M 120 530 L 80 530 L 80 430" fill="none" stroke="#FF9800" stroke-width="3" opacity="0.7"/>
    <path d="M 1080 530 L 1120 530 L 1120 430" fill="none" stroke="#018786" stroke-width="3" opacity="0.7"/>
  </g>

  <!-- Typography (Standard clean fonts like Roboto / Sans-serif) -->
  <text x="600" y="475" text-anchor="middle" font-family="'Roboto', 'Inter', sans-serif" font-size="52" font-weight="900" fill="#F8FAFC" letter-spacing="8">
    DESKTOP AI AGENTS
  </text>
  
  <text x="600" y="525" text-anchor="middle" font-family="'Roboto', 'Inter', sans-serif" font-size="24" font-weight="600" fill="#FF9800" letter-spacing="4">
    SEMIFINAL A — OFFICIAL TECH GIANTS
  </text>
</svg>
