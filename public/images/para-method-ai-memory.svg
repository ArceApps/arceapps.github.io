<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#011f1f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#013030;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#018786;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#01a19f;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF9800;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFB74D;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Subtle grid -->
  <g stroke="#018786" stroke-opacity="0.05" stroke-width="1">
    <line x1="0" y1="126" x2="1200" y2="126"/>
    <line x1="0" y1="252" x2="1200" y2="252"/>
    <line x1="0" y1="378" x2="1200" y2="378"/>
    <line x1="0" y1="504" x2="1200" y2="504"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Left side: File tree / Markdown structure -->
  <g transform="translate(60, 80)">
    <!-- Folder icon - Projects -->
    <rect x="0" y="0" width="200" height="48" rx="6" fill="#018786" fill-opacity="0.15" stroke="#018786" stroke-width="1" stroke-opacity="0.4"/>
    <text x="12" y="20" font-family="monospace" font-size="11" fill="#018786" opacity="0.9">📁 Projects/</text>
    <text x="20" y="38" font-family="monospace" font-size="9" fill="#aaffff" opacity="0.6">  └─ active-work.md</text>

    <!-- Folder icon - Areas -->
    <rect x="0" y="58" width="200" height="48" rx="6" fill="#FF9800" fill-opacity="0.12" stroke="#FF9800" stroke-width="1" stroke-opacity="0.35"/>
    <text x="12" y="78" font-family="monospace" font-size="11" fill="#FF9800" opacity="0.9">📁 Areas/</text>
    <text x="20" y="96" font-family="monospace" font-size="9" fill="#FFD580" opacity="0.6">  └─ ongoing-care.md</text>

    <!-- Folder icon - Resources -->
    <rect x="0" y="116" width="200" height="48" rx="6" fill="#018786" fill-opacity="0.12" stroke="#018786" stroke-width="1" stroke-opacity="0.35"/>
    <text x="12" y="136" font-family="monospace" font-size="11" fill="#018786" opacity="0.9">📁 Resources/</text>
    <text x="20" y="154" font-family="monospace" font-size="9" fill="#aaffff" opacity="0.6">  └─ references.md</text>

    <!-- Folder icon - Archives -->
    <rect x="0" y="174" width="200" height="48" rx="6" fill="#FF9800" fill-opacity="0.10" stroke="#FF9800" stroke-width="1" stroke-opacity="0.3"/>
    <text x="12" y="194" font-family="monospace" font-size="11" fill="#FF9800" opacity="0.8">📁 Archives/</text>
    <text x="20" y="212" font-family="monospace" font-size="9" fill="#FFD580" opacity="0.6">  └─ completed/</text>

    <!-- Connecting arrow down to MCP label -->
    <line x1="100" y1="232" x2="100" y2="280" stroke="#018786" stroke-width="1.5" stroke-opacity="0.5" stroke-dasharray="4 3"/>
    <text x="100" y="300" text-anchor="middle" font-family="monospace" font-size="10" fill="#018786" opacity="0.7">Markdown vault</text>
  </g>

  <!-- Center: PARA circle diagram -->
  <g transform="translate(600, 315)">
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="160" fill="none" stroke="#018786" stroke-width="1" stroke-opacity="0.25" stroke-dasharray="6 4"/>
    <!-- Inner ring -->
    <circle cx="0" cy="0" r="80" fill="#018786" fill-opacity="0.08" stroke="#018786" stroke-width="1.5" stroke-opacity="0.5"/>

    <!-- P - Projects quadrant -->
    <g transform="translate(0, -120)">
      <circle cx="0" cy="0" r="36" fill="url(#tealGrad)" filter="url(#glow)" opacity="0.9"/>
      <text x="0" y="-4" text-anchor="middle" font-family="'Roboto',Arial,sans-serif" font-size="20" fill="#ffffff" font-weight="700">P</text>
      <text x="0" y="12" text-anchor="middle" font-family="monospace" font-size="7" fill="#ccffff">Projects</text>
    </g>

    <!-- A - Areas quadrant -->
    <g transform="translate(120, 0)">
      <circle cx="0" cy="0" r="36" fill="url(#orangeGrad)" filter="url(#glow)" opacity="0.9"/>
      <text x="0" y="-4" text-anchor="middle" font-family="'Roboto',Arial,sans-serif" font-size="20" fill="#ffffff" font-weight="700">A</text>
      <text x="0" y="12" text-anchor="middle" font-family="monospace" font-size="7" fill="#fff5cc">Areas</text>
    </g>

    <!-- R - Resources quadrant -->
    <g transform="translate(0, 120)">
      <circle cx="0" cy="0" r="36" fill="url(#tealGrad)" filter="url(#glow)" opacity="0.9"/>
      <text x="0" y="-4" text-anchor="middle" font-family="'Roboto',Arial,sans-serif" font-size="20" fill="#ffffff" font-weight="700">R</text>
      <text x="0" y="12" text-anchor="middle" font-family="monospace" font-size="7" fill="#ccffff">Resources</text>
    </g>

    <!-- A - Archives quadrant -->
    <g transform="translate(-120, 0)">
      <circle cx="0" cy="0" r="36" fill="url(#orangeGrad)" filter="url(#glow)" opacity="0.9"/>
      <text x="0" y="-4" text-anchor="middle" font-family="'Roboto',Arial,sans-serif" font-size="20" fill="#ffffff" font-weight="700">A</text>
      <text x="0" y="12" text-anchor="middle" font-family="monospace" font-size="7" fill="#fff5cc">Archives</text>
    </g>

    <!-- Center node: AI -->
    <circle cx="0" cy="0" r="38" fill="#011f1f" stroke="#018786" stroke-width="2" filter="url(#glow)"/>
    <text x="0" y="-2" text-anchor="middle" font-size="22" fill="#ffffff">🤖</text>
    <text x="0" y="16" text-anchor="middle" font-family="monospace" font-size="8" fill="#aaffff" opacity="0.9">AI Agent</text>

    <!-- Connecting lines from center to P/A/R/A -->
    <line x1="0" y1="-38" x2="0" y2="-84" stroke="#018786" stroke-width="1.5" stroke-opacity="0.6"/>
    <line x1="38" y1="0" x2="84" y2="0" stroke="#FF9800" stroke-width="1.5" stroke-opacity="0.6"/>
    <line x1="0" y1="38" x2="0" y2="84" stroke="#018786" stroke-width="1.5" stroke-opacity="0.6"/>
    <line x1="-38" y1="0" x2="-84" y2="0" stroke="#FF9800" stroke-width="1.5" stroke-opacity="0.6"/>
  </g>

  <!-- Right side: MCP / Tools integration -->
  <g transform="translate(940, 100)">
    <!-- Obsidian box -->
    <rect x="0" y="0" width="200" height="52" rx="6" fill="#7C3AED" fill-opacity="0.15" stroke="#7C3AED" stroke-width="1" stroke-opacity="0.4"/>
    <text x="12" y="20" font-family="'Roboto',Arial,sans-serif" font-size="12" fill="#C4B5FD" font-weight="600">⬡ Obsidian</text>
    <text x="12" y="38" font-family="monospace" font-size="9" fill="#C4B5FD" opacity="0.65">Local vault · MCP plugin</text>

    <!-- Logseq box -->
    <rect x="0" y="62" width="200" height="52" rx="6" fill="#018786" fill-opacity="0.15" stroke="#018786" stroke-width="1" stroke-opacity="0.4"/>
    <text x="12" y="82" font-family="'Roboto',Arial,sans-serif" font-size="12" fill="#80CBC4" font-weight="600">◈ Logseq</text>
    <text x="12" y="100" font-family="monospace" font-size="9" fill="#aaffff" opacity="0.65">Outliner · MCP bridge</text>

    <!-- MCP Protocol box -->
    <rect x="0" y="124" width="200" height="52" rx="6" fill="#FF9800" fill-opacity="0.12" stroke="#FF9800" stroke-width="1" stroke-opacity="0.4"/>
    <text x="12" y="144" font-family="'Roboto',Arial,sans-serif" font-size="12" fill="#FFB74D" font-weight="600">⚡ MCP Protocol</text>
    <text x="12" y="162" font-family="monospace" font-size="9" fill="#FFD580" opacity="0.65">Model Context Protocol</text>

    <!-- Git / Version Control -->
    <rect x="0" y="186" width="200" height="52" rx="6" fill="#018786" fill-opacity="0.10" stroke="#018786" stroke-width="1" stroke-opacity="0.3"/>
    <text x="12" y="206" font-family="'Roboto',Arial,sans-serif" font-size="12" fill="#80CBC4" font-weight="600">⎇ Git Version Control</text>
    <text x="12" y="224" font-family="monospace" font-size="9" fill="#aaffff" opacity="0.65">Transparent · Auditable</text>
  </g>

  <!-- Arrows from center to right side (MCP) -->
  <line x1="760" y1="315" x2="935" y2="190" stroke="#FF9800" stroke-width="1.5" stroke-opacity="0.4" stroke-dasharray="5 3"/>
  <line x1="760" y1="315" x2="935" y2="245" stroke="#018786" stroke-width="1.5" stroke-opacity="0.4" stroke-dasharray="5 3"/>
  <line x1="760" y1="315" x2="935" y2="300" stroke="#FF9800" stroke-width="1.5" stroke-opacity="0.4" stroke-dasharray="5 3"/>

  <!-- Arrows from left side to center -->
  <line x1="265" y1="200" x2="440" y2="285" stroke="#018786" stroke-width="1.5" stroke-opacity="0.4" stroke-dasharray="5 3"/>

  <!-- Title section at bottom -->
  <text x="600" y="568" text-anchor="middle" font-family="'Roboto',Arial,sans-serif" font-size="22" fill="#ffffff" font-weight="700" opacity="0.95">PARA Method · AI Memory · Markdown-First</text>
  <text x="600" y="596" text-anchor="middle" font-family="'Roboto',Arial,sans-serif" font-size="12" fill="#FF9800" font-weight="500" letter-spacing="2" opacity="0.8">PROJECTS · AREAS · RESOURCES · ARCHIVES</text>
</svg>
