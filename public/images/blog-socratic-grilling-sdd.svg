<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <!-- Background -->
  <rect width="800" height="420" fill="#0d1117"/>

  <!-- Subtle grid -->
  <line x1="0" y1="140" x2="800" y2="140" stroke="#1a2332" stroke-width="1"/>
  <line x1="0" y1="280" x2="800" y2="280" stroke="#1a2332" stroke-width="1"/>
  <line x1="267" y1="0" x2="267" y2="420" stroke="#1a2332" stroke-width="1"/>
  <line x1="534" y1="0" x2="534" y2="420" stroke="#1a2332" stroke-width="1"/>

  <!-- === PHASE 1: Grilling (left) === -->
  <text x="133" y="50" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#6366f1">PHASE 1</text>
  <text x="133" y="64" text-anchor="middle" font-family="monospace" font-size="9" fill="#475569">Grilling · Pre-spec</text>

  <!-- Question marks / interrogate -->
  <circle cx="90" cy="110" r="20" fill="#6366f1" opacity="0.15"/>
  <text x="90" y="115" text-anchor="middle" font-family="monospace" font-size="20" fill="#6366f1">?</text>
  <circle cx="133" cy="110" r="20" fill="#6366f1" opacity="0.15"/>
  <text x="133" y="115" text-anchor="middle" font-family="monospace" font-size="20" fill="#6366f1">?</text>
  <circle cx="176" cy="110" r="20" fill="#6366f1" opacity="0.15"/>
  <text x="176" y="115" text-anchor="middle" font-family="monospace" font-size="20" fill="#6366f1">?</text>

  <!-- Arrow down -->
  <line x1="133" y1="140" x2="133" y2="165" stroke="#6366f1" stroke-width="2"/>
  <polygon points="133,175 128,165 138,165" fill="#6366f1"/>

  <rect x="50" y="180" width="166" height="80" rx="8" fill="#6366f1" opacity="0.1" stroke="#6366f1" stroke-width="2"/>
  <text x="133" y="205" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#6366f1">/grill-me</text>
  <text x="133" y="222" text-anchor="middle" font-family="monospace" font-size="9" fill="#6366f1">Resolve design tree</text>
  <text x="133" y="238" text-anchor="middle" font-family="monospace" font-size="9" fill="#6366f1">before spec</text>

  <!-- === PHASE 2: Spec (center-left) === -->
  <text x="266" y="50" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#10b981">PHASE 2</text>
  <text x="266" y="64" text-anchor="middle" font-family="monospace" font-size="9" fill="#475569">SDD · Build</text>

  <!-- Document icon -->
  <rect x="220" y="90" width="92" height="76" rx="6" fill="#10b981" opacity="0.1" stroke="#10b981" stroke-width="2"/>
  <line x1="232" y1="110" x2="300" y2="110" stroke="#10b981" stroke-width="1.5" opacity="0.7"/>
  <line x1="232" y1="122" x2="300" y2="122" stroke="#10b981" stroke-width="1.5" opacity="0.7"/>
  <line x1="232" y1="134" x2="285" y2="134" stroke="#10b981" stroke-width="1.5" opacity="0.5"/>
  <line x1="232" y1="146" x2="295" y2="146" stroke="#10b981" stroke-width="1.5" opacity="0.5"/>

  <line x1="266" y1="175" x2="266" y2="200" stroke="#10b981" stroke-width="2"/>
  <polygon points="266,210 261,200 271,200" fill="#10b981"/>

  <rect x="200" y="215" width="132" height="60" rx="8" fill="#10b981" opacity="0.1" stroke="#10b981" stroke-width="2"/>
  <text x="266" y="240" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#10b981">SPEC.md</text>
  <text x="266" y="260" text-anchor="middle" font-family="monospace" font-size="9" fill="#10b981">Enforce contract</text>

  <!-- === PHASE 3: Generate (center-right) === -->
  <text x="400" y="50" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#7c3aed">PHASE 3</text>
  <text x="400" y="64" text-anchor="middle" font-family="monospace" font-size="9" fill="#475569">Generation</text>

  <!-- Code brackets -->
  <text x="400" y="130" text-anchor="middle" font-family="monospace" font-size="52" font-weight="bold" fill="#7c3aed">&lt;/&gt;</text>

  <line x1="400" y1="175" x2="400" y2="200" stroke="#7c3aed" stroke-width="2"/>
  <polygon points="400,210 395,200 405,200" fill="#7c3aed"/>

  <rect x="338" y="215" width="124" height="60" rx="8" fill="#7c3aed" opacity="0.1" stroke="#7c3aed" stroke-width="2"/>
  <text x="400" y="238" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#7c3aed">Socratic guardrails</text>
  <text x="400" y="255" text-anchor="middle" font-family="monospace" font-size="9" fill="#7c3aed">Check vs spec</text>

  <!-- === PHASE 4: Diagnose (right) === -->
  <text x="534" y="50" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#ef4444">PHASE 4</text>
  <text x="534" y="64" text-anchor="middle" font-family="monospace" font-size="9" fill="#475569">Debug · Post-failure</text>

  <!-- Bug/loop icon -->
  <circle cx="534" cy="105" r="28" fill="#ef4444" opacity="0.1" stroke="#ef4444" stroke-width="2"/>
  <text x="534" y="112" text-anchor="middle" font-family="monospace" font-size="22" fill="#ef4444">✕</text>

  <line x1="534" y1="140" x2="534" y2="165" stroke="#ef4444" stroke-width="2"/>
  <polygon points="534,175 529,165 539,165" fill="#ef4444"/>

  <rect x="468" y="180" width="132" height="80" rx="8" fill="#ef4444" opacity="0.1" stroke="#ef4444" stroke-width="2"/>
  <text x="534" y="205" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#ef4444">/diagnose</text>
  <text x="534" y="222" text-anchor="middle" font-family="monospace" font-size="9" fill="#ef4444">6-phase loop</text>
  <text x="534" y="238" text-anchor="middle" font-family="monospace" font-size="9" fill="#ef4444">Feedback → fix</text>

  <!-- === BOTTOM: The conflict label === -->
  <line x1="40" y1="320" x2="760" y2="320" stroke="#1a2332" stroke-width="1"/>

  <text x="133" y="345" text-anchor="middle" font-family="monospace" font-size="9" fill="#6366f1">Challenge assumptions</text>
  <text x="133" y="360" text-anchor="middle" font-family="monospace" font-size="8" fill="#475569">adversarial by process</text>

  <text x="266" y="345" text-anchor="middle" font-family="monospace" font-size="9" fill="#10b981">Honor the spec</text>
  <text x="266" y="360" text-anchor="middle" font-family="monospace" font-size="8" fill="#475569">adversarial by architecture</text>

  <text x="400" y="345" text-anchor="middle" font-family="monospace" font-size="9" fill="#7c3aed">Check conformance</text>
  <text x="400" y="360" text-anchor="middle" font-family="monospace" font-size="8" fill="#475569">follow spec, watch for violations</text>

  <text x="534" y="345" text-anchor="middle" font-family="monospace" font-size="9" fill="#ef4444">Discipline loop</text>
  <text x="534" y="360" text-anchor="middle" font-family="monospace" font-size="8" fill="#475569">hypothesis → instrument → fix</text>

  <!-- Key insight -->
  <rect x="160" y="378" width="480" height="30" rx="6" fill="#1e2d3d" stroke="#334155" stroke-width="1"/>
  <text x="400" y="398" text-anchor="middle" font-family="monospace" font-size="10" fill="#64748b">They optimize for different failure modes — use each in its phase</text>
</svg>