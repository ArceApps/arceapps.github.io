<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1a2820"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <radialGradient id="hubGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#018786" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#018786" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse"><path d="M 60 0 L 0 0 0 60" fill="none" stroke="#1e293b" stroke-width="0.5" opacity="0.4"/></pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <text x="600" y="48" text-anchor="middle" font-family="monospace" font-size="26" font-weight="bold" fill="#f8fafc" filter="url(#glow)">OpenCode Subagents: When to Use Each One</text>
  <text x="600" y="72" text-anchor="middle" font-family="monospace" font-size="13" fill="#64748b">3 built-in subagents · 3 distinct scopes · One key decision</text>
  <line x1="350" y1="84" x2="850" y2="84" stroke="#1e293b" stroke-width="1"/>

  <!-- Center: decision question -->
  <circle cx="600" cy="340" r="180" fill="url(#hubGlow)"/>
  <circle cx="600" cy="340" r="95" fill="#0F172A" stroke="#018786" stroke-width="2.5"/>
  <text x="600" y="320" text-anchor="middle" font-family="monospace" font-size="14" font-weight="bold" fill="#018786">WHERE</text>
  <text x="600" y="340" text-anchor="middle" font-family="monospace" font-size="14" font-weight="bold" fill="#018786">AM I WORKING?</text>
  <text x="600" y="372" text-anchor="middle" font-family="monospace" font-size="11" fill="#94a3b8">Selection</text>
  <text x="600" y="388" text-anchor="middle" font-family="monospace" font-size="11" fill="#94a3b8">question</text>

  <!-- Dashed lines hub → satellites -->
  <line x1="600" y1="245" x2="240" y2="180" stroke="#FBBF24" stroke-width="2" stroke-dasharray="6,4"/>
  <line x1="600" y1="340" x2="240" y2="340" stroke="#34d399" stroke-width="2" stroke-dasharray="6,4"/>
  <line x1="600" y1="435" x2="240" y2="500" stroke="#a78bfa" stroke-width="2" stroke-dasharray="6,4"/>

  <!-- Satellite 1: General -->
  <rect x="60" y="130" width="360" height="105" rx="14" fill="#0F172A" stroke="#FF9800" stroke-width="2.5"/>
  <rect x="76" y="148" width="40" height="40" rx="8" fill="#FF9800" opacity="0.18"/>
  <text x="96" y="176" text-anchor="middle" font-family="monospace" font-size="22" font-weight="bold" fill="#FF9800">⚙</text>
  <text x="130" y="166" font-family="monospace" font-size="16" font-weight="bold" fill="#FF9800">@general</text>
  <text x="130" y="184" font-family="monospace" font-size="11" fill="#fbbf24">The all-rounder — full tool access</text>
  <text x="76" y="210" font-family="monospace" font-size="11" fill="#cbd5e1">▸ Multi-step tasks in parallel</text>
  <text x="76" y="226" font-family="monospace" font-size="11" fill="#cbd5e1">▸ Long delegated work without</text>
  <text x="76" y="226" font-family="monospace" font-size="11" fill="#cbd5e1">▸ Can WRITE files and RUN commands</text>

  <!-- Satellite 2: Explore -->
  <rect x="60" y="290" width="360" height="105" rx="14" fill="#0F172A" stroke="#34d399" stroke-width="2.5"/>
  <rect x="76" y="308" width="40" height="40" rx="8" fill="#34d399" opacity="0.18"/>
  <text x="96" y="336" text-anchor="middle" font-family="monospace" font-size="22" font-weight="bold" fill="#34d399">⌕</text>
  <text x="130" y="326" font-family="monospace" font-size="16" font-weight="bold" fill="#34d399">@explore</text>
  <text x="130" y="344" font-family="monospace" font-size="11" fill="#6ee7b7">The cartographer — LOCAL read-only</text>
  <text x="76" y="370" font-family="monospace" font-size="11" fill="#cbd5e1">▸ Find files, keywords, patterns</text>
  <text x="76" y="386" font-family="monospace" font-size="11" fill="#cbd5e1">▸ Map unfamiliar code without risk</text>

  <!-- Satellite 3: Scout -->
  <rect x="60" y="450" width="360" height="105" rx="14" fill="#0F172A" stroke="#a78bfa" stroke-width="2.5"/>
  <rect x="76" y="468" width="40" height="40" rx="8" fill="#a78bfa" opacity="0.18"/>
  <text x="96" y="496" text-anchor="middle" font-family="monospace" font-size="22" font-weight="bold" fill="#a78bfa">⌖</text>
  <text x="130" y="486" font-family="monospace" font-size="16" font-weight="bold" fill="#a78bfa">@scout</text>
  <text x="130" y="504" font-family="monospace" font-size="11" fill="#c4b5fd">The archaeologist — EXTERNAL read-only</text>
  <text x="76" y="530" font-family="monospace" font-size="11" fill="#cbd5e1">▸ Clone dependency repos, read source</text>
  <text x="76" y="546" font-family="monospace" font-size="11" fill="#cbd5e1">▸ Breaking changes, upstream code</text>

  <!-- Right panel: Decision tree -->
  <rect x="780" y="130" width="360" height="425" rx="14" fill="#0F172A" stroke="#1e293b" stroke-width="1.5"/>
  <text x="960" y="160" text-anchor="middle" font-family="monospace" font-size="14" font-weight="bold" fill="#f8fafc">QUICK DECISION TREE</text>
  <line x1="820" y1="172" x2="1100" y2="172" stroke="#1e293b" stroke-width="1"/>

  <text x="800" y="200" font-family="monospace" font-size="11" fill="#94a3b8">Need to MODIFY files?</text>
  <text x="800" y="220" font-family="monospace" font-size="11" fill="#FF9800">▸ YES → @general</text>
  <text x="800" y="240" font-family="monospace" font-size="11" fill="#94a3b8">Looking at LOCAL code?</text>
  <text x="800" y="260" font-family="monospace" font-size="11" fill="#34d399">▸ YES → @explore</text>
  <text x="800" y="280" font-family="monospace" font-size="11" fill="#94a3b8">Is it an EXTERNAL dependency?</text>
  <text x="800" y="300" font-family="monospace" font-size="11" fill="#a78bfa">▸ YES → @scout</text>

  <line x1="820" y1="320" x2="1100" y2="320" stroke="#1e293b" stroke-width="1"/>

  <text x="800" y="345" font-family="monospace" font-size="12" font-weight="bold" fill="#f8fafc">Default permissions</text>
  <text x="800" y="370" font-family="monospace" font-size="11" fill="#FF9800">@general</text>
  <text x="800" y="388" font-family="monospace" font-size="10" fill="#cbd5e1">edit: allow · bash: allow</text>
  <text x="800" y="412" font-family="monospace" font-size="11" fill="#34d399">@explore</text>
  <text x="800" y="430" font-family="monospace" font-size="10" fill="#cbd5e1">full read-only</text>
  <text x="800" y="454" font-family="monospace" font-size="11" fill="#a78bfa">@scout</text>
  <text x="800" y="472" font-family="monospace" font-size="10" fill="#cbd5e1">read-only + external cache</text>

  <line x1="820" y1="495" x2="1100" y2="495" stroke="#1e293b" stroke-width="1"/>
  <text x="960" y="520" text-anchor="middle" font-family="monospace" font-size="11" font-style="italic" fill="#64748b">"The right agent for the right task"</text>
  <text x="960" y="540" text-anchor="middle" font-family="monospace" font-size="10" fill="#64748b">reduces noise and context cost</text>

  <!-- Footer -->
  <text x="600" y="610" text-anchor="middle" font-family="monospace" font-size="10" fill="#475569">ARCEAPPS · opencode-subagents · 2026</text>
</svg>
