<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0F172A"/>

  <!-- Patrón de cuadrícula tenue -->
  <g stroke="#ffffff" stroke-opacity="0.05" stroke-width="1">
    <line x1="0" y1="100" x2="1200" y2="100" />
    <line x1="0" y1="200" x2="1200" y2="200" />
    <line x1="0" y1="300" x2="1200" y2="300" />
    <line x1="0" y1="400" x2="1200" y2="400" />
    <line x1="0" y1="500" x2="1200" y2="500" />

    <line x1="200" y1="0" x2="200" y2="630" />
    <line x1="400" y1="0" x2="400" y2="630" />
    <line x1="600" y1="0" x2="600" y2="630" />
    <line x1="800" y1="0" x2="800" y2="630" />
    <line x1="1000" y1="0" x2="1000" y2="630" />
  </g>

  <!-- Decoración asimétrica principal (CLI/Terminal shape) -->
  <rect x="250" y="150" width="700" height="400" rx="10" fill="#018786" fill-opacity="0.1" stroke="#018786" stroke-width="2"/>
  <rect x="250" y="150" width="700" height="40" rx="10" fill="#018786" fill-opacity="0.3"/>
  <circle cx="280" cy="170" r="5" fill="#FF9800"/>
  <circle cx="300" cy="170" r="5" fill="#018786"/>

  <text x="300" y="240" font-family="monospace" font-size="24" fill="#FF9800" font-weight="bold">>_ android create</text>
  <text x="300" y="290" font-family="monospace" font-size="24" fill="#ffffff" fill-opacity="0.8">Generating project...</text>
  <text x="300" y="340" font-family="monospace" font-size="24" fill="#FF9800" font-weight="bold">>_ android emulator start</text>
  <text x="300" y="390" font-family="monospace" font-size="24" fill="#ffffff" fill-opacity="0.8">Starting medium_phone...</text>

  <!-- Elemento abstracto secundario -->
  <circle cx="100" cy="100" r="150" fill="#FF9800" fill-opacity="0.05"/>
  <circle cx="1100" cy="530" r="200" fill="#018786" fill-opacity="0.05"/>
  <polygon points="900,100 950,200 850,200" fill="none" stroke="#FF9800" stroke-width="2" stroke-opacity="0.5"/>
</svg>