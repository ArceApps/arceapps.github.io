<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <!-- Background -->
  <rect width="800" height="420" fill="#0d1117"/>

  <!-- Grid lines subtle -->
  <line x1="0" y1="140" x2="800" y2="140" stroke="#1a2332" stroke-width="1"/>
  <line x1="0" y1="280" x2="800" y2="280" stroke="#1a2332" stroke-width="1"/>
  <line x1="267" y1="0" x2="267" y2="420" stroke="#1a2332" stroke-width="1"/>
  <line x1="534" y1="0" x2="534" y2="420" stroke="#1a2332" stroke-width="1"/>

  <!-- === SPEC KIT block (left) === -->
  <!-- Header bar -->
  <rect x="30" y="50" width="207" height="6" rx="3" fill="#018786"/>
  <!-- Title -->
  <text x="133" y="90" text-anchor="middle" font-family="monospace" font-size="13" font-weight="bold" fill="#018786">GitHub Spec Kit</text>
  <!-- Constitution icon — document outline -->
  <rect x="98" y="105" width="70" height="88" rx="5" fill="none" stroke="#018786" stroke-width="2"/>
  <rect x="105" y="112" width="56" height="74" rx="3" fill="#018786" opacity="0.08"/>
  <line x1="110" y1="125" x2="160" y2="125" stroke="#018786" stroke-width="1.5" opacity="0.7"/>
  <line x1="110" y1="136" x2="160" y2="136" stroke="#018786" stroke-width="1.5" opacity="0.7"/>
  <line x1="110" y1="147" x2="150" y2="147" stroke="#018786" stroke-width="1.5" opacity="0.5"/>
  <line x1="110" y1="158" x2="155" y2="158" stroke="#018786" stroke-width="1.5" opacity="0.5"/>
  <line x1="110" y1="169" x2="145" y2="169" stroke="#018786" stroke-width="1.5" opacity="0.3"/>
  <!-- Badge: Constitution -->
  <rect x="89" y="202" width="88" height="20" rx="10" fill="#018786" opacity="0.2"/>
  <text x="133" y="216" text-anchor="middle" font-family="monospace" font-size="10" fill="#018786">constitution.md</text>
  <!-- Subtitle -->
  <text x="133" y="248" text-anchor="middle" font-family="monospace" font-size="9" fill="#64748b">Architectural Contract</text>
  <text x="133" y="260" text-anchor="middle" font-family="monospace" font-size="9" fill="#64748b">Phase Gating · AI-native</text>

  <!-- === OPENSPEC block (center) === -->
  <!-- Header bar -->
  <rect x="297" y="50" width="207" height="6" rx="3" fill="#FF9800"/>
  <!-- Title -->
  <text x="400" y="90" text-anchor="middle" font-family="monospace" font-size="13" font-weight="bold" fill="#FF9800">OpenSpec</text>
  <!-- Change proposal icon — stacked cards -->
  <rect x="362" y="108" width="76" height="60" rx="4" fill="none" stroke="#FF9800" stroke-width="2" opacity="0.5"/>
  <rect x="368" y="102" width="76" height="60" rx="4" fill="none" stroke="#FF9800" stroke-width="2" opacity="0.7"/>
  <rect x="374" y="96" width="76" height="60" rx="4" fill="#FF9800" opacity="0.08" stroke="#FF9800" stroke-width="2"/>
  <!-- Arrow inside top card -->
  <line x1="392" y1="118" x2="432" y2="118" stroke="#FF9800" stroke-width="1.5"/>
  <polygon points="432,114 440,118 432,122" fill="#FF9800"/>
  <text x="400" y="133" text-anchor="middle" font-family="monospace" font-size="9" fill="#FF9800" opacity="0.8">proposal.md</text>
  <text x="400" y="145" text-anchor="middle" font-family="monospace" font-size="9" fill="#FF9800" opacity="0.6">specs/ tasks/</text>
  <!-- Badge: Change-based -->
  <rect x="349" y="172" width="102" height="20" rx="10" fill="#FF9800" opacity="0.2"/>
  <text x="400" y="186" text-anchor="middle" font-family="monospace" font-size="10" fill="#FF9800">Change Proposals</text>
  <!-- Subtitle -->
  <text x="400" y="248" text-anchor="middle" font-family="monospace" font-size="9" fill="#64748b">Brownfield-First · Deltas</text>
  <text x="400" y="260" text-anchor="middle" font-family="monospace" font-size="9" fill="#64748b">Reverse Eng · Agile</text>

  <!-- === BMAD block (right) === -->
  <!-- Header bar -->
  <rect x="563" y="50" width="207" height="6" rx="3" fill="#a855f7"/>
  <!-- Title -->
  <text x="666" y="90" text-anchor="middle" font-family="monospace" font-size="13" font-weight="bold" fill="#a855f7">BMAD-METHOD</text>
  <!-- Multi-agent icon — interconnected nodes -->
  <!-- Central node -->
  <circle cx="666" cy="145" r="14" fill="none" stroke="#a855f7" stroke-width="2"/>
  <text x="666" y="149" text-anchor="middle" font-family="monospace" font-size="8" fill="#a855f7">PM</text>
  <!-- Surrounding nodes -->
  <circle cx="630" cy="115" r="10" fill="none" stroke="#a855f7" stroke-width="1.5" opacity="0.8"/>
  <text x="630" y="119" text-anchor="middle" font-family="monospace" font-size="7" fill="#a855f7">ARCH</text>
  <circle cx="702" cy="115" r="10" fill="none" stroke="#a855f7" stroke-width="1.5" opacity="0.8"/>
  <text x="702" y="119" text-anchor="middle" font-family="monospace" font-size="7" fill="#a855f7">DEV</text>
  <circle cx="630" cy="175" r="10" fill="none" stroke="#a855f7" stroke-width="1.5" opacity="0.8"/>
  <text x="630" y="179" text-anchor="middle" font-family="monospace" font-size="7" fill="#a855f7">QA</text>
  <circle cx="702" cy="175" r="10" fill="none" stroke="#a855f7" stroke-width="1.5" opacity="0.8"/>
  <text x="702" y="179" text-anchor="middle" font-family="monospace" font-size="7" fill="#a855f7">UX</text>
  <!-- Connections -->
  <line x1="652" y1="134" x2="638" y2="123" stroke="#a855f7" stroke-width="1" opacity="0.5"/>
  <line x1="680" y1="134" x2="694" y2="123" stroke="#a855f7" stroke-width="1" opacity="0.5"/>
  <line x1="652" y1="156" x2="638" y2="167" stroke="#a855f7" stroke-width="1" opacity="0.5"/>
  <line x1="680" y1="156" x2="694" y2="167" stroke="#a855f7" stroke-width="1" opacity="0.5"/>
  <!-- Badge: Multi-Agent -->
  <rect x="616" y="196" width="100" height="20" rx="10" fill="#a855f7" opacity="0.2"/>
  <text x="666" y="210" text-anchor="middle" font-family="monospace" font-size="10" fill="#a855f7">Multi-Agent Squad</text>
  <!-- Subtitle -->
  <text x="666" y="248" text-anchor="middle" font-family="monospace" font-size="9" fill="#64748b">Agile Orchestration</text>
  <text x="666" y="260" text-anchor="middle" font-family="monospace" font-size="9" fill="#64748b">Docs-as-Code · YAML</text>

  <!-- Bottom separator line -->
  <line x1="40" y1="290" x2="760" y2="290" stroke="#1e293b" stroke-width="1.5"/>

  <!-- Bottom label -->
  <text x="400" y="326" text-anchor="middle" font-family="monospace" font-size="15" font-weight="bold" fill="#e2e8f0">SDD Frameworks Deep Dive</text>
  <text x="400" y="348" text-anchor="middle" font-family="monospace" font-size="11" fill="#64748b">Spec Kit  ·  OpenSpec  ·  BMAD-METHOD</text>

  <!-- Decorative corner dots -->
  <circle cx="40" cy="40" r="3" fill="#018786" opacity="0.6"/>
  <circle cx="760" cy="40" r="3" fill="#FF9800" opacity="0.6"/>
  <circle cx="40" cy="390" r="3" fill="#a855f7" opacity="0.6"/>
  <circle cx="760" cy="390" r="3" fill="#018786" opacity="0.6"/>

  <!-- Version label -->
  <text x="400" y="395" text-anchor="middle" font-family="monospace" font-size="9" fill="#334155">2026 · arceapps.github.io</text>
</svg>
