<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <!-- Background -->
  <rect width="800" height="420" fill="#0d1117"/>

  <!-- Grid lines -->
  <line x1="0" y1="140" x2="800" y2="140" stroke="#1a2332" stroke-width="1"/>
  <line x1="0" y1="280" x2="800" y2="280" stroke="#1a2332" stroke-width="1"/>
  <line x1="267" y1="0" x2="267" y2="420" stroke="#1a2332" stroke-width="1"/>
  <line x1="534" y1="0" x2="534" y2="420" stroke="#1a2332" stroke-width="1"/>

  <!-- === LEFT: Question mark (Socratic prompt) === -->
  <circle cx="120" cy="200" r="70" fill="none" stroke="#6366f1" stroke-width="3"/>
  <text x="120" y="185" text-anchor="middle" font-family="monospace" font-size="64" font-weight="bold" fill="#6366f1">?</text>
  <text x="120" y="220" text-anchor="middle" font-family="monospace" font-size="9" fill="#6366f1">Socratic</text>
  <text x="120" y="235" text-anchor="middle" font-family="monospace" font-size="9" fill="#6366f1">Prompt</text>

  <!-- === CENTER: Kotlin logo abstraction === -->
  <circle cx="400" cy="200" r="85" fill="none" stroke="#7c3aed" stroke-width="3"/>
  <circle cx="400" cy="200" r="65" fill="#7c3aed" opacity="0.1" stroke="#7c3aed" stroke-width="2"/>
  <!-- K letter stylized -->
  <text x="400" y="225" text-anchor="middle" font-family="monospace" font-size="52" font-weight="bold" fill="#7c3aed">K</text>
  <text x="400" y="250" text-anchor="middle" font-family="monospace" font-size="9" fill="#7c3aed">Kotlin</text>

  <!-- === RIGHT: Yes-Man crossed out === -->
  <circle cx="680" cy="180" r="60" fill="none" stroke="#ec4899" stroke-width="3"/>
  <text x="680" y="175" text-anchor="middle" font-family="monospace" font-size="28" font-weight="bold" fill="#ec4899">YES</text>
  <text x="680" y="200" text-anchor="middle" font-family="monospace" font-size="28" font-weight="bold" fill="#ec4899">MAN</text>
  <!-- Red X overlay -->
  <line x1="650" y1="150" x2="710" y2="210" stroke="#ef4444" stroke-width="4"/>
  <line x1="710" y1="150" x2="650" y2="210" stroke="#ef4444" stroke-width="4"/>
  <text x="680" y="260" text-anchor="middle" font-family="monospace" font-size="9" fill="#ef4444">No more!</text>

  <!-- === BOTTOM LEFT: Android robot abstraction === -->
  <rect x="50" y="290" width="100" height="80" rx="10" fill="none" stroke="#10b981" stroke-width="2"/>
  <circle cx="75" cy="320" r="12" fill="#10b981" opacity="0.3"/>
  <circle cx="125" cy="320" r="12" fill="#10b981" opacity="0.3"/>
  <rect x="85" y="310" width="30" height="50" rx="5" fill="#10b981" opacity="0.2"/>
  <text x="100" y="390" text-anchor="middle" font-family="monospace" font-size="9" fill="#10b981">Android</text>

  <!-- === BOTTOM CENTER: Coroutines/Flow === -->
  <rect x="300" y="300" width="200" height="70" rx="8" fill="none" stroke="#f59e0b" stroke-width="2"/>
  <text x="400" y="330" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#f59e0b">Coroutines + Flow</text>
  <text x="400" y="350" text-anchor="middle" font-family="monospace" font-size="9" fill="#f59e0b">StateFlow · suspend</text>

  <!-- === BOTTOM RIGHT: Architecture layers === -->
  <rect x="580" y="290" width="170" height="80" rx="8" fill="none" stroke="#8b5cf6" stroke-width="2"/>
  <text x="665" y="320" text-anchor="middle" font-family="monospace" font-size="9" font-weight="bold" fill="#8b5cf6">Clean Architecture</text>
  <line x1="590" y1="335" x2="740" y2="335" stroke="#8b5cf6" stroke-width="1" opacity="0.5"/>
  <line x1="590" y1="350" x2="740" y2="350" stroke="#8b5cf6" stroke-width="1" opacity="0.5"/>
  <text x="665" y="365" text-anchor="middle" font-family="monospace" font-size="8" fill="#8b5cf6">UI / Domain / Data</text>

  <!-- === Labels === -->
  <text x="120" y="380" text-anchor="middle" font-family="monospace" font-size="10" fill="#64748b">Prompt</text>
  <text x="400" y="380" text-anchor="middle" font-family="monospace" font-size="10" fill="#64748b">Language</text>
  <text x="680" y="380" text-anchor="middle" font-family="monospace" font-size="10" fill="#64748b">Anti-pattern</text>

</svg>