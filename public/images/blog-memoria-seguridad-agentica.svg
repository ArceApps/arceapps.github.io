<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0d1117"/>

  <!-- Grid lines (subtle) -->
  <g stroke="#1a2233" stroke-width="1" opacity="0.6">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="150" y1="0" x2="150" y2="630"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="450" y1="0" x2="450" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="750" y1="0" x2="750" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="1050" y1="0" x2="1050" y2="630"/>
  </g>

  <!-- Central shield (main element) -->
  <polygon points="600,90 720,150 720,280 600,340 480,280 480,150" fill="none" stroke="#018786" stroke-width="3" opacity="0.9"/>
  <polygon points="600,110 705,162 705,270 600,322 495,270 495,162" fill="#018786" opacity="0.12"/>

  <!-- Lock icon inside shield -->
  <rect x="572" y="200" width="56" height="46" rx="6" fill="none" stroke="#018786" stroke-width="2.5"/>
  <path d="M584 200 v-14 a16 16 0 0 1 32 0 v14" fill="none" stroke="#018786" stroke-width="2.5"/>
  <circle cx="600" cy="223" r="5" fill="#018786" opacity="0.9"/>
  <line x1="600" y1="223" x2="600" y2="235" stroke="#018786" stroke-width="2.5"/>

  <!-- Orbiting nodes (memory nodes) -->
  <!-- Node 1: top right - orange (memory poisoning) -->
  <circle cx="790" cy="160" r="28" fill="none" stroke="#FF9800" stroke-width="2"/>
  <circle cx="790" cy="160" r="8" fill="#FF9800" opacity="0.8"/>
  <line x1="765" y1="175" x2="720" y2="200" stroke="#FF9800" stroke-width="1.5" opacity="0.6" stroke-dasharray="4,3"/>

  <!-- Node 2: right - teal (encryption) -->
  <circle cx="850" cy="300" r="24" fill="none" stroke="#018786" stroke-width="2"/>
  <rect x="841" y="291" width="18" height="14" rx="3" fill="none" stroke="#018786" stroke-width="1.8"/>
  <path d="M844 291 v-5 a6 6 0 0 1 12 0 v5" fill="none" stroke="#018786" stroke-width="1.8"/>
  <line x1="826" y1="300" x2="720" y2="265" stroke="#018786" stroke-width="1.5" opacity="0.6" stroke-dasharray="4,3"/>

  <!-- Node 3: bottom right - orange (identity) -->
  <circle cx="770" cy="450" r="26" fill="none" stroke="#FF9800" stroke-width="2"/>
  <circle cx="770" cy="445" r="8" fill="none" stroke="#FF9800" stroke-width="1.8"/>
  <path d="M756 462 q0-12 14-12 q14 0 14 12" fill="none" stroke="#FF9800" stroke-width="1.8"/>
  <line x1="744" y1="440" x2="695" y2="355" stroke="#FF9800" stroke-width="1.5" opacity="0.6" stroke-dasharray="4,3"/>

  <!-- Node 4: bottom left - teal (governance) -->
  <circle cx="430" cy="450" r="26" fill="none" stroke="#018786" stroke-width="2"/>
  <rect x="421" y="438" width="18" height="20" rx="2" fill="none" stroke="#018786" stroke-width="1.8"/>
  <line x1="424" y1="446" x2="436" y2="446" stroke="#018786" stroke-width="1.5"/>
  <line x1="424" y1="452" x2="436" y2="452" stroke="#018786" stroke-width="1.5"/>
  <line x1="424" y1="458" x2="432" y2="458" stroke="#018786" stroke-width="1.5"/>
  <line x1="456" y1="440" x2="505" y2="355" stroke="#018786" stroke-width="1.5" opacity="0.6" stroke-dasharray="4,3"/>

  <!-- Node 5: left - orange (right to forget) -->
  <circle cx="350" cy="300" r="24" fill="none" stroke="#FF9800" stroke-width="2"/>
  <line x1="343" y1="293" x2="357" y2="307" stroke="#FF9800" stroke-width="2.2"/>
  <line x1="357" y1="293" x2="343" y2="307" stroke="#FF9800" stroke-width="2.2"/>
  <circle cx="350" cy="300" r="10" fill="none" stroke="#FF9800" stroke-width="1.8" stroke-dasharray="3,2"/>
  <line x1="374" y1="300" x2="480" y2="270" stroke="#FF9800" stroke-width="1.5" opacity="0.6" stroke-dasharray="4,3"/>

  <!-- Node 6: top left - teal (MaaS) -->
  <circle cx="410" cy="160" r="28" fill="none" stroke="#018786" stroke-width="2"/>
  <rect x="399" y="151" width="22" height="18" rx="3" fill="none" stroke="#018786" stroke-width="1.8"/>
  <path d="M405 151 q0-8 10-8 q10 0 10 8" fill="none" stroke="#018786" stroke-width="1.8"/>
  <line x1="438" y1="172" x2="480" y2="190" stroke="#018786" stroke-width="1.5" opacity="0.6" stroke-dasharray="4,3"/>

  <!-- Text labels for nodes -->
  <text x="790" y="200" text-anchor="middle" font-family="monospace" font-size="10" fill="#FF9800" opacity="0.8">Memory Poisoning</text>
  <text x="880" y="320" text-anchor="middle" font-family="monospace" font-size="10" fill="#018786" opacity="0.8">Encryption</text>
  <text x="790" y="492" text-anchor="middle" font-family="monospace" font-size="10" fill="#FF9800" opacity="0.8">Agentic Identity</text>
  <text x="390" y="492" text-anchor="middle" font-family="monospace" font-size="10" fill="#018786" opacity="0.8">Governance</text>
  <text x="285" y="320" text-anchor="middle" font-family="monospace" font-size="10" fill="#FF9800" opacity="0.8">Right to Forget</text>
  <text x="345" y="200" text-anchor="middle" font-family="monospace" font-size="10" fill="#018786" opacity="0.8">MaaS</text>

  <!-- Decorative data stream lines (left side) -->
  <g opacity="0.3" fill="#018786">
    <rect x="30" y="200" width="60" height="2" rx="1"/>
    <rect x="30" y="212" width="45" height="2" rx="1"/>
    <rect x="30" y="224" width="70" height="2" rx="1"/>
    <rect x="30" y="236" width="35" height="2" rx="1"/>
    <rect x="30" y="248" width="55" height="2" rx="1"/>
    <rect x="30" y="260" width="48" height="2" rx="1"/>
    <rect x="30" y="272" width="62" height="2" rx="1"/>
    <rect x="30" y="284" width="40" height="2" rx="1"/>
  </g>

  <!-- Decorative data stream lines (right side) -->
  <g opacity="0.3" fill="#FF9800">
    <rect x="1110" y="200" width="60" height="2" rx="1"/>
    <rect x="1125" y="212" width="45" height="2" rx="1"/>
    <rect x="1105" y="224" width="70" height="2" rx="1"/>
    <rect x="1135" y="236" width="35" height="2" rx="1"/>
    <rect x="1115" y="248" width="55" height="2" rx="1"/>
    <rect x="1120" y="260" width="48" height="2" rx="1"/>
    <rect x="1108" y="272" width="62" height="2" rx="1"/>
    <rect x="1130" y="284" width="40" height="2" rx="1"/>
  </g>

  <!-- Title text -->
  <text x="600" y="400" text-anchor="middle" font-family="'Roboto', sans-serif" font-size="32" font-weight="700" fill="#ffffff" letter-spacing="1">Memoria Agéntica</text>
  <text x="600" y="438" text-anchor="middle" font-family="'Roboto', sans-serif" font-size="20" font-weight="400" fill="#018786" letter-spacing="2">Seguridad · Privacidad · Futuro</text>

  <!-- Bottom tag -->
  <rect x="520" y="520" width="160" height="28" rx="14" fill="#018786" opacity="0.2"/>
  <rect x="520" y="520" width="160" height="28" rx="14" fill="none" stroke="#018786" stroke-width="1" opacity="0.5"/>
  <text x="600" y="539" text-anchor="middle" font-family="monospace" font-size="11" fill="#018786" opacity="0.9">ArceApps · 2026</text>

  <!-- Warning indicator (top right small) -->
  <polygon points="1130,50 1145,75 1115,75" fill="none" stroke="#FF9800" stroke-width="2" opacity="0.6"/>
  <text x="1130" y="70" text-anchor="middle" font-family="monospace" font-size="10" fill="#FF9800" opacity="0.8">!</text>
</svg>
