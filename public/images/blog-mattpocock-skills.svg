  <rect x="55" y="124" width="156" height="26" rx="5" fill="#0d1117" stroke="#334155" stroke-width="1"/>
  <text x="133" y="141" text-anchor="middle" font-family="monospace" font-size="9" fill="#475569">1. SPEC</text>

  <rect x="55" y="158" width="156" height="26" rx="5" fill="#0d1117" stroke="#334155" stroke-width="1"/>
