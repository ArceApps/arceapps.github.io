  <text x="474" y="251" text-anchor="middle" font-family="monospace" font-size="10" fill="#f59e0b">/caveman</text>

  <!-- /handoff -->
  <rect x="540" y="230" width="106" height="38" rx="7" fill="#0d1117" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="593" y="251" text-anchor="middle" font-family="monospace" font-size="10" fill="#f59e0b">/handoff</text>

  <!-- /zoom-out -->
  <rect x="420" y="278" width="90" height="36" rx="7" fill="#0d1117" stroke="#ec4899" stroke-width="1.5"/>
  <text x="465" y="299" text-anchor="middle" font-family="monospace" font-size="10" fill="#ec4899">/zoom-out</text>

  <!-- + more (dots) -->
  <text x="580" y="299" text-anchor="middle" font-family="monospace" font-size="14" fill="#475569">...</text>

  <!-- You own the process -->
  <text x="533" y="340" text-anchor="middle" font-family="monospace" font-size="9" fill="#10b981">You drive · tools follow</text>

  <!-- === BOTTOM: comparison bar === -->
  <line x1="40" y1="360" x2="760" y2="360" stroke="#1a2332" stroke-width="1"/>
  <text x="133" y="385" text-anchor="middle" font-family="monospace" font-size="9" fill="#475569">Framework owns process</text>
  <text x="400" y="385" text-anchor="middle" font-family="monospace" font-size="9" fill="#64748b">vs</text>
  <text x="533" y="385" text-anchor="middle" font-family="monospace" font-size="9" fill="#10b981">You own process</text>
  <text x="680" y="385" text-anchor="middle" font-family="monospace" font-size="9" fill="#64748b">tools adapt</text>

  <!-- Title -->
  <text x="400" y="412" text-anchor="middle" font-family="monospace" font-size="8" fill="#334155">mattpocock/skills · github.com/mattpocock/skills</text>
