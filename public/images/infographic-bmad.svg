<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1a1020"/>
    </linearGradient>
    <linearGradient id="violetGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrowViolet" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a78bfa"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#1e293b" stroke-width="0.5" opacity="0.4"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Title -->
  <text x="600" y="52" text-anchor="middle" font-family="monospace" font-size="28" font-weight="bold" fill="#f8fafc" filter="url(#glow)">BMAD — Big Model Agile Development</text>
  <text x="600" y="76" text-anchor="middle" font-family="monospace" font-size="13" fill="#64748b">Enterprise-grade SDD · Phased workflow · Agent-driven gates</text>
  <line x1="260" y1="88" x2="940" y2="88" stroke="#1e293b" stroke-width="1"/>

  <!-- === FOUR PHASES with gates === -->

  <!-- Phase track background -->
  <rect x="40" y="130" width="1120" height="200" rx="12" fill="#1a1030" opacity="0.4" stroke="#7c3aed" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Phase 1: Brainstorm -->
  <rect x="65" y="115" width="220" height="110" rx="12" fill="#0F172A" stroke="#f59e0b" stroke-width="2"/>
  <text x="175" y="150" text-anchor="middle" font-family="monospace" font-size="15" font-weight="bold" fill="#fbbf24">🌩️ Brainstorm</text>
  <text x="175" y="172" text-anchor="middle" font-family="monospace" font-size="10" fill="#94a3b8">Problem definition</text>
  <text x="175" y="190" text-anchor="middle" font-family="monospace" font-size="10" fill="#94a3b8">Requirements gathering</text>
  <text x="175" y="208" text-anchor="middle" font-family="monospace" font-size="10" fill="#94a3b8">Stakeholder alignment</text>

  <!-- Gate 1 -->
  <rect x="285" y="150" width="60" height="40" rx="6" fill="#7c3aed" opacity="0.8"/>
  <text x="315" y="175" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#fff">🔒</text>
  <text x="315" y="210" text-anchor="middle" font-family="monospace" font-size="9" fill="#a78bfa">Gate 1</text>

  <!-- Arrow -->
  <line x1="345" y1="170" x2="395" y2="170" stroke="#a78bfa" stroke-width="2" marker-end="url(#arrowViolet)"/>

  <!-- Phase 2: Model -->
  <rect x="400" y="115" width="220" height="110" rx="12" fill="#0F172A" stroke="#06b6d4" stroke-width="2"/>
  <text x="510" y="150" text-anchor="middle" font-family="monospace" font-size="15" font-weight="bold" fill="#22d3ee">🧠 Model</text>
  <text x="510" y="172" text-anchor="middle" font-family="monospace" font-size="10" fill="#94a3b8">Data modeling</text>
  <text x="510" y="190" text-anchor="middle" font-family="monospace" font-size="10" fill="#94a3b8">Domain-Driven Design</text>
  <text x="510" y="208" text-anchor="middle" font-family="monospace" font-size="10" fill="#94a3b8">Ubiquitous Language</text>

  <!-- Gate 2 -->
  <rect x="620" y="150" width="60" height="40" rx="6" fill="#7c3aed" opacity="0.8"/>
  <text x="650" y="175" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#fff">🔒</text>
  <text x="650" y="210" text-anchor="middle" font-family="monospace" font-size="9" fill="#a78bfa">Gate 2</text>

  <!-- Arrow -->
  <line x1="680" y1="170" x2="730" y2="170" stroke="#a78bfa" stroke-width="2" marker-end="url(#arrowViolet)"/>

  <!-- Phase 3: Architect -->
  <rect x="735" y="115" width="220" height="110" rx="12" fill="#0F172A" stroke="#34d399" stroke-width="2"/>
  <text x="845" y="150" text-anchor="middle" font-family="monospace" font-size="15" font-weight="bold" fill="#34d399">🏗️ Architect</text>
  <text x="845" y="172" text-anchor="middle" font-family="monospace" font-size="10" fill="#94a3b8">System design</text>
  <text x="845" y="190" text-anchor="middle" font-family="monospace" font-size="10" fill="#94a3b8">Component contracts</text>
  <text x="845" y="208" text-anchor="middle" font-family="monospace" font-size="10" fill="#94a3b8">Tech stack decisions</text>

  <!-- Gate 3 -->
  <rect x="955" y="150" width="60" height="40" rx="6" fill="#7c3aed" opacity="0.8"/>
  <text x="985" y="175" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#fff">🔒</text>
  <text x="985" y="210" text-anchor="middle" font-family="monospace" font-size="9" fill="#a78bfa">Gate 3</text>

  <!-- Arrow -->
  <line x1="1015" y1="170" x2="1065" y2="170" stroke="#a78bfa" stroke-width="2" marker-end="url(#arrowViolet)"/>

  <!-- Phase 4: Develop -->
  <rect x="1070" y="115" width="100" height="110" rx="12" fill="#0F172A" stroke="#FF9800" stroke-width="2"/>
  <text x="1120" y="155" text-anchor="middle" font-family="monospace" font-size="14" font-weight="bold" fill="#FFB74D">🚀</text>
  <text x="1120" y="180" text-anchor="middle" font-family="monospace" font-size="10" fill="#FF9800">Develop</text>
  <text x="1120" y="198" text-anchor="middle" font-family="monospace" font-size="10" fill="#FF9800">Ship</text>

  <!-- === BOTTOM: Feature comparison === -->

  <!-- BMAD Features -->
  <rect x="60" y="370" width="500" height="220" rx="10" fill="#0F172A" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="310" y="400" text-anchor="middle" font-family="monospace" font-size="15" font-weight="bold" fill="#a78bfa">🏢 BMAD Core Features</text>
  <line x1="85" y1="412" x2="535" y2="412" stroke="#7c3aed" stroke-width="0.5"/>

  <circle cx="85" cy="437" r="4" fill="#a78bfa"/>
  <text x="102" y="441" font-family="monospace" font-size="11" fill="#cbd5e1">Phased SDD with formal gates</text>

  <circle cx="85" cy="462" r="4" fill="#a78bfa"/>
  <text x="102" y="466" font-family="monospace" font-size="11" fill="#cbd5e1">Agent-driven phase transitions</text>

  <circle cx="85" cy="487" r="4" fill="#a78bfa"/>
  <text x="102" y="491" font-family="monospace" font-size="11" fill="#cbd5e1">Domain-Driven Design baked in</text>

  <circle cx="85" cy="512" r="4" fill="#a78bfa"/>
  <text x="102" y="516" font-family="monospace" font-size="11" fill="#cbd5e1">Audit trail across all phases</text>

  <circle cx="85" cy="537" r="4" fill="#a78bfa"/>
  <text x="102" y="541" font-family="monospace" font-size="11" fill="#cbd5e1">Guardrails enforce quality gates</text>

  <circle cx="85" cy="562" r="4" fill="#a78bfa"/>
  <text x="102" y="566" font-family="monospace" font-size="11" fill="#cbd5e1">Enterprise-grade traceability</text>

  <!-- Trade-offs -->
  <rect x="630" y="370" width="510" height="220" rx="10" fill="#0F172A" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="885" y="400" text-anchor="middle" font-family="monospace" font-size="15" font-weight="bold" fill="#fbbf24">⚖️ Trade-offs vs Grill-Me</text>
  <line x1="655" y1="412" x2="1115" y2="412" stroke="#f59e0b" stroke-width="0.5"/>

  <rect x="660" y="425" width="230" height="70" rx="8" fill="#0d332e" stroke="#34d399" stroke-width="1"/>
  <text x="775" y="450" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#34d399">✅ BMAD wins</text>
  <text x="775" y="470" text-anchor="middle" font-family="monospace" font-size="9" fill="#6ee7b7">Formalized, auditable,</text>
  <text x="775" y="484" text-anchor="middle" font-family="monospace" font-size="9" fill="#6ee7b7">enterprise-grade governance</text>

  <rect x="910" y="425" width="215" height="70" rx="8" fill="#1a1010" stroke="#ef4444" stroke-width="1"/>
  <text x="1017" y="450" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#ef4444">❌ BMAD loses</text>
  <text x="1017" y="470" text-anchor="middle" font-family="monospace" font-size="9" fill="#fca5a5">Heavy process overhead,</text>
  <text x="1017" y="484" text-anchor="middle" font-family="monospace" font-size="9" fill="#fca5a5">slower for solo devs</text>

  <rect x="660" y="508" width="230" height="70" rx="8" fill="#1a1010" stroke="#ef4444" stroke-width="1"/>
  <text x="775" y="533" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#ef4444">❌ Grill-Me loses</text>
  <text x="775" y="553" text-anchor="middle" font-family="monospace" font-size="9" fill="#fca5a5">No built-in governance,</text>
  <text x="775" y="567" text-anchor="middle" font-family="monospace" font-size="9" fill="#fca5a5">relies on developer discipline</text>

  <rect x="910" y="508" width="215" height="70" rx="8" fill="#0d332e" stroke="#34d399" stroke-width="1"/>
  <text x="1017" y="533" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#34d399">✅ Grill-Me wins</text>
  <text x="1017" y="553" text-anchor="middle" font-family="monospace" font-size="9" fill="#6ee7b7">Lightweight, fast iteration,</text>
  <text x="1017" y="567" text-anchor="middle" font-family="monospace" font-size="9" fill="#6ee7b7">perfect for indie/solo devs</text>

  <!-- Bottom bar -->
  <rect x="0" y="600" width="1200" height="30" fill="#018786" opacity="0.12"/>
  <text x="600" y="620" text-anchor="middle" font-family="monospace" font-size="10" fill="#64748b">BMAD — github.com/BMAD-Method · Enterprise SDD with formal gates, phased by agent-driven transitions</text>
</svg>