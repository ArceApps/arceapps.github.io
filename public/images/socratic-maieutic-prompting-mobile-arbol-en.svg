<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700" width="1000" height="700">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#020617" />
    </linearGradient>

    <!-- Node Gradients -->
    <linearGradient id="blueNode" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3a8a" />
      <stop offset="100%" stop-color="#172554" />
    </linearGradient>
    <linearGradient id="greenNode" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#064e3b" />
      <stop offset="100%" stop-color="#022c22" />
    </linearGradient>
    <linearGradient id="redNode" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7f1d1d" />
      <stop offset="100%" stop-color="#450a0a" />
    </linearGradient>
    <linearGradient id="solverNode" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#311042" />
      <stop offset="100%" stop-color="#1a0524" />
    </linearGradient>

    <!-- Glow Filters -->
    <filter id="glowBlue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1000" height="700" fill="url(#bgGrad)" />

  <!-- Outer Border -->
  <rect x="15" y="15" width="970" height="670" rx="16" fill="none" stroke="#1e293b" stroke-width="3" />

  <!-- Title -->
  <text x="500" y="60" text-anchor="middle" font-family="sans-serif" font-size="28" font-weight="bold" fill="#38bdf8" filter="url(#glowBlue)">
    Abductive Tree of Maieutic Prompting
  </text>

  <!-- Tree Connection Lines -->
  <g stroke="#475569" stroke-width="3" fill="none" opacity="0.6">
    <!-- Root to True/False -->
    <path d="M 500,160 L 280,240" stroke="#10b981" stroke-width="4" />
    <path d="M 500,160 L 720,240" stroke="#f43f5e" stroke-width="4" />
    
    <!-- True to Sub-explanations -->
    <path d="M 280,300 L 160,380" stroke="#10b981" stroke-width="3" />
    <path d="M 280,300 L 400,380" stroke="#10b981" stroke-width="3" />

    <!-- False to Sub-explanations -->
    <path d="M 720,300 L 600,380" stroke="#f43f5e" stroke-width="3" />
    <path d="M 720,300 L 840,380" stroke="#f43f5e" stroke-width="3" />

    <!-- Sub-explanations to Solver -->
    <path d="M 160,440 L 500,560" stroke="#475569" stroke-dasharray="4,4" />
    <path d="M 400,440 L 500,560" stroke="#475569" stroke-dasharray="4,4" />
    <path d="M 600,440 L 500,560" stroke="#475569" stroke-dasharray="4,4" />
    <path d="M 840,440 L 500,560" stroke="#475569" stroke-dasharray="4,4" />
  </g>

  <!-- === LEVEL 1: ROOT === -->
  <g transform="translate(375, 100)">
    <rect width="250" height="60" rx="12" fill="url(#blueNode)" stroke="#3b82f6" stroke-width="2" />
    <text x="125" y="36" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#ffffff">Original Question</text>
  </g>

  <!-- === LEVEL 2: BRANCHES === -->
  <!-- Left: True Branch -->
  <g transform="translate(180, 240)">
    <rect width="200" height="60" rx="12" fill="url(#greenNode)" stroke="#10b981" stroke-width="2" />
    <text x="100" y="36" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#34d399">True? because...</text>
  </g>
  <!-- Right: False Branch -->
  <g transform="translate(620, 240)">
    <rect width="200" height="60" rx="12" fill="url(#redNode)" stroke="#f43f5e" stroke-width="2" />
    <text x="100" y="36" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#fca5a5">False? because...</text>
  </g>

  <!-- === LEVEL 3: LEAVES === -->
  <!-- Under True (Green) -->
  <g transform="translate(50, 380)">
    <rect width="220" height="60" rx="10" fill="#1e293b" stroke="#10b981" stroke-width="1.5" />
    <text x="110" y="25" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#34d399">Sub-explanation T1</text>
    <text x="110" y="45" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#94a3b8">Supporting Evidence</text>
  </g>
  <g transform="translate(290, 380)">
    <rect width="220" height="60" rx="10" fill="#1e293b" stroke="#10b981" stroke-width="1.5" />
    <text x="110" y="25" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#34d399">Sub-explanation T2</text>
    <text x="110" y="45" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#94a3b8">Logical Consistency</text>
  </g>

  <!-- Under False (Red) -->
  <g transform="translate(490, 380)">
    <rect width="220" height="60" rx="10" fill="#1e293b" stroke="#f43f5e" stroke-width="1.5" />
    <text x="110" y="25" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#fca5a5">Sub-explanation F1</text>
    <text x="110" y="45" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#94a3b8">Direct Contradiction</text>
  </g>
  <g transform="translate(730, 380)">
    <rect width="220" height="60" rx="10" fill="#1e293b" stroke="#f43f5e" stroke-width="1.5" />
    <text x="110" y="25" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#fca5a5">Sub-explanation F2</text>
    <text x="110" y="45" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#94a3b8">Lack of Proof</text>
  </g>

  <!-- === LEVEL 4: SOLVER === -->
  <g transform="translate(350, 560)">
    <rect width="300" height="70" rx="14" fill="url(#solverNode)" stroke="#d946ef" stroke-width="2" filter="url(#glowBlue)" />
    <text x="150" y="32" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#ffffff">MAX-SAT Solver</text>
    <text x="150" y="52" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#d946ef">→ Consistent Response</text>
  </g>

</svg>
