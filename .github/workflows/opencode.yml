name: opencode

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  opencode:
    if: |
      contains(github.event.comment.body, ' /oc') ||
      startsWith(github.event.comment.body, '/oc') ||
      contains(github.event.comment.body, ' /opencode') ||
      startsWith(github.event.comment.body, '/opencode')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install opencode
        run: curl -fsSL https://opencode.ai/install | bash -s -- --version 1.14.30

      - name: Run opencode
        run: |
          python3 << PYEOF
          import json, os
          event_path = os.environ.get("GITHUB_EVENT_PATH", "")
          if not event_path:
              import sys
              print("ERROR: GITHUB_EVENT_PATH not set", file=sys.stderr)
              sys.exit(1)
          with open(event_path, encoding="utf-8") as f:
              event = json.load(f)
          with open("/tmp/clean_event.json", "w", encoding="utf-8") as f:
              json.dump(event, f, ensure_ascii=False)
          print("Event saved to /tmp/clean_event.json")
          PYEOF
          opencode github run --event /tmp/clean_event.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}